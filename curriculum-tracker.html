<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canon — by Surabhi Batra</title>
  <style>
    :root {
      --purple: #5046E5;
      --purple-light: #EEEDFB;
      --purple-dark: #3B33C4;
      --green: #059669;
      --green-light: #D1FAE5;
      --amber: #B45309;
      --amber-light: #FEF3C7;
      --red: #DC2626;
      --gray: #78716C;
      --gray-light: #F5F5F2;
      --border: #E7E5E0;
      --bg: #F8F7F4;
      --text: #1C1917;
      --text-muted: #78716C;
      --radius: 16px;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); background-image: radial-gradient(ellipse at 10% 60%, rgba(180,140,80,0.1) 0%, transparent 55%), radial-gradient(ellipse at 90% 15%, rgba(80,70,229,0.08) 0%, transparent 55%), radial-gradient(ellipse at 50% 95%, rgba(140,100,180,0.07) 0%, transparent 50%); background-attachment: fixed; color: var(--text); min-height: 100vh; line-height: 1.6; }

    /* ── Header ── */
    .header { background: rgba(255,255,255,0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.6); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 24px rgba(99,102,241,0.08); }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 16px; height: 64px; }
    .header-logo { display: flex; align-items: center; gap: 10px; white-space: nowrap; flex-shrink: 0; }
    .header-logo-text { display: flex; flex-direction: column; gap: 1px; }
    .header-logo-name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; letter-spacing: -0.4px; }
    .header-logo-byline { font-size: 11px; color: var(--text-muted); font-weight: 400; letter-spacing: 0.1px; }
    .header-tagline-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; padding-left: 4px; border-left: 1px solid var(--border); margin-left: 4px; }
    .header-tagline { flex: 1; padding: 0 28px; font-size: 12px; font-weight: 400; color: var(--text-muted); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .header-title { display: none; }
    .mode-toggle { display: flex; background: var(--gray-light); border-radius: 8px; padding: 3px; gap: 2px; flex-shrink: 0; }
    .mode-btn { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; }
    .mode-btn.active { background: white; color: var(--purple); box-shadow: var(--shadow); }

    /* ── Main ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 24px 64px; }

    /* ── Progress Banner ── */
    .progress-banner { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.85); border-radius: var(--radius); padding: 16px 24px; margin-bottom: 24px; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 20px; }
    .progress-stats { display: none; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; color: var(--purple); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-bar-section { flex: 1; }
    .progress-banner-text { font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
    .progress-banner-text strong { color: var(--text); font-weight: 600; }
    .progress-bar-label { display: none; }
    .progress-bar-track { height: 2px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--purple); border-radius: 999px; transition: width 0.5s; opacity: 0.6; }

    /* ── Module Grid ── */
    .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .module-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.85); border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s; cursor: pointer; }
    .module-card:hover { box-shadow: 0 12px 40px rgba(99,102,241,0.16), 0 4px 12px rgba(0,0,0,0.06); transform: translateY(-4px); }
    .module-card.selected { border-color: rgba(99,102,241,0.45); box-shadow: 0 0 0 3px rgba(99,102,241,0.1), 0 12px 40px rgba(99,102,241,0.14); }
    /* ── Module Card Visual Banner ── */
    .module-card-visual { height: 90px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; position: relative; overflow: hidden; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.5); }
    .module-card-icon { width: 34px; height: 34px; position: relative; z-index: 1; flex-shrink: 0; opacity: 0.82; }
    .module-card-visual-num { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: rgba(0,0,0,0.28); text-transform: uppercase; position: relative; z-index: 1; }
    [data-theme="dark"] .module-card-visual { border-bottom-color: rgba(255,255,255,0.06); }
    [data-theme="dark"] .module-card-visual-num { color: rgba(255,255,255,0.32); }
    [data-theme="dark"] .module-card-icon { opacity: 0.7; }

    /* ── Split Layout (module selected) ── */
    .student-split { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
    .modules-column { display: flex; flex-direction: column; gap: 8px; position: sticky; top: 80px; max-height: calc(100vh - 100px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-right: 2px; }
    .modules-column::-webkit-scrollbar { width: 4px; }
    .modules-column::-webkit-scrollbar-track { background: transparent; }
    .modules-column::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    .modules-column .module-card { display: flex; flex-direction: row; align-items: stretch; min-height: 52px; }
    .modules-column .module-card-visual { height: auto; min-height: 100%; width: 46px; flex-shrink: 0; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.45); }
    .modules-column .module-card-icon { width: 20px; height: 20px; }
    .modules-column .module-card-visual-num { display: none; }
    .modules-column .module-card-header { flex: 1; padding: 9px 11px; border-bottom: none; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    .modules-column .module-badge { display: none; }
    .modules-column .module-num-inline { display: block; font-size: 10px; font-weight: 600; color: var(--mod-color, var(--purple)); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; opacity: 0.9; }
    .modules-column .module-title { font-size: 12px; margin-bottom: 0; white-space: normal; line-height: 1.35; overflow: visible; }
    .modules-column .module-subtitle { display: none; }
    .modules-column .module-card-footer { display: none !important; }
    .module-num-inline { display: none; }
    .detail-column { min-width: 0; }
    .detail-column .detail-panel { margin-top: 0; }
    @media (max-width: 900px) {
      .student-split { grid-template-columns: 1fr; }
      .modules-column { position: static; max-height: 220px; }
    }
    .module-card-header { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .module-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; letter-spacing: 0.2px; padding: 2px 0; margin-bottom: 10px; }
    .badge-complete { color: var(--green); }
    .badge-progress { color: var(--amber); }
    .badge-notstarted { display: none; }
    .module-number { font-size: 11px; font-weight: 600; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .module-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
    .module-subtitle { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .module-card-footer { padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.02); border-top: 1px solid rgba(0,0,0,0.03); }
    .module-progress-mini { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .mini-bar { width: 72px; height: 2px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .mini-bar-fill { height: 100%; background: var(--mod-color, var(--purple)); border-radius: 999px; transition: width 0.3s; opacity: 0.7; }
    .module-items-count { font-size: 12px; color: var(--text-muted); }

    /* ── Detail Panel ── */
    .detail-panel { background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius); box-shadow: var(--shadow-lg); margin-top: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.85); }
    .detail-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .detail-header-left { flex: 1; }
    .detail-module-num { font-size: 11px; font-weight: 600; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .detail-subtitle { font-size: 14px; color: var(--text-muted); font-style: italic; }
    .close-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all 0.15s; flex-shrink: 0; }
    .close-btn:hover { background: var(--gray-light); }
    .why-banner { padding: 14px 28px; background: rgba(99,102,241,0.06); border-bottom: 1px solid rgba(99,102,241,0.1); font-size: 14px; color: #3730A3; line-height: 1.6; }
    .why-label { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; opacity: 0.7; }
    /* ── Artifact pill (named module deliverable) ── */
    .artifact-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; background: rgba(180,140,80,0.14); color: #92591A; border-radius: 999px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.15px; margin-top: 8px; max-width: 100%; }
    .artifact-pill .artifact-icon { font-size: 11px; line-height: 1; }
    .artifact-pill .artifact-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modules-column .artifact-pill { display: none; }
    [data-theme="dark"] .artifact-pill { background: rgba(180,140,80,0.18); color: #E8B27A; }
    /* Artifact banner in detail view */
    /* Artifact callout inside Assignment tab */
    .asgn-artifact-goal { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 16px; background: rgba(180,140,80,0.07); border: 1px solid rgba(180,140,80,0.2); border-radius: 8px; }
    .asgn-artifact-goal-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #92591A; opacity: 0.8; white-space: nowrap; }
    .asgn-artifact-goal-name { font-size: 13px; font-weight: 600; color: #6B4214; }
    [data-theme="dark"] .asgn-artifact-goal { background: rgba(180,140,80,0.1); border-color: rgba(180,140,80,0.25); }
    [data-theme="dark"] .asgn-artifact-goal-label { color: #E8B27A; }
    [data-theme="dark"] .asgn-artifact-goal-name { color: #E8B27A; }

    /* ── Tabs ── */
    .detail-tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.06); padding: 0 28px; background: rgba(255,255,255,0.4); overflow-x: auto; scrollbar-width: none; }
    .detail-tabs::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 12px 14px; border: none; background: transparent; cursor: pointer; font-size: 12.5px; font-weight: 400; color: var(--text-muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
    .tab-btn.active { font-weight: 500; }
    .tab-btn:hover { color: var(--purple); }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* ── Tab Content ── */
    .tab-content { padding: 24px 28px; max-height: 520px; overflow-y: auto; }

    /* ── Reading Items ── */
    .reading-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); border-radius: 6px; transition: background 0.3s; }
    .reading-item:last-child { border-bottom: none; }
    .reading-item.reading-highlight { background: rgba(124,58,237,0.08); padding-left: 8px; }
    .check-input { flex-shrink: 0; width: 18px; height: 18px; margin-top: 3px; cursor: pointer; accent-color: var(--purple); }
    .reading-content { flex: 1; }
    .reading-title { font-weight: 600; font-size: 14px; margin-bottom: 5px; line-height: 1.4; }
    .reading-title.done { text-decoration: line-through; color: var(--text-muted); }
    .reading-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--purple); text-decoration: none; margin-bottom: 5px; background: var(--purple-light); padding: 2px 8px; border-radius: 4px; }
    .reading-link:hover { background: #DDD6FE; }
    .search-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; background: var(--gray-light); padding: 2px 8px; border-radius: 4px; color: var(--text-muted); margin-bottom: 5px; font-family: monospace; }
    .reading-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* ── Watch Items ── */
    .watch-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .watch-item:last-child { border-bottom: none; }
    .watch-content { flex: 1; }
    .watch-term { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .watch-term.done { text-decoration: line-through; color: var(--text-muted); }
    .yt-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; background: #FEE2E2; color: #DC2626; padding: 3px 10px; border-radius: 4px; text-decoration: none; }
    .yt-btn:hover { background: #FECACA; }
    .watch-desc { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

    /* ── Prose & Notes ── */
    .prose-block { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 20px; white-space: pre-wrap; }
    .reflection-block { font-size: 14px; line-height: 1.8; color: #3730A3; background: rgba(99,102,241,0.06); border-left: 3px solid var(--purple); border-radius: 0 8px 8px 0; padding: 16px 20px; margin-bottom: 20px; white-space: pre-wrap; }
    .done-check-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--gray-light); border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .done-check-row:hover { background: #E5E7EB; }
    .notes-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .notes-area { width: 100%; min-height: 160px; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 14px; font-family: inherit; color: var(--text); resize: vertical; line-height: 1.7; outline: none; transition: border-color 0.15s; }
    .notes-area:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    /* ── Rich Text Editor ── */
    .rte-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: box-shadow 0.15s; }
    .rte-wrap:focus-within { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .rte-toolbar { display: flex; align-items: center; gap: 2px; padding: 6px 10px; background: var(--gray-light); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .rte-btn { width: 30px; height: 28px; border: none; background: transparent; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text); transition: background 0.1s; flex-shrink: 0; padding: 0; }
    .rte-btn:hover { background: var(--border); }
    .rte-btn svg { pointer-events: none; }
    .rte-sep { width: 1px; height: 18px; background: var(--border); margin: 0 5px; flex-shrink: 0; }
    .rte-swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.12); cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
    .rte-swatch:hover { transform: scale(1.2); }
    .rte-editor { min-height: 200px; padding: 14px 16px; font-size: 14px; line-height: 1.75; color: var(--text); outline: none; background: white; }
    .rte-editor:empty::before { content: attr(data-placeholder); color: var(--text-muted); pointer-events: none; }
    .rte-editor ul { padding-left: 22px; list-style: disc; margin: 4px 0; }
    .rte-editor ol { padding-left: 22px; list-style: decimal; margin: 4px 0; }
    .rte-editor li { margin: 2px 0; }
    [data-theme="dark"] .rte-wrap { border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .rte-wrap:focus-within { border-color: var(--purple); }
    [data-theme="dark"] .rte-toolbar { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .rte-editor { background: rgba(0,0,0,0.25); color: var(--text); }
    [data-theme="dark"] .rte-swatch { border-color: rgba(255,255,255,0.15); }
    .notes-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    /* ── Assignment Sections ── */
    .asgn-sections { display: flex; flex-direction: column; gap: 10px; }
    .asgn-section { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.6); transition: box-shadow 0.15s; }
    .asgn-section.dragging { opacity: 0.45; }
    .asgn-section.drag-over { box-shadow: 0 0 0 2px var(--purple); }
    .asgn-sec-header { display: flex; align-items: center; gap: 6px; padding: 10px 12px; background: var(--gray-light); border-bottom: 1px solid var(--border); cursor: default; user-select: none; }
    .asgn-sec-body { }
    .asgn-sec-body.collapsed { display: none; }
    .asgn-sec-drag { cursor: grab; color: var(--text-muted); font-size: 18px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
    .asgn-sec-drag:active { cursor: grabbing; }
    .asgn-sec-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); background: transparent; border: none; outline: none; padding: 2px 4px; border-radius: 4px; line-height: 1.4; }
    .asgn-sec-title:focus { background: rgba(124,58,237,0.06); }
    .asgn-sec-title:empty::before { content: attr(data-placeholder); color: var(--text-muted); font-weight: 400; pointer-events: none; }
    .asgn-sec-toggle { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; color: var(--text-muted); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.1s, transform 0.2s; padding: 0; }
    .asgn-sec-toggle:hover { background: var(--border); }
    .asgn-sec-toggle.collapsed { transform: rotate(-90deg); }
    .asgn-sec-delete { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; color: var(--text-muted); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.1s, color 0.1s; padding: 0; }
    .asgn-sec-delete:hover { background: #fee2e2; color: #dc2626; }
    .asgn-add-sec { display: flex; align-items: center; gap: 6px; padding: 9px 14px; border: 1.5px dashed var(--border); border-radius: 10px; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); width: 100%; transition: border-color 0.15s, color 0.15s, background 0.15s; margin-top: 2px; }
    .asgn-add-sec:hover { border-color: var(--purple); color: var(--purple); background: rgba(124,58,237,0.04); }
    [data-theme="dark"] .asgn-section { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .asgn-sec-header { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .asgn-sec-delete:hover { background: rgba(220,38,38,0.15); }
    [data-theme="dark"] .asgn-add-sec { border-color: rgba(255,255,255,0.12); }

    /* ── Source citations ── */
    .src-cite { color: var(--purple); text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; cursor: pointer; border-radius: 2px; transition: background 0.1s; user-select: none; -webkit-user-select: none; }
    .src-cite:hover { background: rgba(124,58,237,0.1); }
    .src-picker { position: absolute; z-index: 9999; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); min-width: 240px; max-width: 320px; overflow: hidden; display: none; }
    .src-picker.open { display: block; }
    .src-picker-header { padding: 10px 14px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .src-picker-item { padding: 9px 14px; font-size: 13px; color: var(--text); cursor: pointer; line-height: 1.4; transition: background 0.1s; }
    .src-picker-item:hover { background: rgba(124,58,237,0.07); color: var(--purple); }
    .src-picker-empty { padding: 12px 14px; font-size: 13px; color: var(--text-muted); }
    .rte-btn-link { width: auto !important; padding: 0 7px !important; gap: 4px; font-size: 11px; }
    [data-theme="dark"] .src-picker { background: #1e1e2e; border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .src-picker-header { border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .src-picker-item { color: var(--text); }
    [data-theme="dark"] .src-picker-item:hover { background: rgba(124,58,237,0.15); }

    /* ── Attachments ── */
    .attach-section { margin-bottom: 28px; }
    .attach-section:last-child { margin-bottom: 0; }
    .attach-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .attach-section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .attach-count { font-size: 11px; background: var(--purple-light); color: var(--purple); padding: 2px 7px; border-radius: 999px; font-weight: 600; margin-left: 6px; }
    .attach-empty { font-size: 13px; color: var(--text-muted); padding: 14px 0; font-style: italic; }
    .attach-drop-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
      text-align: center; cursor: pointer; transition: all 0.15s; background: var(--gray-light);
      margin-bottom: 12px;
    }
    .attach-drop-zone:hover, .attach-drop-zone.drag-over { border-color: var(--purple); background: var(--purple-light); }
    .attach-drop-zone p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .attach-drop-icon { font-size: 24px; margin-bottom: 4px; }
    .attach-drop-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .attach-file-list { display: flex; flex-direction: column; gap: 8px; }
    .attach-file-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--gray-light); border-radius: 8px; padding: 10px 14px;
      border: 1px solid var(--border);
    }
    .attach-file-icon { font-size: 22px; flex-shrink: 0; }
    .attach-file-info { flex: 1; min-width: 0; }
    .attach-file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attach-file-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .attach-file-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .attach-uploading { opacity: 0.6; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .attach-resource-badge { font-size: 10px; background: #FEF3C7; color: #92400E; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-left: 6px; }

    /* ── Complete Button ── */
    .detail-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
    .complete-btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .complete-btn.not-done { background: var(--purple-light); color: var(--purple); }
    .complete-btn.not-done:hover { background: var(--purple); color: white; }
    .complete-btn.is-done { background: var(--green-light); color: var(--green); }
    .complete-btn.is-done:hover { background: #A7F3D0; }

    /* ── Admin ── */
    .admin-toolbar { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--purple); color: white; }
    .btn-primary:hover { background: var(--purple-dark); }
    .btn-outline { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--gray-light); }
    .btn-danger { background: #FEE2E2; color: var(--red); }
    .btn-danger:hover { background: #FECACA; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-attach { background: #EFF6FF; color: #2563EB; border: 1px solid #BFDBFE; }
    .btn-attach:hover { background: #DBEAFE; }

    .admin-module-row { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.85); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
    .admin-mod-num { width: 36px; height: 36px; border-radius: 999px; background: var(--purple-light); color: var(--purple); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .admin-mod-info { flex: 1; min-width: 0; }
    .admin-mod-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-mod-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .admin-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: rgba(255,255,255,0.88); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.9); border-radius: 20px; box-shadow: var(--shadow-lg); width: 100%; max-width: 680px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .modal-title { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    /* ── PDF Viewer Modal ── */
    .modal.pdf-modal { max-width: 900px; height: 92vh; max-height: 92vh; }
    .pdf-modal .modal-header { flex-shrink: 0; }
    .pdf-modal:fullscreen { max-width: 100vw; width: 100vw; height: 100dvh; max-height: 100dvh; border-radius: 0; }
    .pdf-modal:-webkit-full-screen { max-width: 100vw; width: 100vw; height: 100dvh; max-height: 100dvh; border-radius: 0; }

    /* ── PDF Text Layer & Highlights ── */
    .pdf-page-wrapper { position: relative; margin-bottom: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.5); line-height: 1; }
    .pdf-page-wrapper canvas { display: block; }
    .textLayer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .textLayer span, .textLayer br { color: transparent; position: absolute; white-space: pre; transform-origin: 0% 0%; cursor: text; }
    .textLayer ::selection { background: rgba(255, 220, 0, 0.55); }
    .textLayer ::-moz-selection { background: rgba(255, 220, 0, 0.55); }
    .pdf-hl-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .pdf-hl { position: absolute; background: rgba(255, 220, 0, 0.42); mix-blend-mode: multiply; border-radius: 2px; }
    .btn-hl-on { background: #FEF3C7; color: #92400E; border-color: #FCD34D; }
    .btn-hl-on:hover { background: #FDE68A; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input, .form-textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s; background: white; }
    .form-input:focus, .form-textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .form-textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── Upload Zone (modal) ── */
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 32px; text-align: center; cursor: pointer; transition: all 0.15s; background: var(--gray-light); }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--purple); background: var(--purple-light); }
    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-text { font-size: 15px; font-weight: 600; }
    .upload-subtext { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 64px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-text { font-size: 14px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1F2937; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 500; opacity: 1; transform: translateY(0); transition: opacity 0.3s, transform 0.3s; }
    .toast.hide { opacity: 0; transform: translateY(16px); pointer-events: none; }

    /* ── Dark Mode Toggle Button ── */
    .dark-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 15px; line-height: 1; color: var(--text-muted); transition: all 0.15s; flex-shrink: 0; }
    .dark-toggle:hover { background: var(--gray-light); }

    /* ── Drag to Reorder ── */
    .drag-handle { cursor: grab; color: var(--text-muted); font-size: 20px; flex-shrink: 0; padding: 0 2px; line-height: 1; user-select: none; }
    .drag-handle:active { cursor: grabbing; }
    .admin-module-row { transition: opacity 0.15s, border-color 0.15s; }
    .admin-module-row.dragging { opacity: 0.35; box-shadow: none !important; }
    .admin-module-row.drag-over { border: 2px solid var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.15) !important; }

    /* ── Dark Mode ── */
    [data-theme="dark"] {
      --purple: #8B83F0;
      --purple-light: #1E1B3A;
      --purple-dark: #6B62D4;
      --green: #34D399;
      --green-light: #064E3B;
      --amber: #FCD34D;
      --amber-light: #78350F;
      --red: #FCA5A5;
      --gray: #A8A29E;
      --gray-light: #1C1917;
      --border: #292524;
      --bg: #111110;
      --text: #E7E5E0;
      --text-muted: #A8A29E;
      --shadow: 0 1px 4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.4);
    }
    [data-theme="dark"] body { background-image: radial-gradient(ellipse at 10% 60%, rgba(180,140,60,0.08) 0%, transparent 55%), radial-gradient(ellipse at 90% 15%, rgba(80,70,229,0.12) 0%, transparent 55%), radial-gradient(ellipse at 50% 95%, rgba(120,80,160,0.08) 0%, transparent 50%); }
    [data-theme="dark"] .header { background: rgba(17,17,16,0.82); border-color: rgba(255,255,255,0.05); }
    [data-theme="dark"] .progress-banner { background: rgba(28,25,23,0.6); border-color: rgba(255,255,255,0.06); }
    [data-theme="dark"] .module-card { background: rgba(28,25,23,0.55); border-color: rgba(255,255,255,0.07); }
    [data-theme="dark"] .module-card-footer { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.05); }
    [data-theme="dark"] .detail-panel { background: rgba(17,17,16,0.8); border-color: rgba(255,255,255,0.07); }
    [data-theme="dark"] .detail-tabs { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.06); }
    [data-theme="dark"] .admin-module-row { background: rgba(28,25,23,0.55); border-color: rgba(255,255,255,0.07); }
    [data-theme="dark"] .modal { background: rgba(17,17,16,0.92); border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .why-banner { background: rgba(80,70,229,0.1); border-color: rgba(80,70,229,0.15); color: #B0AAFF; }
    [data-theme="dark"] .reflection-block { background: rgba(80,70,229,0.08); border-color: var(--purple); color: #B0AAFF; }
    [data-theme="dark"] .mode-btn.active { background: rgba(0,0,0,0.4); }
    [data-theme="dark"] .close-btn { background: rgba(255,255,255,0.05); color: var(--text-muted); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .close-btn:hover { background: rgba(255,255,255,0.1); }
    [data-theme="dark"] .btn-outline { background: rgba(255,255,255,0.05); color: var(--text); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .btn-outline:hover { background: rgba(255,255,255,0.1); }
    [data-theme="dark"] .notes-area,
    [data-theme="dark"] .form-input,
    [data-theme="dark"] .form-textarea { background: rgba(0,0,0,0.3); color: var(--text); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .notes-area:focus,
    [data-theme="dark"] .form-input:focus,
    [data-theme="dark"] .form-textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(129,140,248,0.15); }
    [data-theme="dark"] .done-check-row { background: rgba(255,255,255,0.04); }
    [data-theme="dark"] .done-check-row:hover { background: rgba(255,255,255,0.08); }
    [data-theme="dark"] .attach-file-item { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .attach-drop-zone { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .upload-zone { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] .reading-link { background: rgba(99,102,241,0.15); color: #A5B4FC; }
    [data-theme="dark"] .reading-link:hover { background: rgba(99,102,241,0.25); }
    [data-theme="dark"] .search-pill { background: rgba(255,255,255,0.06); color: var(--text-muted); }
    [data-theme="dark"] .attach-resource-badge { background: rgba(217,119,6,0.2); color: #FCD34D; }
    [data-theme="dark"] .btn-danger { background: rgba(220,38,38,0.15); color: #FCA5A5; }
    [data-theme="dark"] .btn-danger:hover { background: rgba(220,38,38,0.25); }
    [data-theme="dark"] .btn-attach { background: rgba(37,99,235,0.15); color: #93C5FD; border-color: rgba(37,99,235,0.3); }
    [data-theme="dark"] .btn-attach:hover { background: rgba(37,99,235,0.25); }
    [data-theme="dark"] .toast { background: rgba(30,27,74,0.95); border: 1px solid rgba(255,255,255,0.1); }

    /* ── Responsive: narrow desktop (sidebar shrinks but stays vertical) ── */
    @media (max-width: 1100px) and (min-width: 901px) {
      .student-split { grid-template-columns: 280px 1fr; }
    }

    /* ── Responsive: tablet (sidebar becomes horizontal scroll strip) ── */
    @media (max-width: 900px) {
      .student-split { grid-template-columns: 1fr; gap: 12px; }
      .modules-column { position: static; max-height: 160px; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding-bottom: 6px; padding-right: 0; gap: 8px; scrollbar-width: thin; }
      .modules-column .module-card { min-width: 190px; max-width: 220px; flex-shrink: 0; }
      .modules-column .module-card-header { padding: 8px 10px; }
      .modules-column .module-title { font-size: 12px; }
      .detail-column .detail-panel { margin-top: 0; }
    }

    /* ── Responsive: phone ── */
    @media (max-width: 640px) {
      /* Header */
      .header { padding: 0 16px; }
      .header-inner { height: auto; padding: 10px 0; flex-wrap: wrap; gap: 8px; }
      .header-logo { flex: 1; min-width: 0; overflow: hidden; }
      .header-logo-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .header-logo-byline { display: none; }
      .header-tagline { display: none; }
      .mode-btn { padding: 6px 10px; font-size: 12px; }

      /* Main */
      .main { padding: 12px 12px 48px; }

      /* Progress banner */
      .progress-banner { flex-direction: column; align-items: flex-start; gap: 16px; padding: 16px; }
      .progress-stats { gap: 20px; }
      .stat-num { font-size: 22px; }

      /* Module grid */
      .modules-grid { grid-template-columns: 1fr; gap: 12px; }
      .module-card-visual { height: 72px; }

      /* Split layout: hide column, show detail full-width with back button */
      .student-split { grid-template-columns: 1fr; gap: 0; }
      .modules-column { display: none; }
      .detail-column .detail-panel { border-radius: 12px; margin-top: 0; }
      .close-btn::before { content: '← '; }
      .close-btn { font-size: 12px; padding: 6px 10px; }

      /* Detail panel */
      .detail-header { padding: 14px 16px 12px; flex-wrap: wrap; gap: 10px; }
      .detail-title { font-size: 18px; }
      .detail-subtitle { font-size: 13px; }
      .why-banner { padding: 12px 16px; font-size: 13px; }
      .detail-tabs { padding: 0 12px; }
      .tab-btn { padding: 12px 12px; font-size: 12px; }
      .tab-content { padding: 14px 16px; max-height: none; }
      .detail-footer { padding: 12px 16px; }

      /* Admin */
      .admin-toolbar { gap: 8px; }
      .admin-module-row { flex-wrap: wrap; gap: 10px; }
      .admin-actions { width: 100%; justify-content: flex-end; }

      /* Modal */
      .modal-overlay { padding: 12px; align-items: flex-end; }
      .modal { border-radius: 20px 20px 0 0; max-height: 88vh; }
      .modal-body { padding: 16px; }
      .modal-header { padding: 16px; }
      .modal-footer { padding: 12px 16px; }
    }

    /* ── Design mode — master/detail split ── */
    .design-split { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
    .design-modules-col { display: flex; flex-direction: column; gap: 4px; position: sticky; top: 80px; max-height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-right: 2px; }
    .design-modules-col::-webkit-scrollbar { width: 4px; }
    .design-modules-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    .design-mod-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(255,255,255,0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.85); border-radius: 10px; cursor: pointer; transition: all 0.15s; user-select: none; }
    .design-mod-item:hover { background: rgba(255,255,255,0.9); box-shadow: var(--shadow); }
    .design-mod-item.selected { border-color: rgba(80,70,229,0.4); background: white; box-shadow: 0 0 0 3px rgba(80,70,229,0.08), var(--shadow); }
    .design-mod-item.dragging { opacity: 0.4; }
    .design-mod-item.drag-over { box-shadow: 0 0 0 2px var(--purple); }
    .design-mod-num { font-size: 10px; font-weight: 700; color: var(--purple); min-width: 18px; text-align: right; flex-shrink: 0; }
    .design-mod-title { font-size: 12.5px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .design-panel-col { min-width: 0; }
    .design-panel { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.85); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
    .design-panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    .design-panel-modnum { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--purple); margin-bottom: 2px; }
    .design-panel-modtitle { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .design-panel-body { padding: 24px; display: flex; flex-direction: column; gap: 22px; max-height: calc(100vh - 240px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .design-field-group { display: flex; flex-direction: column; gap: 7px; }
    .design-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); }
    .design-field-input { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); background: white; outline: none; transition: border-color 0.15s; width: 100%; }
    .design-field-input:focus { border-color: var(--purple); }
    .design-field-textarea { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: inherit; color: var(--text); background: white; outline: none; min-height: 80px; resize: vertical; transition: border-color 0.15s; line-height: 1.6; width: 100%; }
    .design-field-textarea:focus { border-color: var(--purple); }
    [data-theme="dark"] .design-mod-item { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
    [data-theme="dark"] .design-mod-item.selected { background: rgba(255,255,255,0.1); }
    [data-theme="dark"] .design-panel { background: rgba(30,28,26,0.7); }
    [data-theme="dark"] .design-field-input, [data-theme="dark"] .design-field-textarea { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: var(--text); }
    @media (max-width: 900px) { .design-split { grid-template-columns: 1fr; } .design-modules-col { position: static; max-height: 200px; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; } .design-panel-body { max-height: none; } }

    /* ── Inline Reading Editor (Design mode) ── */
    .reading-editor-wrap { background: rgba(248,247,244,0.9); border-top: 1px solid var(--border); padding: 16px 20px 20px; }
    .reading-editor-section { margin-bottom: 18px; }
    .reading-editor-section:last-child { margin-bottom: 0; }
    .reading-editor-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 10px; }
    .reading-edit-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .reading-edit-row:last-of-type { border-bottom: none; }
    .reading-edit-input { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: white; color: var(--text); outline: none; transition: border-color 0.15s; }
    .reading-edit-input:focus { border-color: var(--purple); }

    .reading-attach-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--purple-light); border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--purple); cursor: pointer; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; border: none; flex-shrink: 0; }
    .reading-attach-pill:hover { background: rgba(80,70,229,0.15); }
    .reading-add-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1.5px dashed var(--border); border-radius: 8px; background: transparent; font-size: 13px; color: var(--text-muted); cursor: pointer; width: 100%; margin-top: 8px; transition: border-color 0.15s, color 0.15s; font-family: inherit; }
    .reading-add-btn:hover { border-color: var(--purple); color: var(--purple); }
    .expand-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text-muted); font-size: 11px; padding: 4px 8px; transition: all 0.15s; flex-shrink: 0; white-space: nowrap; }
    .expand-btn:hover { background: var(--gray-light); }
    .expand-btn.open { border-color: var(--purple); color: var(--purple); background: var(--purple-light); }
    /* Reading attachment pill in Learn mode */
    .reading-attach-view { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: var(--purple-light); border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--purple); cursor: pointer; border: none; font-family: inherit; margin-top: 4px; }
    .reading-attach-view:hover { background: rgba(80,70,229,0.15); }
    .reading-my-attach { background: var(--green-light); color: var(--green); }
    .reading-my-attach:hover { background: rgba(5,150,105,0.15); }
    [data-theme="dark"] .reading-editor-wrap { background: rgba(30,28,26,0.6); }
    [data-theme="dark"] .reading-edit-input { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Auth Screen ── */
    .auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: var(--bg); background-image: radial-gradient(ellipse at 10% 60%, rgba(180,140,80,0.1) 0%, transparent 55%), radial-gradient(ellipse at 90% 15%, rgba(80,70,229,0.08) 0%, transparent 55%); }
    .auth-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .auth-logo-name { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    .auth-logo-byline { font-size: 12px; color: var(--text-muted); }
    .auth-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .auth-tabs { display: flex; background: var(--gray-light); border-radius: 8px; padding: 3px; gap: 2px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 7px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; }
    .auth-tab.active { background: white; color: var(--purple); box-shadow: var(--shadow); }
    .auth-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); background: white; transition: border-color 0.15s; margin-bottom: 12px; outline: none; display: block; }
    .auth-input:focus { border-color: var(--purple); }
    .auth-btn { width: 100%; padding: 12px; background: var(--purple); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 4px; font-family: inherit; }
    .auth-btn:hover { background: var(--purple-dark); }
    .auth-btn:disabled { opacity: 0.55; cursor: default; }
    .auth-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-msg { font-size: 13px; margin-top: 14px; text-align: center; min-height: 20px; line-height: 1.5; }
    .auth-msg.error { color: var(--red); }
    .auth-msg.success { color: var(--green); }
    .auth-msg.info { color: var(--text-muted); }
    .auth-loading { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 60px 0; color: var(--text-muted); font-size: 14px; }
    .auth-loading-spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
    /* User badge in header */
    .user-badge { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .user-badge-email { font-size: 11px; color: var(--text-muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-signout { padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; font-family: inherit; }
    .user-signout:hover { border-color: var(--red); color: var(--red); }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); opacity: 0; transition: opacity 0.4s; }
    .sync-dot.syncing { background: var(--amber); opacity: 1; }
    .sync-dot.synced { opacity: 1; }
  </style>

<body>

<!-- Auth screen — shown when not authenticated -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="url(#authLogoGrad)"/>
        <path d="M18 9.5C16.8 8.6 15.4 8 13.8 8C10.1 8 7 11.1 7 14.8C7 18.5 10.1 21.6 13.8 21.6C15.5 21.6 17 21 18.2 19.9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <defs><linearGradient id="authLogoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
      </svg>
      <div>
        <div class="auth-logo-name">Canon</div>
        <div class="auth-logo-byline">by Surabhi Batra</div>
      </div>
    </div>
    <!-- Loading state -->
    <div id="authLoading" class="auth-loading">
      <div class="auth-loading-spinner"></div>
      <span>Checking session…</span>
    </div>
    <!-- Sign-in / Sign-up form (hidden until auth check completes) -->
    <div id="authForm" style="display:none">
      <div class="auth-title" id="authTitle">Welcome back</div>
      <div class="auth-subtitle" id="authSubtitle">Sign in to sync your progress across devices</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="authTabSignIn" onclick="switchAuthTab('signin')">Sign in</button>
        <button class="auth-tab" id="authTabSignUp" onclick="switchAuthTab('signup')">Create account</button>
      </div>
      <form onsubmit="handleAuthSubmit(event)">
        <input type="email" class="auth-input" id="authEmail" placeholder="Email address" required autocomplete="email">
        <input type="password" class="auth-input" id="authPassword" placeholder="Password (min 6 chars)" required autocomplete="current-password" minlength="6">
        <button type="submit" class="auth-btn" id="authSubmitBtn">Sign in</button>
      </form>
      <div class="auth-msg info" id="authMsg"></div>
    </div>
  </div>
</div>

<header class="header">
  <div class="header-inner">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect width="28" height="28" rx="7" fill="url(#logoGrad)"/>
        <path d="M18 9.5C16.8 8.6 15.4 8 13.8 8C10.1 8 7 11.1 7 14.8C7 18.5 10.1 21.6 13.8 21.6C15.5 21.6 17 21 18.2 19.9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
            <stop offset="0%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="header-logo-text">
        <div class="header-logo-name">Canon</div>
        <div class="header-logo-byline">by Surabhi Batra</div>
      </div>
    </div>
    <div style="flex:1; display:flex; align-items:center; padding-left: 20px;">
      <span class="header-tagline-sub" style="display:none" id="headerTaglineSub">Design your curriculum with AI. Execute it with intention. Walk out with proof.</span>
    </div>
    <div class="header-title" id="headerTitle" style="display:none"></div>
    <button class="dark-toggle" id="darkToggleBtn" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
    <!-- User badge (shown when signed in) -->
    <div class="user-badge" id="userBadge" style="display:none">
      <div class="sync-dot" id="syncDot" title="Cloud sync status"></div>
      <span class="user-badge-email" id="userBadgeEmail"></span>
      <button class="user-signout" onclick="handleSignOut()">Sign out</button>
    </div>
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" id="studentModeBtn" onclick="setMode('student')" title="Practice with intention — track progress, write notes, and execute your plan">Learn</button>
      <button class="mode-btn" id="adminModeBtn" onclick="setMode('admin')" title="Curate your curriculum — shape modules, add readings, and upload resources">Design</button>
    </div>
  </div>
</header>

<main class="main">
  <div id="studentView"></div>
  <div id="adminView" style="display:none"></div>
</main>

<!-- Hidden file inputs -->
<input type="file" id="mdInput" accept=".md,.txt" style="display:none" onchange="handleMdFile(this)">
<input type="file" id="pdfInput" accept=".pdf,application/pdf" multiple style="display:none" onchange="handlePdfFiles(this)">
<input type="file" id="readingPdfInput" accept=".pdf,application/pdf" style="display:none" onchange="handleReadingAttachFile(this)">

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)"></div>
<div id="toast" class="toast hide"></div>

<script>
// ====================================================================
// EMBEDDED CURRICULUM — Jane's 9-module PM curriculum
// ====================================================================
const JANE_CURRICULUM = {
  title: "Canon — Surabhi Batra",
  subtitle: "Your personal upskilling playbook. Strategy, Design Thinking, AI Product, Pricing & Metrics.",
  modules: [
    {
      id: "m0", number: 0,
      title: "Mindset & Meta-cognition",
      subtitle: "Before frameworks, the operating system. How you think, decide, and recover under pressure.",
      whyItMatters: "Every great PM curriculum starts here for a reason. Frameworks are interchangeable. The person applying them is not. This module is about getting honest with yourself about how you actually think, where your judgement is sharp, where it predictably wobbles, and what conditions let you operate at your best. It is the lens through which everything else in this curriculum will be filtered.",
      artifact: "Operating Manual for Yourself",
      readings: [
        { id:"m0r1", number:"1", title:"\"What Having a 'Growth Mindset' Actually Means\" — Carol Dweck, HBR", url:"https://hbr.org/2016/01/what-having-a-growth-mindset-actually-means", searchTerm:"", type:"verified", description:"Short. The 2016 piece where Dweck clarifies what most people get wrong about her own framework. Read this before the book." },
        { id:"m0r2", number:"2", title:"\"What Self-Awareness Really Is (and How to Cultivate It)\" — Tasha Eurich, HBR", url:"https://hbr.org/2018/01/what-self-awareness-really-is-and-how-to-cultivate-it", searchTerm:"", type:"verified", description:"Distinguishes internal vs external self-awareness. Most senior PMs have one and not the other." },
        { id:"m0r3", number:"3", title:"Thinking in Bets — Annie Duke", url:"", searchTerm:"Annie Duke Thinking in Bets summary chapters", type:"search", description:"The book on decision-making under uncertainty. Read chapters 1-3 minimum. Reframes 'good decision' away from outcome and toward process." },
        { id:"m0r4", number:"4", title:"Shreyas Doshi on PM meta-skills", url:"", searchTerm:"Shreyas Doshi top 1 percent PMs skill", type:"search", description:"His pieces on meta-skills are the best modern writing on what actually separates senior PMs from the rest. Browse his Twitter and Substack." },
        { id:"m0r5", number:"5", title:"One Useful Thing — Ethan Mollick", url:"https://www.oneusefulthing.org", searchTerm:"", type:"verified", description:"For the AI-era angle on thinking. Read his pieces on cognitive offloading and where AI helps vs replaces thinking." }
      ],
      watching: [
        { id:"m0w1", searchTerm:"Daniel Kahneman system 1 system 2 talk", description:"His Google Talks lecture is the clearest non-academic explanation of fast vs slow thinking" },
        { id:"m0w2", searchTerm:"Brene Brown TED power of vulnerability", description:"Relevant for the honest self-assessment this module requires" },
        { id:"m0w3", searchTerm:"Naval Ravikant Tim Ferriss decision making", description:"For the philosophy-of-thinking angle" }
      ],
      assignment:"Write your Operating Manual. Be specific, not aspirational. Use evidence from your actual career, not what you wish were true.\n\nCover:\n1. Three moments in your career where you did your best work. What was true about you, the work, and the environment in each?\n2. Three moments where you struggled or under-performed. What was true about you, the work, and the environment?\n3. Your decision-making defaults under pressure (do you over-research, freeze, ship too fast, defer to authority, escalate)?\n4. The conditions you now know you need (autonomy levels, feedback frequency, type of stakeholders, decision velocity, domain affinity).\n5. The kinds of work you should structurally avoid even if you could do them.\n\nEnd with one sentence: \"The single thing I now know about how I work, that I would not have written down five years ago, is ___.\"",
      reflection:"What did the way you engaged with this exercise tell you about how you work? Where did you flinch, rationalise, or want to look away? That is the signal."
    },
    {
      id: "m1", number: 1,
      title: "Strategic Thinking & Systems Thinking",
      subtitle: "You already think strategically. This module gives you the frameworks to prove it in any room.",
      whyItMatters: "The organisations worth working for don't want executors. They want people who can hold complexity, see the system behind the problem, and make a call when the data is ambiguous. You are that person. This module gives you the vocabulary and the frameworks to show it clearly.",
      artifact: "Strategic Position Map",
      readings: [
        { id:"m1r1", number:"1", title:'"What Is Strategy?" — Michael Porter, HBR 1996', url:"https://hbr.org/1996/11/what-is-strategy", searchTerm:"", type:"verified", description:"The foundational text. Porter's argument that strategy is about what you won't do is still the sharpest definition available." },
        { id:"m1r2", number:"2", title:'"The Big Lie of Strategic Planning" — Roger Martin, HBR', url:"https://hbr.org/2014/12/the-big-lie-of-strategic-planning", searchTerm:"", type:"verified", description:"Read this alongside Porter. Martin is the best living writer on strategy." },
        { id:"m1r3", number:"3", title:'"7 Powers: The Foundations of Business Strategy" — Hamilton Helmer', url:"", searchTerm:"Hamilton Helmer 7 Powers summary", type:"search", description:"Book (~$15 Kindle). The best modern strategy framework for tech PMs. Counter-positioning, scale economies, switching costs, network effects — explained with real rigour." },
        { id:"m1r4", number:"4", title:"Thinking in Systems — Donella Meadows", url:"", searchTerm:"Donella Meadows Thinking in Systems PDF excerpt", type:"search", description:"The systems thinking bible. Read chapters 1–3 minimum." },
        { id:"m1r5", number:"5", title:'Stratechery — Ben Thompson: "Aggregation Theory"', url:"https://stratechery.com/2015/aggregation-theory/", searchTerm:"", type:"verified", description:"Free. The most important framework for understanding platform power in the internet age." },
        { id:"m1r6", number:"6", title:"GovTech Singapore's Digital Government strategy documents", url:"https://www.tech.gov.sg/our-digital-government-efforts/", searchTerm:"", type:"verified", description:"Read their actual published strategy. If you're going to work there, you should know how they think about themselves." }
      ],
      watching: [
        { id:"m1w1", searchTerm:"Roger Martin strategy talk Playing to Win", description:"Several good recordings of him explaining his framework (~45 min)" },
        { id:"m1w2", searchTerm:"Hamilton Helmer 7 Powers talk", description:"The Invest Like the Best one is excellent" },
        { id:"m1w3", searchTerm:"MIT OpenCourseWare System Dynamics John Sterman", description:"Long but extraordinary if you want to go deep on systems thinking" }
      ],
      assignment:"Map the strategic position of \"Canon\" as a product.\n\n- Who are the real users? Career re-entrants vs. active PMs vs. companies upskilling teams — they're different customers with different willingness to pay and different definitions of success.\n- What's the unique position no generic tool (Notion, Coursera, even ChatGPT) can replicate?\n- Apply Porter: what tradeoffs define this product? What does it deliberately not do?\n- Apply 7 Powers: which of the seven — network effects, switching costs, scale economies, brand — are achievable for a learning app? Which will you target first?\n\nWrite 600 words. End with one sentence: \"The one thing this product must never compromise on is ___.\"",
      reflection:"When you've done your best strategic work in your career — what did it feel like in your body? Energising or draining? Was it the strategy itself, or the environment it happened in?"
    },
    {
      id:"m2", number:2,
      title:"Design Thinking & Human-Centred Research (Advanced)",
      subtitle:"Beyond the vocabulary. Applying the methodology the way it was designed to be used.",
      whyItMatters:"The best product decisions start with a genuine human insight, not a feature request. You know this. This module gives you the structured methods to generate those insights deliberately, not just when you get lucky.",
      artifact: "Discovery Map",
      readings: [
        { id:"m2r1", number:"1", title:"Stanford d.school Design Thinking Bootleg — FREE", url:"https://dschool.stanford.edu/resources", searchTerm:"", type:"verified", description:"Download \"The Bootleg Deck\". It's the canonical Stanford design thinking methodology, free, beautifully designed." },
        { id:"m2r2", number:"2", title:"IDEO Design Kit — FREE", url:"https://www.designkit.org/methods", searchTerm:"", type:"verified", description:"Browse the methods library. Pick 5 methods that seem interesting and read those entries in full." },
        { id:"m2r3", number:"3", title:'"Design Thinking" — Tim Brown, HBR 2008', url:"https://hbr.org/2008/06/design-thinking", searchTerm:"", type:"verified", description:"Short. The piece that brought design thinking into the mainstream business conversation." },
        { id:"m2r4", number:"4", title:"Google PAIR Guidebook — FREE", url:"https://pair.withgoogle.com/guidebook/", searchTerm:"", type:"verified", description:"People + AI Research. Google's free guidebook for designing AI-powered products. Read the whole thing." },
        { id:"m2r5", number:"5", title:'"The Design of Everyday Things" — Don Norman', url:"", searchTerm:"Don Norman Design of Everyday Things", type:"search", description:"If you haven't read it: read chapters 1 and 2. It lands differently after burnout." }
      ],
      watching: [
        { id:"m2w1", searchTerm:"IDEO design thinking shopping cart ABC Nightline", description:"The 1999 video that made design thinking famous. (~22 min)" },
        { id:"m2w2", searchTerm:"Stanford d.school design thinking bootcamp", description:"" },
        { id:"m2w3", searchTerm:"Google PAIR design AI", description:"" }
      ],
      assignment:"Run discovery on your own product.\n\n1. Write 3 user personas who might use this app: a career re-entrant (you), an active PM who wants structured self-study, and an L&D manager at a company. For each: what's their job-to-be-done? What does \"done\" look like for them?\n\n2. Write 5 interview questions you'd ask a career re-entrant in Singapore — then answer them yourself honestly. What surprised you in your own answers?\n\n3. Identify the 2 biggest UX assumptions baked into the current app that you haven't validated with anyone other than yourself.\n\n4. Describe one feature the current app completely lacks that genuine user research would likely surface.\n\nThe goal is one insight about your own product that you didn't have before you started.",
      reflection:"Think of a product decision you made that you're genuinely proud of. Was it driven by data or by a human insight that caught you off guard? What does that tell you about where your best thinking comes from?"
    },
    {
      id:"m3", number:3,
      title:"AI Fundamentals (Rigorous, Non-Technical)",
      subtitle:"Understanding the AI wave at the level that actually matters for product decisions.",
      whyItMatters:"You don't need to be a researcher to think rigorously about AI. You need to understand failure modes, architectural constraints, and what evaluation means in practice. That's what separates the PMs who sound smart about AI from the ones who actually are. This module gets you there.",
      artifact: "AI Opportunity Map",
      readings: [
        { id:"m3r1", number:"1", title:"Ethan Mollick — One Useful Thing (Substack)", url:"https://www.oneusefulthing.org", searchTerm:"", type:"verified", description:"Subscribe. Start with: \"The Cybernetic Teammate\", \"On Trust and the Practical Challenges of AI\", \"Getting your AI to do good work\"." },
        { id:"m3r2", number:"2", title:'"What is ChatGPT Doing and Why Does It Work?" — Stephen Wolfram', url:"https://writings.stephenwolfram.com/2023/02/what-is-chatgpt-doing-and-why-does-it-work/", searchTerm:"", type:"verified", description:"Long. Dense. Read sections 1–5. The best non-mathematical explanation of how LLMs work." },
        { id:"m3r3", number:"3", title:'"Your AI Product Needs Evals" — Hamel Husain', url:"https://hamel.dev/blog/posts/evals/", searchTerm:"", type:"verified", description:"This directly addresses your Micro1 gap. Read carefully." },
        { id:"m3r4", number:"4", title:'"Situational Awareness" — Leopold Aschenbrenner', url:"https://situational-awareness.ai", searchTerm:"", type:"verified", description:"Very long essay. Read Part 1 only (~30 min)." },
        { id:"m3r5", number:"5", title:"DeepLearning.AI Short Courses — FREE", url:"https://www.deeplearning.ai/short-courses/", searchTerm:"", type:"verified", description:"\"Evaluating and Debugging Generative AI\", \"ChatGPT Prompt Engineering for Developers\", \"Building and Evaluating Advanced RAG\". Free, 1–4 hours each." },
        { id:"m3r6", number:"6", title:"Building Effective Agents — Anthropic", url:"https://www.anthropic.com/research/building-effective-agents", searchTerm:"", type:"verified", description:"The canonical mental model for agentic AI: orchestrators, subagents, tool calls, the loop. Written for engineers but readable in 30 min without code. Skip the code blocks. Absorb the architecture." },
        { id:"m3r7", number:"7", title:"Simon Willison on LLM agents — lessons learned", url:"", searchTerm:"Simon Willison LLM agents lessons learned 2024", type:"search", description:"Willison is the clearest practical thinker writing publicly about agents. Skeptical, specific, PM-friendly. Read anything he has written in the last 12 months on tool use and agents." }
      ],
      watching: [
        { id:"m3w1", searchTerm:"Andrej Karpathy intro to large language models", description:"1 hour. The single best non-technical explanation of how LLMs work." },

// ====================================================================
// INDEXEDDB — fallback blob store for unauthenticated / offline use
// ====================================================================
const IDB_NAME = 'pm_curriculum_attachments';
const IDB_VERSION = 1;
const IDB_STORE = 'files';
let _idb = null;

function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror = e => rej(e.target.error);
  });
}

async function idbPut(blob, meta) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    const req = store.add({ ...meta, data: blob });
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function idbGet(id) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(id);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function idbDelete(id) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

async function idbDeleteMany(ids) {
  for (const id of ids) { try { await idbDelete(id); } catch(e) {} }
}

const LS_KEY = 'pm_curriculum_v2';

let state = {

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      state.curriculum  = d.curriculum  || null;
      state.progress    = d.progress    || {};
      state.attachments = d.attachments || {};
      state.darkMode    = d.darkMode    || false;
    }
  } catch(e) {}
}

function _writeLocalStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      curriculum:  state.curriculum,
      progress:    state.progress,
      attachments: state.attachments,
      darkMode:    state.darkMode
    }));
  } catch(e) { console.warn('localStorage save failed', e); }
}

function saveState() {
  _writeLocalStorage();
  // Debounced cloud push (only when signed in)
  if (_currentUser && _sb) {
    _setSyncDot('syncing');
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => _pushToCloud(), 1800);
  }
}

// ── Cloud sync helpers ───────────────────────────────────────────────────────
function _setSyncDot(state_) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state_ ? ' ' + state_ : '');
}

async function _pushToCloud() {
  if (!_sb || !_currentUser) return;
  try {
    const { error } = await _sb.from('user_state').upsert({
      user_id:          _currentUser.id,
      curriculum:       state.curriculum,
      progress:         state.progress,
      attachments_meta: state.attachments
    }, { onConflict: 'user_id' });
    if (error) throw error;
    _setSyncDot('synced');
    // Fade the dot after 2s
    setTimeout(() => _setSyncDot(''), 2000);
  } catch(e) {
    console.warn('Cloud push failed', e);
    _setSyncDot(''); // hide on error (no noise)
  }
}

async function _syncFromCloud() {
  if (!_sb || !_currentUser) return;
  try {
    // Always fetch canonical curriculum (published by admin)
    // Admin gets their own saved curriculum; everyone else gets the canonical one
    const [userRes, canonRes] = await Promise.all([
      _sb.from('user_state')
        .select('curriculum, progress, attachments_meta')
        .eq('user_id', _currentUser.id)
        .maybeSingle(),
      _sb.from('canonical_curriculum')
        .select('curriculum')
        .eq('id', 1)
        .maybeSingle()
    ]);

    const userData   = userRes.data;
    const canonical  = canonRes.data?.curriculum || null;

    if (!userData) {
      // First login — seed cloud with local state, apply canonical curriculum
      if (canonical) state.curriculum = canonical;
      await _pushToCloud();
      return;
    }

    // Restore progress + attachments from user's own row (always private)
    if (userData.progress)         state.progress    = userData.progress;
    if (userData.attachments_meta) state.attachments = userData.attachments_meta;

    // Curriculum source depends on role:
    // Admin → uses their own saved curriculum (what they're actively editing)
    // Everyone else → canonical published curriculum
    if (_isAdmin()) {
      if (userData.curriculum) state.curriculum = userData.curriculum;
    } else {
      if (canonical)           state.curriculum = canonical;
      else if (userData.curriculum) state.curriculum = userData.curriculum; // fallback
    }

    _writeLocalStorage();
  } catch(e) {
    console.warn('Sync from cloud failed', e);
  }
}

async function publishCurriculum() {
  if (!_isAdmin()) return;
  if (!state.curriculum) { showToast('No curriculum to publish'); return; }
  if (!confirm(`Publish "${state.curriculum.title}" to all users?\n\nAll signed-in users will receive this curriculum on their next login.`)) return;

  try {
    _setSyncDot('syncing');
    const { error } = await _sb.from('canonical_curriculum').upsert({
      id: 1,
      curriculum:   state.curriculum,
      published_at: new Date().toISOString(),
      published_by: _currentUser.id
    }, { onConflict: 'id' });
    if (error) throw error;
    _setSyncDot('synced');
    setTimeout(() => _setSyncDot(''), 2000);
    showToast('✓ Published — all users will see this curriculum on next login');
  } catch(e) {
    console.warn('Publish failed', e);
    showToast('Publish failed — ' + (e.message || 'please try again'));
    _setSyncDot('');
  }
}

// ====================================================================
// MARKDOWN PARSER
// ====================================================================
function parseMarkdown(md) {
  const curriculum = { title: 'PM Curriculum', subtitle: '', modules: [] };
  const titleMatch = md.match(/^# ([^#\n]+)$/m);
  if (titleMatch) curriculum.title = titleMatch[1].trim();
  const subtitleMatch = md.match(/^### ([^\n]+)/m);
  if (subtitleMatch) curriculum.subtitle = subtitleMatch[1].trim();

  const modRegex = /# MODULE (\d+):\s*(.+)/g;
  const positions = [];
  let m;
  while ((m = modRegex.exec(md)) !== null) positions.push({ index: m.index, number: parseInt(m[1]), title: m[2].trim() });

  for (let i = 0; i < positions.length; i++) {
    const section = md.slice(positions[i].index, i + 1 < positions.length ? positions[i+1].index : md.length);
    const mod = { id:`m${positions[i].number}`, number:positions[i].number, title:positions[i].title, subtitle:'', whyItMatters:'', artifact:'', readings:[], watching:[], assignment:'', reflection:'' };
    const subMatch = section.match(/^# MODULE[^\n]*\n\*([^\n*]+)\*/m);
    if (subMatch) mod.subtitle = subMatch[1].trim();
    const whyMatch = section.match(/\*\*Why this matters[^*]*\*\*[^\n]*\n([\s\S]*?)(?=\n---)/);
    if (whyMatch) mod.whyItMatters = whyMatch[1].trim();
    const parts = section.split(/\n### /);
    for (const p of parts) {
      const header = p.split('\n')[0].trim().toLowerCase();
      const content = p.split('\n').slice(1).join('\n').trim();
      if (header === 'reading') mod.readings = parseReadingSection(content);
      else if (header === 'watching') mod.watching = parseWatchingSection(content);
      else if (header === 'assignment') mod.assignment = content;
      else if (header.startsWith('reflection')) mod.reflection = content;
    }
    curriculum.modules.push(mod);
  }
  return curriculum;
}

function parseReadingSection(text) {
  const out = [];
  for (const part of text.split(/(?=\*\*\d+\.)/)) {
    if (!part.trim()) continue;
    const nm = part.match(/^\*\*(\d+)\.\s+(.*?)\*\*/);
    if (!nm) continue;
    const r = { id:`r_${Math.random().toString(36).substr(2,8)}`, number:nm[1], title:nm[2].trim(), url:'', searchTerm:'', type:'search', description:'' };
    const urlM = part.match(/✅\s*(https?:\/\/[^\s\n]+)/); if (urlM) { r.url=urlM[1]; r.type='verified'; }
    const srchM = part.match(/🔍\s*Search:\s*"([^"]+)"/); if (srchM) r.searchTerm=srchM[1];
    r.description = part.split('\n').slice(1).filter(l => !l.match(/^✅|^🔍/) && l.trim()!=='---').join('\n').trim();
    out.push(r);
  }
  return out;
}

function parseWatchingSection(text) {
  return text.split('\n').filter(l => l.includes('🔍')).map(line => {
    const m = line.match(/🔍\s*Search YouTube:\s*\*\*"([^"]+)"\*\*(.*)/);
    return m ? { id:`w_${Math.random().toString(36).substr(2,8)}`, searchTerm:m[1], description:m[2].replace(/^[\s—–-]+/,'').trim() } : null;
  }).filter(Boolean);
}

// PROGRESS HELPERS
// ====================================================================
function getProgress(modId) {
  return { complete:false, readings:{}, watching:{}, assignmentDone:false, reflectionDone:false, notes:'', assignmentNotes:'', reflectionNotes:'', ...(state.progress[modId]||{}) };
}
function getModPct(mod) {
  const p = getProgress(mod.id);
  if (p.complete) return 100;
  let total=0, done=0;
  total+=mod.readings.length; done+=mod.readings.filter(r=>p.readings[r.id]).length;
  total+=mod.watching.length; done+=mod.watching.filter(w=>p.watching[w.id]).length;
  if (mod.assignment){total++;if(p.assignmentDone)done++;}
  if (mod.reflection){total++;if(p.reflectionDone)done++;}
  return total===0?0:Math.round((done/total)*100);
}
function getOverall() {
  if (!state.curriculum) return {complete:0,inProgress:0,total:0,pct:0};
  let complete=0,inProgress=0;
  for (const m of state.curriculum.modules) { const pct=getModPct(m); if(pct===100)complete++; else if(pct>0)inProgress++; }
  const total=state.curriculum.modules.length;
  return {complete,inProgress,total,pct:total?Math.round((complete/total)*100):0};
}
function getAttachments(modId) {
  return { admin:[], student:[], ...(state.attachments[modId]||{}) };
}
