        { id:"mwcw2", title:'Will Larson — "Staff Engineer" (talk / interview)', url:"", searchTerm:"Will Larson staff engineer writing influence irrational exuberance talk", description:"Larson writes the most useful content on engineering-adjacent communication available. His talks on how senior individual contributors create influence through writing — not authority — translate directly to the PM context. Search 'Will Larson staff engineer talk' for conference recordings." },
        { id:"mwcw3", title:'Lenny Rachitsky — "Writing for PMs" (podcast)', url:"", searchTerm:"Lenny Rachitsky podcast writing product manager communication clarity 2023 2024", description:"Lenny has done multiple episodes on the craft of clear product communication. Any from 2022–2024 are current. Search 'Lenny podcast writing PM communication' — the episodes with writers and PMs on the craft of internal documents are the most relevant." },
        { id:"mwcw4", title:"Shreyas Doshi — 'Written communication for PMs' (talk)", searchTerm:"Shreyas Doshi written communication product managers clarity alignment decision docs talk", description:"Shreyas's most complete framework on PM writing — his pre-mortem template, decision doc format, and thinking on how to create alignment through documents rather than meetings. Multiple conference recordings exist. His distinction between communicating to inform vs. to align is the most useful one available." },
        { id:"mwcw5", title:"First Round Capital — 'How the best PMs communicate' (interview)", searchTerm:"First Round Capital product manager writing communication clarity spec review interview talk", description:"First Round's podcast and YouTube content on PM craft consistently reflects what they see in the best PMs across their portfolio. Their interviews on document writing and communication are directly applicable to building the brief in this module's assignment." },
        { id:"mwcw6", title:"Y Combinator — 'How to communicate like a top PM' (lecture)", searchTerm:"Y Combinator product manager communication writing clarity executive alignment press release FAQ lecture", description:"YC's lecture on PM communication covers the exact gap between what junior PMs produce (feature lists) and what senior PMs produce (decision documents). The press release / FAQ method is explained in practical terms — more accessible than reading the Working Backwards book." },
        { id:"mwcw7", title:"Product School — 'Writing your PM brief and spec' (talk)", searchTerm:"Product School writing product brief spec PRD one pager PM communication 2023 2024", description:"Product School uploads talks specifically on PM writing craft — how to write specs that get engineers aligned, one-pagers that get executives to make decisions, and briefs that survive contact with reality. Multiple speakers across different company types." },
        { id:"mwcw8", title:"Exponent — PM Mock Interview: Communication and Case Study Walkthrough", searchTerm:"Exponent mock PM interview case study communication structure walk me through product brief", description:"Communication is tested in every PM interview — but rarely prepared for explicitly. Exponent's interviews on 'walk me through how you'd scope this project' and 'how would you write a PRD for X' are the most useful preparation for this module's assignment under pressure." }
      ],
      assignment:"Take your strongest assignment from any prior module and rewrite it as a professional product brief.\n\n**Brief structure (fit onto one page — excluding appendix):**\n1. Problem statement (2–3 sentences): what is broken and what is the evidence?\n2. Proposed approach (1 short paragraph): what are you building, and why this approach over alternatives?\n3. Success looks like (3 bullet points, each measurable within 30 days)\n4. Out of scope (at least 2 explicit exclusions with brief rationale)\n5. Open questions (2–3 things that must be resolved before or during build)\n6. Appendix: prior assignment as supporting evidence\n\nIf the brief won't fit on one page, the thinking isn't tight enough yet.\n\nThen: read it as if you're an engineer who has never spoken to you. Would you know exactly what to build, and exactly what done looks like?",
      reflection:"Think about a project you've been part of that went wrong due to miscommunication. What would a well-written brief have prevented? What does the gap between what was communicated and what was understood tell you about where the real failure was?"
    },
    {
      id:"m8", number:11,
      title:"Metrics, Evaluation & North Star Thinking",
      subtitle:"Defining what success actually looks like. Then building the rigour to measure it honestly.",
      whyItMatters:"AI product metrics are genuinely different from what most senior PMs learned earlier in their careers. Understanding evals, evaluation frameworks, and AI-specific north star thinking is not just technical knowledge. It is the difference between a PM who sounds credible in an AI product interview and one who actually is.",
      artifact: "Metrics Framework + Weekly Review Template",
      rubric: { weak: "Chose a north star metric that's easy to measure, not one that tracks real value. The north star could apply to any product. No input metrics defined. Nothing deliberately excluded from the framework. The weekly review template is a to-do list with dates.", strong: "The north star is specific enough that a team could debate whether a given feature moves it. Named at least two leading input metrics that predict the north star. Explicitly listed one metric you're choosing NOT to track and explained the strategic reason. The review template would let a team make a real tradeoff call.", selfCheck: "Is my north star specific enough that I could argue about whether a feature moves it?\nCan I name a feature that improves vanity metrics but does NOT move my north star?\nWhat am I deliberately choosing not to measure — and why is that a better choice?" },
      readings: [
        { id:"m8r1", number:"1", title:"Hamel Husain — everything on evals", url:"https://hamel.dev", searchTerm:"", type:"verified", description:"Read all his evaluation-related posts. Specifically: \"Your AI Product Needs Evals\" and any follow-ups." },
        { id:"m8r2", number:"2", title:'"North Star Playbook" — Amplitude', url:"https://amplitude.com/northstar", searchTerm:"", type:"verified", description:"Free guide. Amplitude's framework for defining metrics that actually matter. Read the whole thing." },
        { id:"m8r3", number:"3", title:"Shreyas Doshi — Input vs Output Metrics", url:"", searchTerm:"Shreyas Doshi input metrics output metrics", type:"search", description:"Distinguishing metrics you can move from metrics that move because you moved other things." },
        { id:"m8r4", number:"4", title:"RAGAS — AI Evaluation Framework", url:"https://docs.ragas.io", searchTerm:"", type:"verified", description:"Open source framework for evaluating RAG-based AI systems. Read the conceptual docs." },
        { id:"m8r5", number:"5", title:'DeepLearning.AI: "Evaluating and Debugging Generative AI"', url:"https://www.deeplearning.ai/short-courses/evaluating-debugging-generative-ai/", searchTerm:"", type:"verified", description:"Free. Do this course in full. Directly addresses your Micro1 gap." },
        { id:"m8r6", number:"6", title:'Evan Miller — "How Not to Run an A/B Test"', url:"https://www.evanmiller.org/how-not-to-run-an-ab-test.html", searchTerm:"", type:"verified", description:"The most important practical statistics piece available for PMs. The core problem: peeking at your experiment while it's running and stopping when it looks significant produces wrong results at an alarming rate. Every PM who has ever run an A/B test needs to read this. 10 minutes." },
        { id:"m8r7", number:"7", title:'Reforge — "Cohort Analysis" (free article)', url:"https://www.reforge.com/blog/cohort-analysis", searchTerm:"Reforge cohort analysis product metrics retention", type:"verified", description:"The practitioner-level guide to cohort analysis — the most useful analytical technique for understanding retention, engagement, and long-term product health. Reading about north stars and input metrics is the theory; cohort analysis is where it meets real data." }
      ],
      watching: [
        { id:"m8w1", title:"John Doerr — 'Why the Secret to Success Is Setting the Right Goals' (TED)", url:"https://www.ted.com/talks/john_doerr_why_the_secret_to_success_is_setting_the_right_goals", searchTerm:"John Doerr TED OKRs goals success", description:"11 min. The investor who brought OKRs to Google. This is the most persuasive short argument for why measurement discipline matters and how to think about it at the goal level, not just the metric level." },
        { id:"m8w2", title:"Brian Balfour — 'North Star Metric' (Reforge / YouTube)", url:"", searchTerm:"Brian Balfour north star metric Reforge growth", description:"Balfour co-founded Reforge and has the sharpest framework on growth metrics available anywhere. Search 'Brian Balfour north star metric' — his talk and articles are the best free introduction to the framework." },
        { id:"m8w3", title:"Hamel Husain — 'Your AI Product Needs Evals' (talk / podcast)", url:"", searchTerm:"Hamel Husain evals AI product talk podcast 2024", description:"Husain is the clearest practitioner writing on AI evaluation. His talk versions of the hamel.dev blog posts are more accessible than the written version. Search his name — he appears on Latent Space and other AI podcasts." },
        { id:"m8w4", title:"Lenny Rachitsky — 'How to define and measure product success' (podcast)", searchTerm:"Lenny Rachitsky podcast metrics north star product success measurement analytics 2023 2024", description:"Lenny has dedicated full episodes to metrics — including a deep-dive with Amplitude on north star frameworks and episodes on AI product measurement specifically. More grounded than any framework document. Search 'Lenny podcast metrics north star' on YouTube." },
        { id:"m8w5", title:"Shreyas Doshi — 'Input vs output metrics for PMs' (talk)", searchTerm:"Shreyas Doshi input output metrics product managers north star leading lagging indicators talk", description:"Shreyas's most-cited framework on metrics — distinguishing leading vs. lagging indicators and the traps teams fall into when optimising the wrong thing. His conference talks are clearer than the Twitter thread versions for this specific topic." },
        { id:"m8w6", title:"Brian Balfour — 'North Star Metric' (Reforge / YouTube)", searchTerm:"Brian Balfour north star metric Reforge growth loops product analytics talk", description:"Balfour co-founded Reforge and has the sharpest framework on growth metrics available anywhere. His talks on north star metrics and how to connect them to growth loops are the most rigorous free content on this topic. Search 'Brian Balfour north star metric' for multiple recordings." },
        { id:"m8w7", title:"Y Combinator — 'How to measure product success' (lecture)", searchTerm:"Y Combinator product metrics success measurement analytics startup growth lecture north star", description:"YC's lecture on what numbers to track and how to know if a startup is actually working. The framing on 'the one number that matters' is the most useful condensation of north star thinking in 30 minutes. Directly applicable to the metrics framework assignment." },
        { id:"m8w8", title:"Exponent — PM Mock Interview: Metrics and Measurement", searchTerm:"Exponent mock PM interview metrics measurement north star success analytics how to measure", description:"Exponent's metrics mock interviews are among their most-watched: 'how would you measure success of X feature?', 'what's the north star for Instagram Stories?', 'your DAU dropped 20% — walk me through your analysis'. The evaluation framework from this module is exactly what the interviewer is checking for." }
      ],
      assignment:"Build the full metrics framework for this product.\n\n1. Define the North Star Metric. Hint: it's probably not DAU or revenue — what does \"learning actually happened\" look like as a measurable signal? What's the difference between activity (opened the app) and outcome (can do something they couldn't do before)?\n\n2. Build the metric tree: what 3–4 input metrics drive the North Star? What are the leading indicators you'd watch weekly vs. the lagging indicators you'd check monthly?\n\n3. Define what \"success at 90 days\" looks like for a single user — and write down exactly how you'd know from data alone, without asking them.\n\n4. Name 2 vanity metrics that would be tempting to track (and celebrate) but would be actively misleading about whether the product is working.\n\n5. Write the weekly product review template: the 5 numbers you'd open every Monday and the 3 questions you'd ask about them.\n\nOne page. This is the second portfolio artifact.",
      reflection:"Think about a time you were given the wrong metric to optimise for. What happened? What would you have measured instead?"
    },
    {
      id:"m9", number:12, spine: true,
      title:"Career Thesis",
      subtitle:"Only when you are ready. The point of the curriculum is the decision it sets up.",
      whyItMatters:"All the structured thinking in the prior modules should not end in portfolio assembly. It should end in a sharper answer to the question that started the whole thing: what should I do next? This module turns everything you have produced into a personal decision document. The portfolio is the byproduct, not the goal.",
      artifact: "Career Thesis Document",
      rubric: { weak: "CV in narrative form. Claims broad expertise across many domains. Doesn't make a specific bet on where PM value is going. A 25-year-old applying for the same roles could write an equivalent document with different job titles.", strong: "Makes a specific claim about where senior PM value is going in the next 3–5 years and positions your background as evidence for that bet — not just a list of credentials. The portfolio tells a coherent story across modules, not a greatest hits. The thesis would mean something different coming from you than from someone else with a similar title.", selfCheck: "Does my career thesis make a bet that someone could disagree with?\nWould a hiring manager understand why they need me specifically — not just a senior PM with similar years?\nDo the artifacts across modules tell a coherent story, or are they just evidence of completing tasks?" },
      readings: [
        { id:"m9r1", number:"1", title:"Designing Your Life — Bill Burnett & Dave Evans (Stanford)", url:"https://designingyour.life/the-book/", searchTerm:"", type:"verified", description:"The Stanford d.school methodology applied to career decisions. Read the Odyssey Plans chapter specifically — it's the most practically useful framework for someone at a career inflection point. The site has free exercises." },
        { id:"m9r2", number:"2", title:"Paul Graham — 'How to Do What You Love'", url:"http://paulgraham.com/love.html", searchTerm:"", type:"verified", description:"One of the most honest essays about work and meaning available. Graham is blunt about the difference between prestige and genuine interest. 20-minute read that will probably make you think about something uncomfortable." },
        { id:"m9r3", number:"3", title:"Paul Graham — 'What You'll Wish You'd Known'", url:"http://paulgraham.com/hs.html", searchTerm:"", type:"verified", description:"Ostensibly a high school talk but the insight on how to think about career direction applies at any age. Read alongside 'How to Do What You Love'. Graham's essays are the best free career thinking available." },
        { id:"m9r4", number:"4", title:'"So Good They Can\'t Ignore You" — Cal Newport (summary)', url:"", searchTerm:"Cal Newport So Good They Cant Ignore You career capital summary", type:"search", description:"Newport's career capital framing directly challenges 'follow your passion' and replaces it with something more useful. The full book is ~$15; strong free summaries are widely available. The argument is what matters, not the prose." },
        { id:"m9r5", number:"5", title:"Lenny Rachitsky — 'How to get a product job at a top company'", url:"https://www.lennysnewsletter.com/p/how-to-get-a-product-job", searchTerm:"Lenny Rachitsky how to get a PM job top company", type:"verified", description:"Lenny surveyed hundreds of PMs and hiring managers specifically on what actually gets someone the job. More rigorous than most career advice. Relevant to both what to build in your portfolio and how to position yourself." }
      ],
      watching:[
        { id:"m9w1", title:"Bill Burnett — 'Designing Your Life' (Stanford lecture, YouTube)", url:"", searchTerm:"Bill Burnett designing your life Stanford lecture YouTube", description:"The full Stanford class lecture is available on YouTube. More practical than the TED format — he works through the actual exercises. Search 'Bill Burnett Designing Your Life Stanford' — the university has uploaded it officially." },
        { id:"m9w2", title:"Simon Sinek — 'How Great Leaders Inspire Action' (TED)", url:"https://www.ted.com/talks/simon_sinek_how_great_leaders_inspire_action", searchTerm:"Simon Sinek start with why TED", description:"18 min. The 'Start with Why' talk. Directly useful for articulating your career thesis — what you believe, not just what you've done. The framing exercise for the Career Thesis document." },
        { id:"m9w3", title:"Reid Hoffman — 'The Start-Up of You' (talk)", url:"", searchTerm:"Reid Hoffman startup of you career strategy talk LinkedIn", description:"LinkedIn's co-founder on treating your career like a startup — including when to pivot. His framework for 'plan A, plan B, plan Z' is the most practical career risk management model available." },
        { id:"m9w4", title:"Lenny Rachitsky — 'How to get a PM job at a top company' (podcast)", searchTerm:"Lenny Rachitsky podcast get PM job top company hiring product manager career search 2024", description:"Lenny surveyed hundreds of PMs and hiring managers specifically on what actually gets candidates the job — not what career coaches say, but what practitioners report. His specific findings on portfolio, networking, and positioning are more useful than any generic job search advice." },
        { id:"m9w5", title:"Shreyas Doshi — 'How to position yourself as a senior PM' (interview)", searchTerm:"Shreyas Doshi senior PM positioning career job search product manager interview preparation 2023", description:"Shreyas's advice on how to articulate your value as a senior PM — including how to make a career re-entry or pivot readable as a strength rather than a gap. Multiple interview formats on YouTube. Most directly relevant to writing your career thesis." },
        { id:"m9w6", title:"Y Combinator — 'How to evaluate job opportunities' (lecture)", searchTerm:"Y Combinator evaluate job opportunity startup join early stage company career decision lecture", description:"YC's lecture on how to think through career decisions — specifically how to evaluate whether a role is worth taking, including the questions to ask that most candidates don't. Michael Seibel and others on the specific signals that distinguish good opportunities from good-sounding ones." },
        { id:"m9w7", title:"First Round Capital — 'Career advice for senior PMs' (interview)", searchTerm:"First Round Capital career advice senior product manager PM job search positioning re-entry", description:"First Round's podcast content on PM career development is particularly useful for senior PMs — they see hundreds of PM candidates across their portfolio companies. Their interviews on what distinguishes great senior PM candidates from merely experienced ones are directly applicable." },
        { id:"m9w8", title:"Exponent — PM Mock Interview: Career Narrative and Tell Me About Yourself", searchTerm:"Exponent mock PM interview career transition tell me about yourself narrative positioning career break", description:"Exponent's career narrative mock interviews are specifically designed for PMs making transitions. Their coaching on how to frame career gaps, pivots, and re-entries as coherent stories rather than explanations is the most practical preparation for the 'tell me about yourself' question you'll face." }
      ],
      assignment:"Write the Career Thesis. Reference your own work across the prior modules.\n\nStructure (1,200 words):\n- The role you are going after: org type, stage, domain, team shape\n- The working conditions you need (from Module 7 + Module 0 Operating Manual)\n- Your commercial logic (from Module 5): how you now think about value creation\n- Your AI thesis (from Module 6): where you place your bet\n- Three things you are explicitly saying no to\n- The first 90 days plan if you got the role\n- The 12-month bet: where you want to be\n\nEnd with two sentences:\n1. \"The role I am going after looks like ___.\"\n2. \"If I take a role that does not satisfy ___, ___, and ___, I am making a worse decision than waiting.\"\n\nThis is the artifact that justifies the whole curriculum. Treat it that way.",
      reflection:"Having read, watched, built, and thought through all of this:\n\nDo you want to be a PM?\n\nNot should you. Not what does the market want. Not what makes a good salary.\n\nDo you want it?\n\nWrite the answer down, privately, before you apply for anything."
    },
    {
      id:"m10",
      number:13,
      title:"Build Log & Publishing",
      subtitle:"Your private writing space. Drafts, ideas, and shipping decisions at your own pace.",
      whyItMatters:"A scratchpad for writing you might one day publish. Posts, essays, interview answers, product announcements. No content calendar, no pressure to ship. Just a place to accumulate raw material so that when you are ready, you are starting from a draft, not a blank page.\n\nWrite when you want. Delete what does not serve you. Ship when it feels right.",
      artifact: "Two to three public-ready drafts",
      rubric: { weak: "Chronological diary of what was built. Written for an audience who already knows the project. No decision inflection points — just progress updates. Reads like a README or commit log, not a case study. Comfortable to share.", strong: "Shows at least one moment where you changed direction and explains the reasoning. A reader who doesn't know the project can follow a key product decision. Captures something that didn't work and what you learned. Uncomfortable enough to publish that you hesitated.", selfCheck: "Can someone unfamiliar with this project understand a key decision I made — not just what I built?\nDid I document a failure or course correction, or only progress?\nWould I be slightly nervous sharing this? (if no: probably not honest enough)" },
      readings:[
        { id:"m10r1", number:"1", title:"Paul Graham — 'Write Simply'", url:"http://paulgraham.com/simply.html", searchTerm:"", type:"verified", description:"5-minute read. The best single piece of writing advice available anywhere. The argument: if you can't say it simply, you don't understand it. Directly relevant to the kind of writing that builds a public reputation." },
        { id:"m10r2", number:"2", title:"Paul Graham — 'Putting Ideas into Words'", url:"http://paulgraham.com/words.html", searchTerm:"", type:"verified", description:"Short. Graham's argument that writing is thinking — that you don't know what you believe until you've had to write it down. The reason this module exists." },
        { id:"m10r3", number:"3", title:"David Perell — 'The Ultimate Guide to Writing Online'", url:"https://perell.com/essay/the-ultimate-guide-to-writing-online/", searchTerm:"", type:"verified", description:"The most comprehensive free guide to building a writing habit and publishing online. Perell has helped thousands of people publish their first serious essay. Long — read the sections on finding your niche and the feedback loop." },
        { id:"m10r4", number:"4", title:"Kevin Kelly — '1,000 True Fans' (essay)", url:"https://kk.org/thetechnium/1000-true-fans/", searchTerm:"", type:"verified", description:"The foundational argument for why a small, specific audience is more valuable than a large, general one. Directly applicable to how to think about publishing during a career re-entry — you don't need millions of readers." },
        { id:"m10r5", number:"5", title:"Lenny Rachitsky — 'How I write' (newsletter)", url:"https://www.lennysnewsletter.com/p/how-i-write", searchTerm:"Lenny Rachitsky how I write newsletter process", type:"verified", description:"Lenny built one of the most valuable paid newsletters in the PM world. This piece on his actual process is the most practical writing-for-PM-audience guide available. He writes in public about the same topics you'll be writing about." }
      ],
      watching:[
        { id:"m10w1", title:"David Perell — 'Why You Should Write Online' (YouTube)", url:"", searchTerm:"David Perell why you should write online talk", description:"His foundational talk on the case for building a writing practice and publishing. More motivating than instructional — watch this when you're procrastinating on starting." },
        { id:"m10w2", title:"Seth Godin — 'How to Get Your Ideas to Spread' (TED)", url:"https://www.ted.com/talks/seth_godin_how_to_get_your_ideas_to_spread", searchTerm:"Seth Godin ideas spread TED", description:"17 min. Godin on what makes ideas worth spreading and why remarkable beats safe. Directly applicable to deciding what to publish and how to position it." },
        { id:"m10w3", title:"Paul Graham — interviews on writing and startups (YouTube)", url:"", searchTerm:"Paul Graham interview writing startups 2023 2024", description:"Graham rarely gives formal talks but does long-form interviews. Any interview from the last 3 years is worth watching — his clarity of thought on communication is the thing to study, not just the content." },
        { id:"m10w4", title:"Nathan Barry — 'Building in Public' (ConvertKit / YouTube talk)", searchTerm:"Nathan Barry building in public creator economy ConvertKit audience writing talk", description:"Nathan Barry (ConvertKit founder) on how documenting the build process creates trust faster than any marketing strategy. His framework for what to share, how to share failures, and what building in public actually looks like for a product person is the most direct model for what this module could become." },
        { id:"m10w5", title:"Lenny Rachitsky — 'How I built my newsletter' (interview)", searchTerm:"Lenny Rachitsky how built newsletter audience writing online product process interview 2022 2023", description:"Lenny built one of the most valuable paid newsletters in the PM world starting from scratch. His interviews on the process — what he wrote about, how he found his audience, what he'd do differently — are the most directly relevant model for someone starting to write about PM publicly." },

// INDEXEDDB — fallback blob store for unauthenticated / offline use
// ====================================================================
const IDB_NAME = 'pm_curriculum_attachments';
const IDB_VERSION = 1;
const IDB_STORE = 'files';
let _idb = null;

function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror = e => rej(e.target.error);
  });
}

async function idbPut(blob, meta) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    const req = store.add({ ...meta, data: blob });
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function idbGet(id) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(id);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

async function idbDelete(id) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

async function idbDeleteMany(ids) {
  for (const id of ids) { try { await idbDelete(id); } catch(e) {} }
}

const LS_KEY = 'pm_curriculum_v2';
const VALID_TABS = new Set(['reading','watching','assignment','reflection','evaluate','attachments','notes']);

let state = {
  mode: 'student',
  curricula: [],          // [{ id, source, ...curriculumShape }]
  activeCurriculumId: null,
  progress: {},           // { [curriculumId]: { [modId]: { ... } } }
  attachments: {},        // { [curriculumId]: { [modId]: { admin: [], student: [] } } }
  selectedModule: null,
  activeTab: 'reading'
};

// ── Active-curriculum accessors (always use these instead of state.curriculum) ──
function activeCurriculum() {
  return state.curricula?.find(c => c.id === state.activeCurriculumId) || null;
}
function activeProgress() {
  // Returns the progress map for the active curriculum (by reference — mutations persist)
  return state.progress[state.activeCurriculumId] || {};
}
function activeAttachments() {
  // Returns the attachments map for the active curriculum (by reference)
  return state.attachments[state.activeCurriculumId] || {};
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);

    // ── One-time migration: single-curriculum → multi-curriculum shape ──
    if (d.curriculum && !d.curricula) {
      // Safety backup before migrating (written once, never touched again)
      try { localStorage.setItem(LS_KEY + '_backup', raw); } catch(_) {}
      const legacyId = 'canon-pm-2026';
      const seed = { id: legacyId, source: 'canon', ...d.curriculum };
      d.curricula          = [seed];
      d.activeCurriculumId = legacyId;
      d.progress           = { [legacyId]: d.progress    || {} };
      d.attachments        = { [legacyId]: d.attachments || {} };
      delete d.curriculum;
      // Write migrated shape immediately so this never runs again
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(_) {}
    }

    state.curricula          = d.curricula          || [];
    state.activeCurriculumId = d.activeCurriculumId || null;
    state.progress           = d.progress           || {};
    state.attachments        = d.attachments        || {};
    state.darkMode           = d.darkMode           || false;
  } catch(e) {}
}

function _writeLocalStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      curricula:          state.curricula,
      activeCurriculumId: state.activeCurriculumId,
      progress:           state.progress,
      attachments:        state.attachments,
      darkMode:           state.darkMode
    }));
  } catch(e) { console.warn('localStorage save failed', e); }
}

function saveState() {
  _writeLocalStorage();
  // Debounced cloud push (only when signed in)
  if (_currentUser && _sb) {
    _setSyncDot('syncing');
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => _pushToCloud(), 1800);
  }
}

// ── Cloud sync helpers ───────────────────────────────────────────────────────
function _setSyncDot(state_) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state_ ? ' ' + state_ : '');
}

async function _pushToCloud() {
  if (!_sb || !_currentUser) return;
  try {
    const { error } = await _sb.from('user_state').upsert({
      user_id:          _currentUser.id,
      // Wrap curricula in a versioned envelope so _syncFromCloud can detect old vs new shape
      curriculum:       { v: 2, curricula: state.curricula, activeCurriculumId: state.activeCurriculumId },
      progress:         state.progress,           // { [curriculumId]: { [modId]: {...} } }
      attachments_meta: state.attachments         // { [curriculumId]: { [modId]: {...} } }
    }, { onConflict: 'user_id' });
    if (error) throw error;
    _setSyncDot('synced');
    setTimeout(() => _setSyncDot(''), 2000);
  } catch(e) {
    console.warn('Cloud push failed', e);
    _setSyncDot('');
  }
}

async function _syncFromCloud() {
  if (!_sb || !_currentUser) return;
  try {
    const [userRes, canonRes] = await Promise.all([
      _sb.from('user_state')
        .select('curriculum, progress, attachments_meta')
        .eq('user_id', _currentUser.id)
        .maybeSingle(),
      _sb.from('canonical_curriculum')
        .select('curriculum')
        .eq('id', 1)
        .maybeSingle()
    ]);

    const userData  = userRes.data;
    const canonical = canonRes.data?.curriculum || null;

    if (!userData) {
      // First login — apply canonical curriculum and seed cloud
      if (canonical) {
        canonical.id = 'canon-pm-2026'; canonical.source = 'canon';
        const idx = state.curricula.findIndex(c => c.id === 'canon-pm-2026');
        if (idx >= 0) state.curricula[idx] = canonical; else state.curricula.push(canonical);
        if (!state.activeCurriculumId) state.activeCurriculumId = 'canon-pm-2026';
      }
      await _pushToCloud();
      return;
    }

    // ── Detect and migrate old vs new cloud shape ──
    const raw = userData.curriculum;
    if (raw?.v === 2) {
      // New multi-curriculum format
      state.curricula          = raw.curricula          || state.curricula;
      state.activeCurriculumId = raw.activeCurriculumId || state.activeCurriculumId;
      if (userData.progress)         state.progress    = userData.progress;
      if (userData.attachments_meta) state.attachments = userData.attachments_meta;
    } else if (raw) {
      // Old single-curriculum format — migrate to multi-curriculum shape
      const legacyId = 'canon-pm-2026';
      state.curricula          = [{ id: legacyId, source: 'canon', ...raw }];
      state.activeCurriculumId = legacyId;
      // Guard against double-nesting: if progress already looks like { [curriculumId]: {...} } use it directly
      const prog = userData.progress || {};
      state.progress    = prog[legacyId] ? prog : { [legacyId]: prog };
      const att  = userData.attachments_meta || {};
      state.attachments = att[legacyId]  ? att  : { [legacyId]: att  };
      // Push migrated state back to Supabase so we never re-migrate on next login
      _needsCloudMigration = true;
    }

    // ── Apply canonical curriculum for non-admin users ──
    if (!_isAdmin() && canonical) {
      canonical.id = 'canon-pm-2026'; canonical.source = 'canon';
      const idx = state.curricula.findIndex(c => c.id === 'canon-pm-2026');
      if (idx >= 0) state.curricula[idx] = canonical; else state.curricula.push(canonical);
      if (!state.activeCurriculumId) state.activeCurriculumId = 'canon-pm-2026';
    }

    _writeLocalStorage();
    // Push migrated state to cloud so Supabase is in new format for next login
    if (_needsCloudMigration) { _needsCloudMigration = false; await _pushToCloud(); }
  } catch(e) {
    console.warn('Sync from cloud failed', e);
  }
}

async function initAuth() {
  _initSupabase();

  if (!_sb) {
    // Supabase SDK didn't load (offline / CDN failure) — run in local mode
    _hideAuthScreen();
    return;
  }

  // Listen for auth state changes (handles OAuth callbacks, token refresh, etc.)
  _sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
      _currentUser = session.user;
      _updateUserBadge();
    } else if (event === 'SIGNED_OUT') {
      _currentUser = null;
      _updateUserBadge();
      _showAuthScreen();
    }
  });

  // Check for existing session
  const { data: { session } } = await _sb.auth.getSession();
  if (session?.user) {
    _currentUser = session.user;
    await _syncFromCloud();
    _applyStateAfterSync();
    _hideAuthScreen();
  } else {
    _showAuthFormInOverlay();
  }
}

    const idx = (state.curricula||[]).findIndex(c => c.id === 'canon-pm-2026');
    if (idx >= 0) state.curricula[idx] = seed; else { state.curricula = [seed]; }
    state.activeCurriculumId = 'canon-pm-2026';
    if (!state.progress['canon-pm-2026']) state.progress['canon-pm-2026'] = {};
    if (!state.attachments['canon-pm-2026']) state.attachments['canon-pm-2026'] = {};
    _needsCloudMigration = true;

  // Re-run module + progress migrations in case cloud data is from an older version
  const cur = activeCurriculum();
  const cid = state.activeCurriculumId;
  if (cur && !cur.modules.find(m => m.id === 'm10')) {
    const pubMod = CANONICAL_CURRICULUM.modules.find(m => m.id === 'm10');
    if (pubMod) cur.modules.push(JSON.parse(JSON.stringify(pubMod)));

  if (cid) {
    if (!state.progress[cid]) state.progress[cid] = {};

  const suBtn   = document.getElementById('authTabSignUp');
  const title   = document.getElementById('authTitle');
  const sub     = document.getElementById('authSubtitle');
  const submit  = document.getElementById('authSubmitBtn');
  const msg     = document.getElementById('authMsg');
  if (siBtn) siBtn.classList.toggle('active', tab === 'signin');
  if (suBtn) suBtn.classList.toggle('active', tab === 'signup');
  if (title)  title.textContent  = tab === 'signin' ? 'Welcome back' : 'Create account';
  if (sub)    sub.textContent    = tab === 'signin'
    ? 'Sign in to sync your progress across devices'
    : 'Create your Canon account';
  if (submit) submit.textContent = tab === 'signin' ? 'Sign in' : 'Create account';
  if (msg) { msg.textContent = ''; msg.className = 'auth-msg info'; }
  // Update password autocomplete
  const pw = document.getElementById('authPassword');
  if (pw) pw.autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
}

async function handleAuthSubmit(e) {
  e.preventDefault();
  if (!_sb) return;
  const email    = document.getElementById('authEmail')?.value.trim();
  const password = document.getElementById('authPassword')?.value;
  const btn      = document.getElementById('authSubmitBtn');
  const msg      = document.getElementById('authMsg');
  if (!email || !password) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="auth-spinner"></span>' + (_authMode === 'signin' ? 'Signing in…' : 'Creating account…');
  if (msg) { msg.textContent = ''; msg.className = 'auth-msg info'; }

  try {
    if (_authMode === 'signin') {
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      // onAuthStateChange will fire — but let's sync and show app directly
      const { data: { session } } = await _sb.auth.getSession();
      if (session?.user) {
        _currentUser = session.user;
        if (msg) { msg.textContent = '✓ Signed in. Loading your data…'; msg.className = 'auth-msg success'; }
        await _syncFromCloud();
        _applyStateAfterSync();
        _hideAuthScreen();
      }
    } else {
      const { error } = await _sb.auth.signUp({ email, password });
      if (error) throw error;
      if (msg) {
        msg.textContent = '✓ Account created. Check your email for a confirmation link, then sign in.';
        msg.className = 'auth-msg success';
      }
      // Switch to sign-in view
      switchAuthTab('signin');
    }
  } catch(err) {
    if (msg) {
      msg.textContent = err.message || 'Something went wrong. Please try again.';
      msg.className = 'auth-msg error';
    }
  } finally {
    btn.disabled = false;
    btn.textContent = _authMode === 'signin' ? 'Sign in' : 'Create account';
  }
}

async function handleSignOut() {
  if (!_sb) return;
  try {
    await _sb.auth.signOut();
    // onAuthStateChange fires and calls _showAuthScreen()
  } catch(e) {
    showToast('Sign out failed — please try again');
  }
}

// ====================================================================
// MARKDOWN PARSER
// ====================================================================
function parseMarkdown(md) {
  const curriculum = { title: 'PM Curriculum', subtitle: '', modules: [] };
  const titleMatch = md.match(/^# ([^#\n]+)$/m);
  if (titleMatch) curriculum.title = titleMatch[1].trim();
  const subtitleMatch = md.match(/^### ([^\n]+)/m);
  if (subtitleMatch) curriculum.subtitle = subtitleMatch[1].trim();

  const modRegex = /# MODULE (\d+):\s*(.+)/g;
  const positions = [];
  let m;
  while ((m = modRegex.exec(md)) !== null) positions.push({ index: m.index, number: parseInt(m[1]), title: m[2].trim() });

  for (let i = 0; i < positions.length; i++) {
    const section = md.slice(positions[i].index, i + 1 < positions.length ? positions[i+1].index : md.length);
    const mod = { id:`m${positions[i].number}`, number:positions[i].number, title:positions[i].title, subtitle:'', whyItMatters:'', artifact:'', readings:[], watching:[], assignment:'', reflection:'' };
    const subMatch = section.match(/^# MODULE[^\n]*\n\*([^\n*]+)\*/m);
    if (subMatch) mod.subtitle = subMatch[1].trim();
    const whyMatch = section.match(/\*\*Why this matters[^*]*\*\*[^\n]*\n([\s\S]*?)(?=\n---)/);
    if (whyMatch) mod.whyItMatters = whyMatch[1].trim();
    const parts = section.split(/\n### /);
    for (const p of parts) {
      const header = p.split('\n')[0].trim().toLowerCase();
      const content = p.split('\n').slice(1).join('\n').trim();
      if (header === 'reading') mod.readings = parseReadingSection(content);
      else if (header === 'watching') mod.watching = parseWatchingSection(content);
      else if (header === 'assignment') mod.assignment = content;
      else if (header.startsWith('reflection')) mod.reflection = content;
    }
    curriculum.modules.push(mod);
  }
  return curriculum;
}

function parseReadingSection(text) {
  const out = [];
  for (const part of text.split(/(?=\*\*\d+\.)/)) {
    if (!part.trim()) continue;
    const nm = part.match(/^\*\*(\d+)\.\s+(.*?)\*\*/);
    if (!nm) continue;
    const r = { id:`r_${Math.random().toString(36).substr(2,8)}`, number:nm[1], title:nm[2].trim(), url:'', searchTerm:'', type:'search', description:'' };
    const urlM = part.match(/✅\s*(https?:\/\/[^\s\n]+)/); if (urlM) { r.url=urlM[1]; r.type='verified'; }
    const srchM = part.match(/🔍\s*Search:\s*"([^"]+)"/); if (srchM) r.searchTerm=srchM[1];
    r.description = part.split('\n').slice(1).filter(l => !l.match(/^✅|^🔍/) && l.trim()!=='---').join('\n').trim();
    out.push(r);
  }
  return out;
}

function parseWatchingSection(text) {
  return text.split('\n').filter(l => l.includes('🔍')).map(line => {
    const m = line.match(/🔍\s*Search YouTube:\s*\*\*"([^"]+)"\*\*(.*)/);
    return m ? { id:`w_${Math.random().toString(36).substr(2,8)}`, searchTerm:m[1], description:m[2].replace(/^[\s—–-]+/,'').trim() } : null;
  }).filter(Boolean);
}

// ====================================================================
// PROGRESS HELPERS
// ====================================================================
function getProgress(modId) {
  return { complete:false, readings:{}, watching:{}, assignmentDone:false, reflectionDone:false, notes:'', assignmentNotes:'', reflectionNotes:'', rejected:{readings:{},watching:{}}, ...(activeProgress()[modId]||{}) };
}
function getModPct(mod) {
  const p = getProgress(mod.id);
  if (p.complete) return 100;
  let total=0, done=0;
  const rejR = p.rejected?.readings || {};
  const rejW = p.rejected?.watching || {};
  const activeR = mod.readings.filter(r=>!rejR[r.id]);
  const activeW = mod.watching.filter(w=>!rejW[w.id]);
  total+=activeR.length; done+=activeR.filter(r=>p.readings[r.id]).length;
  total+=activeW.length; done+=activeW.filter(w=>p.watching[w.id]).length;
  if (mod.assignment){total++;if(p.assignmentDone)done++;}
  if (mod.reflection){total++;if(p.reflectionDone)done++;}
  return total===0?0:Math.round((done/total)*100);
}
function toggleRejected(modId, type, id) {
  ensureP(modId);
  const p = activeProgress()[modId];
  if (!p.rejected) p.rejected = {readings:{},watching:{}};
  if (!p.rejected[type]) p.rejected[type] = {};
  p.rejected[type][id] = !p.rejected[type][id];
  if (!p.rejected[type][id] && p.skipReasons?.[type]?.[id]) delete p.skipReasons[type][id];
  saveState(); render();
}
function getOverall() {
  const cur = activeCurriculum();
  if (!cur) return {complete:0,inProgress:0,total:0,pct:0};
  let complete=0,inProgress=0;
  for (const m of cur.modules) { const pct=getModPct(m); if(pct===100)complete++; else if(pct>0)inProgress++; }
  const total=cur.modules.length;
  return {complete,inProgress,total,pct:total?Math.round((complete/total)*100):0};
}
function getAttachments(modId) {
  return { admin:[], student:[], ...(activeAttachments()[modId]||{}) };
}
function ensureP(id){
  const cid = state.activeCurriculumId;
  if(!state.progress[cid]) state.progress[cid]={};
  if(!state.progress[cid][id]) state.progress[cid][id]={readings:{},watching:{}};
  if(!state.progress[cid][id].readings) state.progress[cid][id].readings={};
  if(!state.progress[cid][id].watching) state.progress[cid][id].watching={};
}

function handleAddCurrMdFile(input) {
  const file = input.files[0]; if (!file) return;
  const msgEl = document.getElementById('addCurrUploadMsg');
  if (msgEl) msgEl.textContent = `Reading ${file.name}…`;
  const isJson = file.name.toLowerCase().endsWith('.json');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let c;
      if (isJson) {
        const data = JSON.parse(e.target.result);
        if (!data.modules || !Array.isArray(data.modules) || !data.modules.length) {
          if (msgEl) msgEl.textContent = '⚠️ No modules found. JSON must have a "modules" array.'; return;
        }
        c = { title: data.title || 'Imported Curriculum', subtitle: data.subtitle || '', paceNote: data.paceNote || '', modules: data.modules };
      } else {
        c = parseMarkdown(e.target.result);
        if (!c.modules.length) { if (msgEl) msgEl.textContent = '⚠️ No modules found. Modules must start with "# MODULE N: Title".'; return; }
      }
      c.id = 'user-' + Date.now();
      c.source = 'upload';
      state.curricula.push(c);
      state.activeCurriculumId = c.id;
      if (!state.progress[c.id]) state.progress[c.id] = {};
      if (!state.attachments[c.id]) state.attachments[c.id] = {};
      state.selectedModule = null;
      saveState(); closeModal(); showToast(`✓ Added: ${c.title} (${c.modules.length} modules)`); render();
    } catch(err) { if (msgEl) msgEl.textContent = '✕ Error: ' + err.message; }
  };
  reader.readAsText(file);
}

function handleAddCurrMdDrop(e) {
  e.preventDefault();
  const zone = document.getElementById('addCurrMdDropZone'); if (zone) zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0]; if (!file) return;
  handleAddCurrMdFile({ files: [file] });
}

}

async function runCurriculumGenerate() {
  const bg   = document.getElementById('gf_bg')?.value.trim();
  const goal = document.getElementById('gf_goal')?.value.trim();
  const gaps = document.getElementById('gf_gaps')?.value.trim();
  const time = document.getElementById('gf_time')?.value.trim();
  const ctx  = document.getElementById('gf_ctx')?.value.trim();
  if (!bg || !goal || !gaps || !time) { showToast('Fill in the first four fields'); return; }
  _lastGenAnswers = { bg, goal, gaps, time, ctx };

  const body = document.getElementById('genFormBody');
  const footer = document.querySelector('#modalOverlay .modal-footer');
  if (body) body.innerHTML = `<div class="generate-loading">
    <div class="generate-loading-icon">✱</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:8px">Generating your curriculum…</div>
    <p style="font-size:13px;color:var(--text-muted)">This takes 20–40 seconds. Claude is designing your modules, readings, and assignments.</p>
  </div>`;
  if (footer) footer.innerHTML = '';

  const system = `You are designing a rigorous, artifact-first self-study curriculum for a specific person. Output ONLY a single valid JSON object — no markdown fences, no commentary, just JSON.

Schema:
{
  "title": "short memorable curriculum name",
  "subtitle": "one sentence describing the curriculum goal and audience",
  "paceNote": "recommended study cadence, 1-2 sentences, referencing spine module numbers",
  "modules": [
    {
      "id": "m0",
      "number": 0,
      "spine": false,
      "title": "...",
      "subtitle": "one sentence, honest not motivational",
      "whyItMatters": "2-3 sentences written to THIS person — why this module given their background and gaps",
      "artifact": "named deliverable specific enough that two people could agree whether it exists and is good",
      "rubric": {
        "weak": "what this artifact looks like if the person went through the motions — should sting slightly",
        "strong": "what it looks like if they genuinely levelled up — should feel hard to achieve",
        "selfCheck": "three yes/no questions probing specific evasions this type of person makes, one per line"
      },
      "readings": [
        {
          "id": "m0r1",
          "number": "1",
          "title": "Full title with author and publication",
          "url": "verified stable URL or empty string if uncertain",
          "searchTerm": "specific search string to find this if no URL, else empty",
          "type": "verified",
          "description": "why THIS person should read this — what assumption will it challenge?"
        }
      ],
      "watching": [
        {
          "id": "m0w1",
          "title": "Speaker — Talk Title (Platform, runtime)",
          "url": "direct link if stable (TED, MIT OCW, official YouTube), else empty",
          "searchTerm": "exact search string if no URL, else empty",
          "description": "why this talk, what it does that readings do not"
        }
      ],
      "assignment": "multi-part assignment with numbered steps, each naming a specific output",
      "reflection": "one or two questions the learner might flinch to answer honestly"
    }
  ]
}

Rules:
- 8-12 modules numbered from 0. Final module must be a synthesis/portfolio module.
- Mark 3-4 modules spine:true — the load-bearing core based on the person's gaps.
- Each module: minimum 5 readings, minimum 2 watching items.
- No placeholder resources — every item must be real and findable.
- Prioritise primary sources: HBR, MIT OpenCourseWare, TED.com, official author sites, Stripe Atlas.
- Prioritise these watching sources: Lenny Rachitsky, Shreyas Doshi, Y Combinator lectures, Exponent mock interviews, Julie Zhuo, Marty Cagan/SVPG, First Round Capital, a16z AI Summit.
- Descriptions explain WHY for this person, not WHAT the resource is.
- paceNote should reflect the stated time horizon.`;

  const userMsg = `Design a curriculum for this person:
- Background: ${bg}
- Target role / goal: ${goal}
- Specific gaps to close: ${gaps}
- Time available: ${time}${ctx ? '\n- Market / geographic context: ' + ctx : ''}`;

  try {
    const raw = await _callClaude(system, userMsg);
    const jsonStr = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    const c = JSON.parse(jsonStr);
    if (!Array.isArray(c.modules) || !c.modules.length) throw new Error('No modules in response');
    showGeneratedCurriculumPreview(c);
  } catch(err) {
    const modalEl = document.querySelector('#modalOverlay .modal');
    if (!modalEl) return;
    if (body) body.innerHTML = `<div style="padding:24px 20px">
      <p style="color:var(--red);font-size:14px;margin-bottom:16px">✕ ${esc(err.message)}</p>
      <p style="font-size:13px;color:var(--text-muted)">Check your API key in the avatar menu, or try again.</p>
    </div>`;
    if (footer) footer.innerHTML = `
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="showGenerateCurriculumModal()">Try again</button>`;
  }
}

async function _callClaude(systemPrompt, userMessage) {
  const key = getAnthropicKey();
  if (!key) throw new Error('No API key — add one in the avatar menu');
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 8000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  const data = await resp.json();
  return data.content[0].text;
}

function showGeneratedCurriculumPreview(c) {
  _pendingCurriculum = c;
  const modalEl = document.querySelector('#modalOverlay .modal');
  if (!modalEl) return;
  const moduleList = (c.modules || []).map((m,i) => `
    <div class="generate-preview-module">
      <div class="generate-preview-num">M${m.number ?? i}</div>
      <div>
        <div class="generate-preview-title">${esc(m.title)}${m.spine ? ' <span style="font-size:10px;font-weight:700;color:var(--purple);background:rgba(79,90,240,0.1);padding:1px 6px;border-radius:10px;vertical-align:middle">CORE</span>' : ''}</div>
        ${m.subtitle ? `<div class="generate-preview-sub">${esc(m.subtitle)}</div>` : ''}
      </div>
    </div>`).join('');
  modalEl.innerHTML = `
    <div class="modal-header">
      <span class="modal-title">${esc(c.title || 'Generated curriculum')}</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" style="overflow-y:auto;padding:16px 20px">
      ${c.subtitle ? `<p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">${esc(c.subtitle)}</p>` : ''}
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">${c.modules.length} modules</div>
      ${moduleList}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="showGenerateCurriculumModal()">← Regenerate</button>
      <button class="btn btn-primary" onclick="activateGeneratedCurriculum()">Use this curriculum →</button>
    </div>`;
}

function activateGeneratedCurriculum() {
  const c = _pendingCurriculum;
  if (!c) return;
  _pendingCurriculum = null;
  _lastGenAnswers = null;
  c.id = 'gen-' + Date.now();
  c.source = 'generated';
  state.curricula.push(c);
  state.activeCurriculumId = c.id;
  if (!state.progress[c.id]) state.progress[c.id] = {};
  if (!state.attachments[c.id]) state.attachments[c.id] = {};
  state.selectedModule = null;
  saveState(); closeModal(); showToast(`✓ Added: ${c.title} (${c.modules.length} modules)`); render();
}

function saveCurriculumField(field, value) {
  const cur = activeCurriculum();
  if (!cur) return;
  cur[field] = value;
  saveState();
  if (field === 'title') _updateHeaderCurriculum();
}

function _updateHeaderCurriculum() {
  const title = activeCurriculum()?.title || '';
  const center = document.getElementById('headerCurriculumCenter');
  const nameEl = document.getElementById('headerCurriculumName');
  if (center) center.style.display = title ? 'flex' : 'none';
  if (nameEl) nameEl.textContent = title;

  const listEl = document.getElementById('curriculumDropdownList');
  if (!listEl) return;
  listEl.innerHTML = '';
  (state.curricula || []).forEach(c => {
    const isActive = c.id === state.activeCurriculumId;
    const item = document.createElement('div');
    item.className = 'curriculum-dropdown-item' + (isActive ? '' : ' curriculum-item-inactive');
    item.innerHTML = `<span class="curriculum-dropdown-check">${isActive ? '✓' : ''}</span><span class="curriculum-dropdown-item-name">${esc(c.title || 'Untitled')}</span>`;
    if (!isActive) item.onclick = (e) => { e.stopPropagation(); switchCurriculum(c.id); };
    listEl.appendChild(item);
  });
}

function _updateHeaderAvatar() {
  const avatar = document.getElementById('headerAvatar');
  const initials = document.getElementById('avatarInitials');
  const email = document.getElementById('avatarDropdownEmail');
  if (!avatar) return;
  if (_currentUser) {
    avatar.style.display = 'flex';
    if (initials) initials.textContent = getInitials(_currentUser.email);
    if (email) email.textContent = _currentUser.email;
  } else {
    avatar.style.display = 'none';
  }
}

    else{badgeClass='badge-notstarted';badgeText='';}
    const items=mod.readings.length+mod.watching.length+(mod.assignment?1:0)+(mod.reflection?1:0);
    cardsHtml+=`
      <div class="module-card ${state.selectedModule===mod.id?'selected':''}" onclick="selectMod('${mod.id}')" style="--mod-color:${vis.color}">

function renderDetail(mod) {
  const p=getProgress(mod.id);
  const pct=getModPct(mod);
  const att=getAttachments(mod.id);
  const attCount=att.admin.length+att.student.length;

  const tabs=[
    {id:'reading',label:`Reading (${mod.readings.length})`,show:mod.readings.length>0},
    {id:'watching',label:`Watching (${mod.watching.length})`,show:mod.watching.length>0},
    {id:'assignment',label:'Assignment',show:!!mod.assignment},
    {id:'reflection',label:'Reflection',show:!!mod.reflection},
    {id:'evaluate',label:'Evaluate',show:!!mod.rubric},
    {id:'attachments',label:`Attachments${attCount?` (${attCount})`:''}`,show:true},
    {id:'notes',label:'Notes',show:true}
  ].filter(t=>t.show);

  const activeTab=tabs.find(t=>t.id===state.activeTab)?state.activeTab:tabs[0]?.id;
  const tabsHtml=tabs.map(t=>`<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');

  let content='';
  if (activeTab==='reading') {
    content=mod.readings.slice().sort((a,b)=>{
      const key=r=>p.rejected?.readings?.[r.id]?2:p.readings[r.id]?1:0;
      return key(a)-key(b);
    }).map(r=>{
      const done = p.readings[r.id];
      const rejected = p.rejected?.readings?.[r.id] || false;
      const adminAttach = r.attachmentPath && r.attachmentName;
      const studentAttach = activeAttachments()[mod.id]?.readings?.[r.id];
      const linkPill = r.type==='verified'&&r.url
        ? `<a href="${r.url}" target="_blank" rel="noopener" class="reading-link">✅ Open link ↗</a>`

      const pdfPill = adminAttach
        ? `<button class="reading-attach-view" onclick="viewAttach('${r.attachmentPath}','${esc(r.attachmentName)}')" title="Resource PDF">📄 Open PDF</button>` : '';
      const myPdfPill = studentAttach
        ? `<button class="reading-attach-view reading-my-attach" onclick="viewAttach('${studentAttach.dbId}','${esc(studentAttach.name)}')" title="Your uploaded copy">📄 My copy</button>` : '';
      const noteChip = (done&&!rejected) ? buildNoteChip(mod.id,r.id,p.readingNotes?.[r.id]||'') : '';
      const skipReason = rejected ? (p.skipReasons?.readings?.[r.id]||'') : '';
      let descHtml = '';
      if(r.description){
        const hasMore = r.description.length > 100;
        const short = hasMore ? r.description.substring(0,100) : r.description;
        descHtml = `<div class="reading-desc" data-full="${esc(r.description)}"><span>${esc(short)}${hasMore?'…':''}</span>${hasMore?`<button class="desc-more-btn" onclick="toggleDesc(this)">more</button>`:''}</div>`;

          <div class="reading-title-row">

    if(ghostWatching.length){
      content+= ghostWatching.map(([wId])=>{
        const title=p.watchingTitles?.[wId]||wId;
        return `<div class="watch-item ghost reading-item">
          <input type="checkbox" class="check-input" checked disabled>
          <div class="watch-content">
            <div class="watch-term done">${esc(title)}</div>

  } else if (activeTab==='assignment') {
    const sections = p.assignmentSections || [];
    const secHtml = sections.map(sec => `
      <div class="asgn-section" data-secid="${sec.id}"
           draggable="true"
           ondragstart="secDragStart(event,'${mod.id}','${sec.id}')"
           ondragover="secDragOver(event,'${sec.id}')"
           ondragleave="secDragLeave(event)"
           ondrop="secDrop(event,'${mod.id}','${sec.id}')"
           ondragend="secDragEnd()">
        <div class="asgn-sec-header">
          <span class="asgn-sec-drag" title="Drag to reorder">⠿</span>
          <div class="asgn-sec-title"
               contenteditable="true"
               data-placeholder="Section title…"
               data-modid="${mod.id}"
               data-secid="${sec.id}"
               oninput="saveSecTitle(this)"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(sec.title)}</div>
          <button class="asgn-sec-toggle ${sec.collapsed?'collapsed':''}" title="${sec.collapsed?'Expand':'Collapse'}"
                  onclick="toggleSecCollapse('${mod.id}','${sec.id}',this)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 7,9 11,5"/></svg>
          </button>
          <button class="asgn-sec-delete" title="Delete section" onclick="deleteSection('${mod.id}','${sec.id}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
          </button>

    content=`

}

function renderAttachmentsTab(modId, callerRole) {
  // callerRole: 'student' = student mode (can add student files, view admin resources)
  //             'admin'   = admin modal (can add admin resources)
  const att = getAttachments(modId);
  const isAdminCaller = callerRole === 'admin';
  let html = '';

  // ── Module Resources (admin-uploaded) ──
  html += `<div class="attach-section">
    <div class="attach-section-header">
      <div class="attach-section-label">Module Resources <span class="attach-count">${att.admin.length}</span></div>
      ${isAdminCaller ? `<button class="btn btn-primary btn-sm" onclick="triggerAttach('${modId}','admin')">+ Add PDFs</button>` : ''}
    </div>`;

  if (!att.admin.length) {
    html += `<div class="attach-empty">${isAdminCaller ? 'No resources added yet. Add PDFs for students to reference.' : 'No module resources have been attached by the curriculum designer.'}</div>`;
  } else {
    html += `<div class="attach-file-list">`;
    for (const f of att.admin) {
      html += renderFileItem(modId, 'admin', f, isAdminCaller);
    }
    html += `</div>`;
  }
  html += `</div>`;

  // ── My Files (student-uploaded) — only in student mode ──
  if (!isAdminCaller) {
    html += `
      <div class="attach-section">
        <div class="attach-section-header">
          <div class="attach-section-label">My Files <span class="attach-count">${att.student.length}</span></div>
          <button class="btn btn-outline btn-sm" onclick="triggerAttach('${modId}','student')">+ Add PDFs</button>
        </div>
        <div class="attach-drop-zone" id="dropZone_${modId}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleAttachDrop(event,'${modId}','student')"
          onclick="triggerAttach('${modId}','student')">
          <div class="attach-drop-icon">📎</div>
          <div class="attach-drop-label">Drag & drop PDFs here</div>
          <p>or click to browse — your assignments, notes, research</p>
        </div>`;
    if (att.student.length) {
      html += `<div class="attach-file-list">`;
      for (const f of att.student) html += renderFileItem(modId, 'student', f, true);
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    // Admin viewing student files (read-only in admin modal)
    if (att.student.length) {
      html += `<div class="attach-section">
        <div class="attach-section-label" style="margin-bottom:12px">Student Files <span class="attach-count">${att.student.length}</span></div>
        <div class="attach-file-list">`;
      for (const f of att.student) html += renderFileItem(modId, 'student', f, false);
      html += `</div></div>`;
    }
  }
  return html;
}

function renderFileItem(modId, role, f, canDelete) {
  const sizeStr = formatBytes(f.size);
  const dateStr = new Date(f.addedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  const isUploading = f.uploading;
  return `
    <div class="attach-file-item ${isUploading?'attach-uploading':''}">
      <div class="attach-file-icon">📄</div>
      <div class="attach-file-info">
        <div class="attach-file-name">${esc(f.name)}</div>
        <div class="attach-file-meta">${sizeStr} · ${dateStr}${role==='admin'?'<span class="attach-resource-badge">Resource</span>':''}</div>
      </div>
      <div class="attach-file-actions">
        ${!isUploading?`<button class="btn btn-outline btn-sm" onclick="viewAttach(${f.dbId},'${esc(f.name)}')">View</button>`:'<span style="font-size:12px;color:var(--text-muted)">Uploading…</span>'}
        ${canDelete&&!isUploading?`<button class="btn btn-danger btn-sm" onclick="removeAttach('${modId}','${role}',${f.dbId})">Remove</button>`:''}
      </div>
    </div>`;
}

// ── Design mode state ──
let _designModId = null;

function selectDesignMod(modId) {
  _designModId = modId;
  renderAdmin();
  // Scroll panel to top after selection
  setTimeout(() => {
    const pb = document.querySelector('.design-panel-body');
    if (pb) pb.scrollTop = 0;
  }, 50);
}

function saveModField(modId, field, value) {
  const cur = activeCurriculum();
  const mod = cur?.modules.find(m => m.id === modId);
  if (!mod) return;
  if (field === 'number') mod.number = parseInt(value) || mod.number;
  else mod[field] = value;
  if (field === 'number') cur.modules.sort((a,b) => a.number - b.number);
  saveState();
  if (field === 'title' || field === 'number') {
    // Refresh the module list item title without full re-render
    const item = document.querySelector(`.design-mod-item[data-mid="${modId}"] .design-mod-title`);
    const numEl = document.querySelector(`.design-mod-item[data-mid="${modId}"] .design-mod-num`);
    if (item) item.textContent = value || 'Untitled module';
    if (numEl && field === 'number') numEl.textContent = value;
    if (field === 'number') renderAdmin(); // reorder may have changed list
  }
}

function addBlankModule() {
  if (!activeCurriculum()) { const nc={id:'user-'+Date.now(),title:'My Curriculum',subtitle:'',modules:[],source:'user'};state.curricula.push(nc);state.activeCurriculumId=nc.id; }
  const _c = activeCurriculum();
  const nextNum = (_c.modules.length || 0) + 1;
  const mod = {
    id: `m${nextNum}_${Math.random().toString(36).substr(2,6)}`,
    number: nextNum,
    title: '',
    subtitle: '',
    whyItMatters: '',
    artifact: '',
    readings: [],
    watching: [],
    assignment: '',
    reflection: ''
  };
  _c.modules.push(mod);
  _designModId = mod.id;
  saveState();
  renderAdmin();
  // Focus title input
  setTimeout(() => {
    const inp = document.querySelector('.design-panel-body .design-field-input[data-field="title"]');
    if (inp) { inp.focus(); inp.select(); }
  }, 80);
}

function renderDesignPanel(mod) {
  const att = getAttachments(mod.id);

  const readingsHtml = mod.readings.length ? mod.readings.map((r, idx) => {
    const urlVal = r.type === 'verified' ? (r.url || '') : (r.searchTerm || '');

    return `<div class="reading-edit-row">
      <span style="font-size:11px;color:var(--text-muted);min-width:18px;text-align:right">${idx+1}</span>
      <input class="reading-edit-input title" value="${esc(r.title)}" placeholder="Reading title"
             onblur="saveReadingField('${mod.id}','${r.id}','title',this.value)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      <input class="reading-edit-input url" value="${esc(urlVal)}" placeholder="https://... or search term"
             onblur="saveReadingField('${mod.id}','${r.id}','url',this.value)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      ${hasAttach
        ? `<button class="reading-attach-pill" onclick="viewAttach('${r.attachmentPath}','${esc(r.attachmentName)}')" title="${esc(r.attachmentName)}">📄 ${esc(r.attachmentName.length>20?r.attachmentName.slice(0,18)+'…':r.attachmentName)}</button>
           <button class="btn btn-sm" style="padding:4px 8px;color:var(--red);border:none;background:none;cursor:pointer" onclick="removeReadingAttach('${mod.id}','${r.id}')" title="Remove attachment">✕</button>`

      }
      <button class="btn btn-sm" style="padding:4px 8px;color:var(--red);border:none;background:none;cursor:pointer;flex-shrink:0" onclick="deleteReading('${mod.id}','${r.id}')" title="Remove reading">✕</button>
    </div>`;
  }).join('') : `<div style="font-size:13px;color:var(--text-muted);padding:6px 0">No readings yet.</div>`;

  const watchingHtml = mod.watching.length ? mod.watching.map((w, idx) => `

      <span style="font-size:11px;color:var(--text-muted);min-width:18px;text-align:right">${idx+1}</span>
      <input class="reading-edit-input title" value="${esc(w.searchTerm)}" placeholder="YouTube search term"
             onblur="saveWatchingField('${mod.id}','${w.id}','searchTerm',this.value)"

      <input class="reading-edit-input url" value="${esc(w.description||'')}" placeholder="Optional description"
             onblur="saveWatchingField('${mod.id}','${w.id}','description',this.value)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      <button class="btn btn-sm" style="padding:4px 8px;color:var(--red);border:none;background:none;cursor:pointer;flex-shrink:0" onclick="deleteWatching('${mod.id}','${w.id}')" title="Remove">✕</button>
    </div>`).join('') : `<div style="font-size:13px;color:var(--text-muted);padding:6px 0">No videos yet.</div>`;

  return `<div class="design-panel-col">
    <div class="design-panel">
      <div class="design-panel-header">
        <div>
          <div class="design-panel-modnum">Module ${mod.number}</div>
          <div class="design-panel-modtitle">${esc(mod.title) || '<span style="color:var(--text-muted);font-style:italic">Untitled module</span>'}</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn btn-attach btn-sm" onclick="showAdminAttachModal('${mod.id}')" title="Module resources (${attCount} files)">📎${attCount ? ` ${attCount}` : ''}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMod('${mod.id}')">Delete</button>
        </div>
      </div>
      <div class="design-panel-body">

        <div style="display:grid;grid-template-columns:80px 1fr;gap:12px">
          <div class="design-field-group">
            <label class="design-field-label">Number</label>
            <input class="design-field-input" type="number" value="${mod.number}" data-field="number"
                   onblur="saveModField('${mod.id}','number',this.value)"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
          </div>
          <div class="design-field-group">
            <label class="design-field-label">Title</label>
            <input class="design-field-input" value="${esc(mod.title)}" placeholder="e.g. Strategic Thinking" data-field="title"
                   onblur="saveModField('${mod.id}','title',this.value)"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
          </div>
        </div>

        <div class="design-field-group">
          <label class="design-field-label">Subtitle / Gap Description</label>
          <input class="design-field-input" value="${esc(mod.subtitle||'')}" placeholder="Your gap: …"

        <div class="design-field-group">

        <div class="design-field-group">
          <label class="design-field-label">Reflection Prompt</label>
          <textarea class="design-field-textarea"
                    onblur="saveModField('${mod.id}','reflection',this.value)"
                    placeholder="The reflection question…">${esc(mod.reflection||'')}</textarea>

      </div>
    </div>

function renderAdmin() {
  const el = document.getElementById('adminView');

  // Curriculum meta + toolbar
  const cur = activeCurriculum();
  let html = '';
  if (cur) {
    html += `<div class="design-curriculum-meta">
      <div class="design-curriculum-meta-label">Curriculum</div>
      <div class="design-field-group" style="margin-bottom:10px">
        <label class="design-field-label">Title</label>
        <input class="design-field-input" value="${esc(cur.title||'')}"
               placeholder="e.g. AI-Era PM Relaunch"
               onblur="saveCurriculumField('title',this.value)"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      </div>
      <div class="design-field-group" style="margin-bottom:0">
        <label class="design-field-label">Subtitle</label>
        <input class="design-field-input" value="${esc(cur.subtitle||'')}"
               placeholder="One line describing this learning journey"
               onblur="saveCurriculumField('subtitle',this.value)"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
      </div>
    </div>`;
  }
  html += `
    <div class="admin-toolbar" style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="showUpload()">⬆ Upload .md</button>
      <button class="btn btn-outline" onclick="addBlankModule()">+ Add Module</button>
      <button class="btn btn-outline" onclick="loadDefault()">↺ Reset to Canon</button>
      ${cur ? `<button class="btn btn-danger" onclick="clearAll()">✕ Clear All</button>` : ''}
    </div>
    ${_isAdmin() && cur ? `
    <div style="background:rgba(79,90,240,0.06);border:1px solid rgba(79,90,240,0.15);border-radius:12px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--purple);margin-bottom:2px">Publish to all users</div>
        <div style="font-size:12px;color:var(--text-muted)">All signed-in users receive your curriculum on next login</div>
      </div>
      <button class="btn btn-primary" onclick="publishCurriculum()" style="white-space:nowrap;flex-shrink:0">⬆ Publish</button>
    </div>` : ''}`;

  if (!cur?.modules?.length) {
    html += `<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No curriculum yet</div><div class="empty-text">Upload a .md file, add modules manually, or start from the Canon template.</div><br><button class="btn btn-primary" style="margin:0 auto;display:block" onclick="loadDefault()">Start from Canon template</button></div>`;
    el.innerHTML = html;
    return;
  }

  // Auto-select first module if none selected (or selection was deleted)
  if (!_designModId || !cur.modules.find(m => m.id === _designModId)) {
    _designModId = cur.modules[0].id;
  }
  const selectedMod = cur.modules.find(m => m.id === _designModId);

  // Module list (left column)
  const moduleListHtml = cur.modules.map(mod => `
    <div class="design-mod-item ${mod.id === _designModId ? 'selected' : ''}" data-mid="${mod.id}"
         onclick="selectDesignMod('${mod.id}')"
         draggable="true"
         ondragstart="adminDragStart(event,'${mod.id}')"
         ondragover="adminDragOver(event,'${mod.id}')"
         ondragleave="adminDragLeave(event)"
         ondrop="adminDrop(event,'${mod.id}')"
         ondragend="adminDragEnd()">
      <span class="design-mod-num">${mod.number}</span>
      <span class="design-mod-title">${esc(mod.title) || '<span style="color:var(--text-muted);font-style:italic">Untitled</span>'}</span>
    </div>`).join('');

  html += `<div class="design-split">
    <div class="design-modules-col">
      ${moduleListHtml}
    </div>
    ${selectedMod ? renderDesignPanel(selectedMod) : ''}
  </div>`;

  el.innerHTML = html;
}
