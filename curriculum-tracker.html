        { id:"m1r2", number:"2", title:'"The Big Lie of Strategic Planning" — Roger Martin, HBR', url:"https://hbr.org/2014/01/the-big-lie-of-strategic-planning", searchTerm:"Roger Martin big lie strategic planning HBR", type:"verified", description:"Martin is the best living writer on strategy. This short piece punctures the idea that strategy is a planning exercise. Read alongside Porter." },
        { id:"m1r2b", number:"2b", title:'"Playing to Win" — Roger Martin (free summary on his site)', url:"https://rogerlmartin.com/lets-read/playing-to-win", searchTerm:"", type:"verified", description:"Martin's own summary of the full book — free. The 'where to play / how to win' cascade is the most practical strategy framework for a PM to actually use in a room." },
        { id:"m1r3", number:"3", title:'"7 Powers: The Foundations of Business Strategy" — Hamilton Helmer', url:"https://www.amazon.com/7-Powers-Foundations-Business-Strategy/dp/0998116802", searchTerm:"Hamilton Helmer 7 Powers summary", type:"verified", description:"Book (~$15 Kindle). The best modern strategy framework for tech PMs. Counter-positioning, scale economies, switching costs, network effects — explained with real rigour. Read the intro + any two chapters." },
        { id:"m1r4", number:"4", title:'"Thinking in Systems" — Donella Meadows Institute (free resources)', url:"https://donellameadows.org/systems-thinking-resources/", searchTerm:"", type:"verified", description:"Meadows wrote the definitive systems thinking book. The institute's site has free excerpts and accessible resources. Chapters 1–2 are enough to reframe how you see product problems." },
        { id:"m1r5", number:"5", title:'Stratechery — Ben Thompson: "Aggregation Theory"', url:"https://stratechery.com/2015/aggregation-theory/", searchTerm:"", type:"verified", description:"Free. The most important framework for understanding platform power in the internet age." },
        { id:"m1r6", number:"6", title:"GovTech Singapore — Digital Government Blueprint", url:"https://www.tech.gov.sg/our-digital-government-efforts/", searchTerm:"", type:"verified", description:"Read their actual published strategy — not a summary. If you're targeting Singapore's public sector, you should know how they think about themselves and what they say they're optimising for." }
      ],
      watching: [
        { id:"m1w1", title:"Roger Martin — 'What Is Strategy?' (Rotman School)", url:"", searchTerm:"Roger Martin what is strategy Rotman School lecture", description:"45–60 min. Multiple recordings exist of him delivering this live — more dynamic than the article alone. Search the exact phrase and filter to videos over 30 min." },
        { id:"m1w2", title:"Hamilton Helmer — '7 Powers' (Invest Like the Best)", url:"", searchTerm:"Hamilton Helmer 7 Powers Invest Like the Best Patrick OShaughnessy", description:"The best audio explainer of the framework. Search 'Hamilton Helmer Invest Like the Best' — it's the first result. The Founders podcast also has a strong episode on the book." },
        { id:"m1w3", title:"MIT OpenCourseWare — Introduction to System Dynamics (Prof. John Sterman)", url:"https://ocw.mit.edu/courses/15-871-introduction-to-system-dynamics-fall-2013/", searchTerm:"MIT system dynamics Sterman", description:"Full MIT course materials, free. Video lectures, readings, problem sets. If you want to actually understand systems thinking rather than just recognise it, this is the real thing." },
        { id:"m1w4", title:"Marty Cagan — 'Product Strategy' (Product School talk)", searchTerm:"Marty Cagan product strategy SVPG Product School YouTube talk 2022 2023", description:"Cagan's live talks on what real product strategy looks like — vs. the feature roadmap most companies call strategy — directly extend Porter's framework into product practice. Product School uploads his talks regularly. More actionable than the SVPG essays in talk format." },
        { id:"m1w5", title:"Shreyas Doshi — 'How to Think Like a Strategic PM' (talk)", searchTerm:"Shreyas Doshi strategic thinking product manager leverage impact talk conference", description:"Shreyas's most practical framework for thinking strategically as a PM — including his leverage vs. impact distinction and how to identify the decisions that actually move the business. Conference recordings from Mind the Product and First Round are on YouTube." },
        { id:"m1w6", title:"Ben Thompson — 'Aggregation Theory' explained (podcast interview)", searchTerm:"Ben Thompson Stratechery aggregation theory explained podcast interview 2022 2023", description:"Thompson is the sharpest business strategy writer on the internet. His podcast appearances where he explains Aggregation Theory in conversation — with examples — are more accessible than the written essay. Search 'Ben Thompson aggregation theory podcast'." },
        { id:"m1w7", title:"Y Combinator — 'How to Think About Market Strategy' (Michael Seibel)", searchTerm:"Y Combinator Michael Seibel product market strategy startup lecture competitive positioning", description:"Michael Seibel (YC CEO) on how the best startups think about strategy, positioning, and competitive focus. Their lecture series covers market sizing and strategic focus at the best 30-minute density of any free content." },
        { id:"m1w8", title:"Exponent — PM Mock Interview: Product Strategy", searchTerm:"Exponent mock PM interview strategy product positioning competitive analysis how would you", description:"Exponent's strategy mock interviews simulate the hardest PM questions: 'how would you enter market X?', 'what's the competitive positioning of product Y?'. Strategic questions are the ones senior candidates most often fail. Watch after doing the readings — see if your frameworks show up under pressure." }
      ],
      assignment:"Map the strategic position of \"Canon\" as a product.\n\n- Who are the real users? Career re-entrants vs. active PMs vs. companies upskilling teams — they're different customers with different willingness to pay and different definitions of success.\n- What's the unique position no generic tool (Notion, Coursera, even ChatGPT) can replicate?\n- Apply Porter: what tradeoffs define this product? What does it deliberately not do?\n- Apply 7 Powers: which of the seven — network effects, switching costs, scale economies, brand — are achievable for a learning app? Which will you target first?\n\nWrite 600 words. End with one sentence: \"The one thing this product must never compromise on is ___.\"",
      reflection:"When you've done your best strategic work in your career — what did it feel like in your body? Energising or draining? Was it the strategy itself, or the environment it happened in?"
    },
    {
      id:"m2", number:2,
      title:"Design Thinking & Human-Centred Research (Advanced)",
      subtitle:"Beyond the vocabulary. Applying the methodology the way it was designed to be used.",
      whyItMatters:"The best product decisions start with a genuine human insight, not a feature request. You know this. This module gives you the structured methods to generate those insights deliberately, not just when you get lucky.",
      artifact: "Discovery Map",
      rubric: { weak: "Research confirmed what you already believed. Questions were designed to validate, not challenge. You answered your own research questions without talking to real users. No finding surprised you. The map shows a problem you already knew existed.", strong: "At least one finding contradicted your going-in assumption. You can clearly distinguish what users said from what they did. The discovery map surfaces a genuine gap between stated problem and actual behaviour. You identified a user need you did not know existed before the research.", selfCheck: "Did anything surprise me? (if no: you designed research to confirm yourself)\nWhat did I observe vs. what was I only told?\nIs the insight specific enough to change a product decision — or is it still 'users want X'?" },
      readings: [
        { id:"m2r1", number:"1", title:"Stanford d.school — 'The Bootleg Deck' (FREE download)", url:"https://dschool.stanford.edu/resources", searchTerm:"", type:"verified", description:"The canonical Stanford design thinking methodology, free, beautifully produced. Download the Bootleg Deck specifically — it's the practitioner's guide, not the theory." },
        { id:"m2r2", number:"2", title:"IDEO Design Kit — 57 Methods Library (FREE)", url:"https://www.designkit.org/methods", searchTerm:"", type:"verified", description:"Browse the methods library. Pick 5 methods you'd actually use — read those entries fully. This is where design thinking stops being vocabulary and becomes a skill." },
        { id:"m2r3", number:"3", title:'"The Mom Test" — Rob Fitzpatrick (free chapters)', url:"https://www.momtestbook.com", searchTerm:"", type:"verified", description:"The best book on customer interviewing ever written. Short (~120 pages). Core argument: users lie to protect your feelings — here's how to get the truth anyway. Free first chapter on the site." },
        { id:"m2r4", number:"4", title:"Teresa Torres — 'Continuous Discovery Habits' (author site)", url:"https://www.producttalk.org/2021/08/product-discovery/", searchTerm:"", type:"verified", description:"Teresa Torres invented the opportunity solution tree framework — the most practical modern approach to continuous product discovery. This article is the best free introduction to her method." },
        { id:"m2r5", number:"5", title:"Nielsen Norman Group — 'User Interviews: How, When, and Why to Conduct Them'", url:"https://www.nngroup.com/articles/user-interviews/", searchTerm:"", type:"verified", description:"NNG is the gold standard in UX research. This article is rigorous, practical, and free. Their site is one of the best research resources available — bookmark it." },
        { id:"m2r6", number:"6", title:"Google PAIR Guidebook — Designing Human-AI Interactions (FREE)", url:"https://pair.withgoogle.com/guidebook/", searchTerm:"", type:"verified", description:"Google's free guidebook for designing AI-powered products from a human-centred perspective. Directly relevant to the AI modules ahead. Read the full thing — it's well-structured." }
      ],
      watching: [
        { id:"m2w1", title:"IDEO — 'The Deep Dive' (ABC Nightline, 1999)", url:"", searchTerm:"IDEO deep dive shopping cart ABC Nightline 1999", description:"22 min. The video that made design thinking famous. An IDEO team redesigns a shopping cart in 5 days. Still the best demonstration of the methodology in action. Search exact title — it's always the first result." },
        { id:"m2w2", title:"Tim Brown (IDEO CEO) — 'Tales of Creativity and Play' (TED)", url:"https://www.ted.com/talks/tim_brown_tales_of_creativity_and_play", searchTerm:"Tim Brown IDEO TED creativity play", description:"27 min. The CEO of IDEO on where design thinking actually comes from and what it requires of the people doing it. More substantive than the name suggests." },
        { id:"m2w3", title:"Teresa Torres — 'Continuous Discovery Habits' (ProductTank talk)", url:"", searchTerm:"Teresa Torres continuous discovery habits ProductTank talk", description:"Her live talks are the best introduction to the opportunity solution tree. More practical than reading. Search her name + ProductTank — several recordings exist from different conferences." },
        { id:"m2w4", title:"Julie Zhuo — 'How to Become a Better PM' (talk)", searchTerm:"Julie Zhuo product manager design leadership how to get better product sense talk", description:"Zhuo was VP Design at Facebook for a decade and wrote 'The Making of a Manager'. Her talks on how great PMs run discovery and make design decisions are the most honest available from that level of seniority. Search 'Julie Zhuo product manager talk' for multiple conference recordings." },
        { id:"m2w5", title:"Lenny Rachitsky — 'How to do user research' (podcast episode)", searchTerm:"Lenny Rachitsky podcast user research customer interviews discovery continuous 2023 2024", description:"Lenny has dedicated full episodes to user research methodology — including one with Teresa Torres that is among the highest-rated in the series. More accessible than the book as a starting point. Search 'Lenny podcast user research' on YouTube." },
        { id:"m2w6", title:"Stanford d.school — Design Thinking process walkthrough (YouTube)", searchTerm:"Stanford d school design thinking process bootleg overview walkthrough official", description:"Stanford's design school publishes official YouTube content walking through each phase of their design thinking methodology. More visual than reading the Bootleg deck. Search 'Stanford d.school design thinking' for their official channel content." },
        { id:"m2w7", title:"Y Combinator — 'Talking to Users' (Gustaf Alströmer, YC lecture)", searchTerm:"Y Combinator talking to users Gustaf Alstroemer lecture customer discovery interviews", description:"One of the most-watched YC lectures on how to actually conduct user discovery — not in theory, but the specific questions to ask and the mistakes that make user interviews useless. Directly applicable to the Mom Test assignment." },
        { id:"m2w8", title:"Exponent — PM Mock Interview: Product Design and User Research", searchTerm:"Exponent mock PM interview product design user research improve product how would you", description:"'How would you improve X?' is the most common PM interview question — and it's a user research test in disguise. Exponent's product design mock interviews model how to frame discovery and synthesis in an interview format. The structure they use is exactly what this module builds." }
      ],
      assignment:"Run discovery on your own product.\n\n1. Write 3 user personas who might use this app: a career re-entrant (you), an active PM who wants structured self-study, and an L&D manager at a company. For each: what's their job-to-be-done? What does \"done\" look like for them?\n\n2. Write 5 interview questions you'd ask a career re-entrant in Singapore — then answer them yourself honestly. What surprised you in your own answers?\n\n3. Identify the 2 biggest UX assumptions baked into the current app that you haven't validated with anyone other than yourself.\n\n4. Describe one feature the current app completely lacks that genuine user research would likely surface.\n\nThe goal is one insight about your own product that you didn't have before you started.",
      reflection:"Think of a product decision you made that you're genuinely proud of. Was it driven by data or by a human insight that caught you off guard? What does that tell you about where your best thinking comes from?"
    },
    {
      id:"m3", number:3,
      title:"AI Fundamentals (Rigorous, Non-Technical)",
      subtitle:"Understanding the AI wave at the level that actually matters for product decisions.",
      whyItMatters:"You don't need to be a researcher to think rigorously about AI. You need to understand failure modes, architectural constraints, and what evaluation means in practice. That's what separates the PMs who sound smart about AI from the ones who actually are. This module gets you there.",
      artifact: "AI Opportunity Map",
      rubric: { weak: "Rephrases the AI news cycle or Wikipedia. Makes broad claims ('AI will transform everything') without taking a position. Could have been written by anyone who skimmed the same articles. No original synthesis, no uncomfortable claims.", strong: "Takes a position on at least one contested AI claim and defends it. Explains one core concept (hallucination, context window, RLHF, evals) in your own words using an analogy you generated. Identifies one specific AI risk or limitation most senior PMs underestimate. A reader learns something they wouldn't get from a generic AI overview.", selfCheck: "Did I take at least one position that could be wrong?\nCan I explain hallucination or evals to a non-technical founder without using 'training data' or 'neural network'?\nWhat do I now believe that I didn't before this module?" },
      readings: [
        { id:"m3r1", number:"1", title:"Ethan Mollick — One Useful Thing (Substack)", url:"https://www.oneusefulthing.org", searchTerm:"", type:"verified", description:"Subscribe. Start with: \"The Cybernetic Teammate\", \"On Trust and the Practical Challenges of AI\", \"Getting your AI to do good work\"." },
        { id:"m3r2", number:"2", title:'"What is ChatGPT Doing and Why Does It Work?" — Stephen Wolfram', url:"https://writings.stephenwolfram.com/2023/02/what-is-chatgpt-doing-and-why-does-it-work/", searchTerm:"", type:"verified", description:"Long. Dense. Read sections 1–5. The best non-mathematical explanation of how LLMs work." },
        { id:"m3r3", number:"3", title:'"Your AI Product Needs Evals" — Hamel Husain', url:"https://hamel.dev/blog/posts/evals/", searchTerm:"", type:"verified", description:"This directly addresses your Micro1 gap. Read carefully." },
        { id:"m3r4", number:"4", title:'"Situational Awareness" — Leopold Aschenbrenner', url:"https://situational-awareness.ai", searchTerm:"", type:"verified", description:"Very long essay. Read Part 1 only (~30 min)." },
        { id:"m3r5", number:"5", title:"DeepLearning.AI Short Courses — FREE", url:"https://www.deeplearning.ai/short-courses/", searchTerm:"", type:"verified", description:"\"Evaluating and Debugging Generative AI\", \"ChatGPT Prompt Engineering for Developers\", \"Building and Evaluating Advanced RAG\". Free, 1–4 hours each." },
        { id:"m3r6", number:"6", title:"Building Effective Agents — Anthropic", url:"https://www.anthropic.com/research/building-effective-agents", searchTerm:"", type:"verified", description:"The canonical mental model for agentic AI: orchestrators, subagents, tool calls, the loop. Written for engineers but readable in 30 min without code. Skip the code blocks. Absorb the architecture." },
        { id:"m3r7", number:"7", title:"Simon Willison on LLM agents — lessons learned", url:"", searchTerm:"Simon Willison LLM agents lessons learned 2024", type:"search", description:"Willison is the clearest practical thinker writing publicly about agents. Skeptical, specific, PM-friendly. Read anything he has written in the last 12 months on tool use and agents." }
      ],
      watching: [
        { id:"m3w1", title:"Andrej Karpathy — 'Intro to Large Language Models' (YouTube, 1 hr)", url:"", searchTerm:"Andrej Karpathy intro large language models 1 hour 2023", description:"1 hour. Karpathy is Tesla's former AI director and now one of the best explainers alive. This is the single best non-technical explanation of how LLMs work. Search his name + 'intro LLMs' — it's always first result." },
        { id:"m3w2", title:"3Blue1Brown — 'But What Is a Neural Network?' (YouTube, 19 min)", url:"", searchTerm:"3Blue1Brown but what is a neural network chapter 1 deep learning", description:"19 min. Grant Sanderson produces the most mathematically beautiful explainer videos on the internet. You don't need the maths — the visual intuition is what matters. Chapter 1 of his deep learning series." },
        { id:"m3w3", title:"Andrej Karpathy — 'State of GPT' (Microsoft Build 2023)", url:"", searchTerm:"Andrej Karpathy State of GPT Microsoft Build 2023", description:"40 min. His Microsoft Build keynote on where language models are going and what they can do. More technical than the LLM intro but still PM-accessible. Particularly useful for understanding fine-tuning and RLHF." },
        { id:"m3w4", title:"Anthropic — Claude agent with tool use (official cookbook tutorial)", url:"https://docs.anthropic.com/en/docs/agents-and-tools/tool-use/implement-tool-use", searchTerm:"Anthropic tool use cookbook Claude agent", description:"DIY: the official Anthropic guide to building a Claude agent with tool use. Copy-paste code, no prior experience needed. Run it once. The goal is to watch the agent loop execute — not to become an engineer." },
        { id:"m3w5", title:"MIT 6.S191 — Introduction to Deep Learning (full course, free)", url:"http://introtodeeplearning.com/", searchTerm:"MIT 6S191 introduction deep learning 2024", description:"MIT's free annual deep learning course. Lecture 1 (foundations) and Lecture 3 (NLP/LLMs) are the most relevant for PMs. The site has all slides and video recordings. No maths required to follow the conceptual arc." },
        { id:"m3w6", title:"Sam Altman — 'The Intelligence Age' talk (2024)", searchTerm:"Sam Altman intelligence age AI future talk lecture 2024 OpenAI", description:"Altman's talks on where AI is going and what it means for products are the most strategically substantive content from an AI CEO. His long-form interviews and keynotes are particularly candid about failure modes and limitations. Search 'Sam Altman AI 2024 talk' for the most current version." },
        { id:"m3w7", title:"Lex Fridman — Interview with Andrej Karpathy (AI, neural networks)", searchTerm:"Lex Fridman Andrej Karpathy interview neural networks AI deep learning 2022 2023", description:"The most substantive long-form conversation on how LLMs work and where AI research is going. Karpathy's explanations of how models 'think' — the token prediction loop, emergent behaviour, RLHF — are the most useful for PMs in any format. Watch the first 90 minutes at minimum." },
        { id:"m3w8", title:"Lenny Rachitsky — 'The future of AI products' (podcast, 2024)", searchTerm:"Lenny Rachitsky podcast AI products future product management 2024", description:"Lenny has dedicated multiple episodes to AI product strategy with top practitioners. His AI-focused episodes from 2023–2024 are among the most downloaded. Search 'Lenny podcast AI product 2024' on YouTube for the most current episode with the best guest on this topic." },
        { id:"m3w9", title:"Exponent — PM Mock Interview: AI and ML Product Questions", searchTerm:"Exponent mock PM interview AI machine learning product questions 2023 2024", description:"Exponent produces dedicated mock interviews for AI/ML PM roles. Questions include: 'how would you evaluate an ML recommendation model', 'design a content moderation system', 'measure success for a personalisation feature'. Essential if targeting any AI-native company — which is increasingly most companies." }
      ],
      assignment:"Map the AI opportunity surface for this product.\n\n1. Where in the current app does AI add zero value vs. where it adds genuine leverage? Be honest — not every feature benefits from AI.\n\n2. Write a capability map: for each of the 9 modules in your curriculum, what would an AI tutor specifically do that the static curriculum can't? (e.g. give feedback on your assignment notes, ask Socratic follow-up questions, flag when you're rationalising instead of thinking)\n\n3. Identify 2 AI risks specific to a learning product — hallucinated citations, over-reliance, assessment gaming, false confidence. How would you design against them?\n\n4. Write a 1-page \"AI product thesis\" for an evolved version of this app: what's the core AI-native insight that makes it genuinely different from a course platform with a chatbot bolted on?\n\n5. Agentic teardown (one page): pick any agent product you have encountered — Cursor, Perplexity, a company's internal tool, anything. Map its loop: what triggers it, what tools it calls, where it hands back to the human, and where trust could break. This is how PMs should think about agentic products before speccing them.",
      reflection:"What part of the AI wave feels even mildly interesting to you — not what you think should interest you, but what actually catches your attention when you read about it? Hold onto that signal."
    },
    {
      id:"m4", number:4,
      title:"AI Tools, Hands On",
      subtitle:"The play module. You build fluency with these tools by using them, not reading about them.",
      whyItMatters:"There is no shortcut here. You get comfortable with AI tools by building things with them. This module is structured around doing, not watching. What you build here will directly improve the product you are building for yourself.",
      artifact: "Working AI Feature + Prompt Iteration Log",
      rubric: { weak: "The demo works but you can't explain why the prompt is written the way it is. No meaningful iteration — you wrote a prompt, it was 'good enough,' you moved on. The log is a list of outputs, not a record of decisions. You can't name one place where AI actively misled you.", strong: "Shows at least 3 prompt iterations with explicit reasoning for each change. The log captures what you expected vs. what actually happened. You can name one specific place AI gave confidently wrong output and what you did about it. The built feature solves a real problem for you — not just a technically interesting demo.", selfCheck: "Can I explain why each prompt change was made — not just what changed?\nDid AI think FOR me at any point? (if yes: did I catch it and correct it?)\nWould a PM interviewer find this iteration log more interesting than a polished demo?" },
      readings: [
        { id:"m4r1", number:"1", title:"The a16z AI Canon", url:"https://a16z.com/ai-canon/", searchTerm:"", type:"verified", description:"The best curated reading list on AI available anywhere. Bookmark. Graze." },
        { id:"m4r2", number:"2", title:"Lenny Rachitsky — Newsletter", url:"https://www.lennysnewsletter.com", searchTerm:"", type:"verified", description:"Search his archive for 'AI' — his practical PM-level pieces on AI product development are excellent." },
        { id:"m4r3", number:"3", title:"Anthropic Prompt Engineering Guide", url:"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview", searchTerm:"", type:"verified", description:"The canonical reference for writing good prompts. Read the sections on role prompting, chain of thought, and XML structuring. Directly applicable to the assignment." },
        { id:"m4r4", number:"4", title:"One Useful Thing — Ethan Mollick", url:"https://www.oneusefulthing.org", searchTerm:"", type:"verified", description:"The best newsletter on AI for practitioners. His pieces on 'jagged frontier' and 'co-intelligence' are essential reading for PMs thinking about where AI helps vs. misleads." },
        { id:"m4r5", number:"5", title:"Simon Willison's Weblog", url:"https://simonwillison.net", searchTerm:"", type:"verified", description:"The most honest, technically grounded commentary on LLMs written for a non-engineer audience. His notes on hallucination, prompt injection, and tool use are worth reading before you build anything." },
        { id:"m4r6", number:"6", title:"Prompting fundamentals — Learn Prompting", url:"https://learnprompting.org/docs/introduction", searchTerm:"", type:"verified", description:"Free, practical, comprehensive. Skip the theory sections and go straight to the technique chapters: few-shot, chain of thought, role prompting." }
      ],
      watching: [
        { id:"m4w1", searchTerm:"Fireship AI tools overview", description:"Fast, sharp tool overviews (2–5 min videos). Good for getting the shape of a new tool before committing time to it." },
        { id:"m4w2", searchTerm:"Greg Isenberg building with AI 2024", description:"Product and builder angle — focuses on what you can actually ship, not just what's technically possible." },
        { id:"m4w3", searchTerm:"Ethan Mollick AI classroom lecture", description:"His Wharton lecture on AI and work is the most grounded academic take. Slower pace but substantive." },
        { id:"m4w4", title:"Lenny Rachitsky — 'How PMs are actually using AI tools' (podcast)", searchTerm:"Lenny Rachitsky podcast how product managers using AI tools workflows 2024", description:"Lenny's episodes specifically on how working PMs integrate AI into their daily workflow — not theory, but actual prompts, tools, and workflow changes from practitioners. More useful than any 'top 10 AI tools' list. Search 'Lenny podcast AI tools PM 2024'." },
        { id:"m4w5", title:"Y Combinator — 'Building AI-First Products' (2024 lecture)", searchTerm:"Y Combinator building AI first products startup 2024 lecture workshop", description:"YC's lecture series on building AI-first products from scratch — including how to scope AI features, when to use AI vs. rule-based systems, and how to evaluate AI product quality. Multiple relevant lectures from recent batches are on their YouTube channel." },
        { id:"m4w6", title:"Matt Wolfe — AI tools weekly overview (YouTube)", searchTerm:"Matt Wolfe AI tools overview comparison 2024 best new productivity", description:"Matt Wolfe (@mreflow) produces the clearest comparative reviews of new AI tools for non-engineers. His weekly roundups are the fastest way to get oriented to new releases before committing time to them. Search 'Matt Wolfe AI tools 2024' — his channel updates constantly." },
        { id:"m4w7", title:"Shreyas Doshi — 'Using AI as a PM force multiplier' (interview)", searchTerm:"Shreyas Doshi AI tools product manager force multiplier workflow 2024 interview", description:"Shreyas on how senior PMs should think about AI in their actual working process — including where it adds genuine leverage vs. creates a false sense of productivity. More practical than any tool tutorial." },
        { id:"m4w8", title:"Exponent — PM Mock Interview: AI-First Product Design", searchTerm:"Exponent mock PM interview AI first product design feature build 2023 2024", description:"Exponent's mock interviews for AI product roles: 'design an AI feature for X', 'when would you use AI vs. a rule-based system?', 'how do you handle AI hallucinations in a consumer product?'. The most practical prep available if you're targeting roles at AI-native companies." }
      ],
      assignment:"Tools to spend time with before starting the tasks below:\n• Claude (claude.ai) — Use Projects. Try extended thinking on a hard strategic question.\n• NotebookLM (notebooklm.google.com) — Upload your Module 1–3 reading materials and interrogate them.\n• Perplexity (perplexity.ai) — Use as your primary research tool for this module.\n• Lovable (lovable.dev) or v0 (v0.dev) — Build something small with a UI.\n• Gamma (gamma.app) — Turn one of your assignment write-ups into a deck.\n\nThe actual assignment:\n\n1. Take one written submission from Modules 1–3 and use Claude as a critical reviewer. Write deliberate prompts — not 'is this good?' but 'what's the weakest strategic assumption in this argument?' Document the prompt, the output, and what you changed as a result. Do this at least twice with different prompts.\n\n2. Build a study coach prompt for one module — something you'd paste into Claude before each study session. Iterate it at least 3 times. Document what changed between versions and why the change improved it.\n\n3. Use NotebookLM with your actual reading materials from one module. What could you find or synthesise that you couldn't without it? What did it get wrong?\n\n4. Document your full prompt iteration log: for each prompt, record what you expected, what you got, and what you changed. This log is the artifact — not the final output.",
      reflection:"Where did using AI feel like thinking more clearly — and where did it think FOR you instead of WITH you? What's the difference, and how did you know which side you were on in the moment?"
    },
    {
      id:"mpt", number:5,
      title:"Product Taste & Craft",
      subtitle:"The skill you can't fake. Learning to recognise great product decisions — and articulate why.",
      whyItMatters:"Anyone can generate output. What separates senior PMs who earn real credibility is the ability to walk into a product review and immediately know what is wrong — and more importantly, why. Taste is not an opinion. It is a trained pattern recogniser built by studying great decisions, bad decisions, and the reasoning behind both. In the AI era, when any team can ship 10x faster, taste becomes the filter that determines whether any of it was worth shipping. This module builds that muscle deliberately.",
      artifact:"Product Critique — a written teardown of one great product decision and one failed one, plus a reusable evaluation framework you can deploy in any product review or interview.",
      rubric: { weak:"Describes features, not decisions. Says 'good UX' without identifying the specific tradeoff it reveals. The critique could apply to any product in the same category. No moment of genuine discomfort where you had to defend a judgement. The framework is a vague checklist that would give the same verdict for every product.", strong:"Names a specific design decision — not a feature category — and explains what it reveals about what the team valued or feared. The framework produces meaningfully different verdicts for different products. A reader who knows the product would recognise the analysis even if they disagree. You changed your mind about something during the exercise.", selfCheck:"Did I name a specific decision or a feature category?\nCould this critique apply to a product I've never seen? (if yes: too generic)\nDoes my framework produce different verdicts for different products, or just re-labels 'good' and 'bad'?\nDid I change my mind about anything while doing this?" },
      readings:[
        { id:"mptr1", number:"1", title:'Paul Graham — "Taste for Makers"', url:"http://paulgraham.com/taste.html", searchTerm:"", type:"verified", description:"The foundational essay on taste as a learnable, trainable skill. Graham argues taste is not preference — it is pattern recognition built through exposure to many examples. The argument that the test of good design is 'this is the right answer' rather than 'I like it' is the most useful reframe available. 10-minute read." },
        { id:"mptr2", number:"2", title:'37signals — "Getting Real" (free, full book)', url:"https://basecamp.com/gettingreal", searchTerm:"", type:"verified", description:"Jason Fried's entire product philosophy, free online. Read Part II (Stay Lean) and Part IV (Interface Design). The most opinionated product design writing available — you will disagree with some of it, and that disagreement is the exercise." },
        { id:"mptr3", number:"3", title:'Linear — "The Linear Method"', url:"https://linear.app/method", searchTerm:"", type:"verified", description:"Linear is one of the most taste-forward products built in the last decade. Their public methodology document explains their philosophy on quality, speed, and craft. A concrete example of taste operationalised by a real team." },
        { id:"mptr4", number:"4", title:'Marty Cagan — "Product vs. Feature Teams" (SVPG)', url:"https://www.svpg.com/product-vs-feature-teams/", searchTerm:"", type:"verified", description:"SVPG's most-shared piece on why most companies ship features instead of products. Directly relevant to the skill this module builds — the ability to tell the difference between shipping activity and shipping something that matters." },
        { id:"mptr5", number:"5", title:'Julie Zhuo — "How to Work with Designers"', url:"https://medium.com/the-year-of-the-looking-glass/how-to-work-with-designers-6c975dede146", searchTerm:"Julie Zhuo how to work with designers medium", type:"verified", description:"Zhuo was VP Design at Facebook for a decade. This piece on what having taste looks like inside a product team — from the designer's perspective — is the most honest account of that dynamic available." },
        { id:"mptr6", number:"6", title:'Marty Cagan — "Commercial vs. Internal Products" (SVPG)', url:"https://www.svpg.com/commercial-vs-internal-products/", searchTerm:"", type:"verified", description:"Short but sharp. Cagan's argument is that internal products rot because there's no craft pressure — no competition, no churn, no users voting with their feet. Read it as a diagnostic: the disciplines that sharpen taste in commercial product work, and what happens when they're absent. Useful for understanding what you're orienting toward in your career." }
      ],
      watching:[
        { id:"mptw1", title:'Steve Jobs — iPhone Introduction (Macworld 2007)', url:"https://www.youtube.com/watch?v=MnrJzXM7a6o", searchTerm:"Steve Jobs iPhone introduction Macworld 2007 full", description:"Watch this to study HOW he talks about product decisions, not for nostalgia. The language of taste: 'we don't want 20 buttons.' Note specifically when he explains what the product does NOT do, and why. The reasoning is the thing to study." },
        { id:"mptw2", title:'Dieter Rams — "Objectified" documentary (excerpt)', url:"", searchTerm:"Dieter Rams Objectified documentary 10 principles good design", description:"The industrial designer who articulated the 10 principles of good design — still the most coherent taste framework available. The full Objectified documentary is on YouTube. Watch the Rams sections specifically — search his name to find them directly." },
        { id:"mptw3", title:'Brian Chesky — "The 11-Star Experience"', url:"", searchTerm:"Brian Chesky 11 star experience Airbnb talk", description:"Chesky's framework for product quality: define the 5-star version, imagine the 11-star version, then design backwards. More useful as a taste-building exercise than a methodology. Multiple recordings from talks and podcasts." },
        { id:"mptw4", title:"Julie Zhuo — 'Building Product Intuition' (talk)", searchTerm:"Julie Zhuo product intuition taste sense design leadership Facebook VP talk", description:"Zhuo's talks on how product intuition develops — and the specific habits that build it — are among the most useful available from someone who operated at Facebook's scale. Search 'Julie Zhuo product intuition talk' for recordings from First Round, Stanford, and design conferences." },
        { id:"mptw5", title:"Lenny Rachitsky — 'How to develop product sense' (podcast episode)", searchTerm:"Lenny Rachitsky podcast product sense taste how to develop skill 2023 2024", description:"Lenny has done full episodes on how to build product sense as a deliberate practice — not something you either have or don't. His episodes with Julie Zhuo and Shreyas Doshi on this specific topic are the most applicable." },
        { id:"mptw6", title:"Shreyas Doshi — 'What separates great product decisions' (talk)", searchTerm:"Shreyas Doshi great product decisions PM craft quality taste talk conference 2022 2023", description:"Shreyas's most complete framework on what distinguishes product decisions that show genuine judgment from ones that show competent execution. The distinction is the definition of taste. Multiple recordings from Mind the Product, First Round, and product conferences." },
        { id:"mptw7", title:"Y Combinator — 'How to Build Products Users Love' (Kevin Hale talk)", searchTerm:"Y Combinator Kevin Hale how to build products users love startup lecture", description:"One of the most-watched YC talks. Hale's framework for what makes products actually love-worthy — not just useful — is the most useful condensation of taste thinking available in 30 minutes. Directly applicable to the teardown assignment." },
        { id:"mptw8", title:"Exponent — PM Mock Interview: Product Sense (Favourite App Teardown)", searchTerm:"Exponent mock PM interview product sense favourite app teardown critique design", description:"'What's your favourite product and why?' is a taste test in disguise. Exponent's product sense mock interviews model how to give a structured critique that reveals genuine reasoning — not generic praise. Watching what 'has taste' looks like in an interview room is the exercise." }
      ],
      assignment:"Do three product teardowns.\n\n**Teardown 1 — A product you love.** Pick a product where your first reaction is 'this is just right.' Write 300 words: what specific decision (not feature category) creates that feeling? What did the team choose NOT to do? What would a less opinionated team have shipped instead?\n\n**Teardown 2 — A product that frustrates you.** Same exercise in reverse. Pick a real product you find genuinely bad. What specific decision reveals what went wrong? Was it a values failure (wrong thing optimised for) or an execution failure (right intent, bad output)?\n\n**Teardown 3 — A product you're undecided on.** This is the hard one. A product with real strengths and real weaknesses. Write 200 words. You must commit to a verdict at the end.\n\nThen write your evaluation framework: the 3–5 questions you now ask about any product to quickly diagnose whether it has taste. Your framework should produce a different answer for the three products above.\n\nThis is a portfolio artefact. If someone asks 'do you have product taste?' in an interview, you should be able to hand them this.",
      reflection:"Think about the last time you overrode your own taste because of data, a stakeholder, or time pressure. Was the override right? What does that tell you about when your taste judgement is reliable — and when you should distrust it?"
    },
    {
      id:"m5", number:6,
      title:"Pricing & Monetization Strategy",
      subtitle:"A skill senior PMs are expected to own. This module makes it explicit.",
      whyItMatters:"You have spent years understanding how value is created at a systems level. This module applies that lens to product pricing and gives you the frameworks to walk into any commercial conversation with confidence. Pricing is not a finance problem. It is a product decision.",
      artifact: "Commercial Model + Pricing Page Copy",
      rubric: { weak: "Chose a pricing model because similar products use it. Pricing page reads like a feature matrix. Can't state the value metric with confidence. The 150-word copy is about the product's capabilities, not the buyer's problem.", strong: "Named the value metric explicitly and defended why it scales with value delivered. The pricing page copy focuses on the buyer's before/after — not the product's features. Addresses at least one pricing objection proactively. The free tier has a deliberate, defensible limitation.", selfCheck: "Can I state the value metric in one sentence without hesitating?\nDoes my pricing page copy make someone want to upgrade, or just understand what they're paying for?\nHave I named what the free tier will NOT do — and explained the strategic reason why?" },
      readings: [
        { id:"m5r1", number:"1", title:'"The Good-Better-Best Approach to Pricing" — Rafi Mohammed, HBR', url:"https://hbr.org/2018/09/the-good-better-best-approach-to-pricing", searchTerm:"", type:"verified", description:"Short, sharp, directly applicable. The tiering framework that most SaaS companies actually use — explained clearly with examples. Read this first." },
        { id:"m5r2", number:"2", title:'"Don\'t Just Roll the Dice" — Neil Davidson (free PDF)', url:"https://neildavidson.com/downloads/dont-just-roll-the-dice.pdf", searchTerm:"Neil Davidson dont just roll the dice software pricing", type:"verified", description:"Free, ~80 pages. The most pragmatic guide to software pricing ever written. Covers value-based pricing, psychological pricing, and why engineers price wrong. Download and read in one sitting." },
        { id:"m5r3", number:"3", title:"Patrick McKenzie — 'Pricing' (Stripe Atlas guide)", url:"https://stripe.com/gb/atlas/guides/saas-pricing", searchTerm:"Patrick McKenzie patio11 pricing software", type:"verified", description:"McKenzie (patio11) is the clearest practical thinker on software pricing. This Stripe Atlas guide is his most accessible piece. His blog at kalzumeus.com has deeper posts if you want more." },
        { id:"m5r4", number:"4", title:'"Monetizing Innovation" — Ramaswami & Tacke (Simon-Kucher)', url:"", searchTerm:"Monetizing Innovation Simon-Kucher Ramaswami Tacke summary chapters", type:"search", description:"Book (~$20 Kindle). Simon-Kucher are the world's leading pricing consultants. This is their practitioner framework distilled. Read Chapters 1, 3, and 5 minimum — the willingness-to-pay research methodology is directly usable." },
        { id:"m5r5", number:"5", title:"Lenny Rachitsky — 'How to price your product' (newsletter)", url:"https://www.lennysnewsletter.com/p/how-to-price-your-product", searchTerm:"Lenny Rachitsky how to price your product", type:"verified", description:"Lenny interviewed dozens of top product leaders specifically on pricing. This is one of his most useful pieces — practical, specific, and modern. Covers AI/consumption-based pricing shifts." }
      ],
      watching: [
        { id:"m5w1", title:"Patrick McKenzie (patio11) — pricing talk (MicroConf)", url:"", searchTerm:"Patrick McKenzie patio11 pricing MicroConf talk", description:"McKenzie is the most rigorous practical thinker on software pricing. His MicroConf talks are the best place to hear him develop the frameworks live. Search 'patio11 pricing MicroConf' — several recordings exist." },
        { id:"m5w2", title:"Y Combinator — Kevin Hale on startup pricing (YC lecture)", url:"", searchTerm:"Kevin Hale Y Combinator pricing lecture 2019", description:"45 min. Hale is one of YC's most rigorous partners. His pricing lecture is the best 45-minute introduction to value-based pricing available anywhere for free. Search 'Kevin Hale YC pricing'." },
        { id:"m5w3", title:"Simon-Kucher — pricing webinars (YouTube channel)", url:"https://www.youtube.com/@SimonKucherPartners", searchTerm:"Simon Kucher pricing strategy webinar", description:"The world's leading pricing consultants publish free webinars on their YouTube channel. Filter for software/SaaS topics. More rigorous than most startup pricing content." },
        { id:"m5w4", title:"Lenny Rachitsky — 'How to price your product' (podcast episode)", searchTerm:"Lenny Rachitsky podcast pricing product SaaS subscription freemium value metric 2023", description:"One of Lenny's most-downloaded episodes. He brings in guests across different company stages and models, with specific discussion on when freemium vs. trials vs. paid-only is right — and what the choice signals about the product. Search 'Lenny podcast pricing product' on YouTube." },
        { id:"m5w5", title:"Patrick Campbell (ProfitWell) — 'SaaS Pricing Fundamentals' (YouTube)", searchTerm:"Patrick Campbell ProfitWell pricing strategy SaaS fundamentals value metric willingness to pay", description:"Campbell built ProfitWell into the data layer for SaaS pricing before selling it for $200M. His YouTube channel and conference talks are the most data-backed practical pricing content available. The specific content on value metrics and willingness to pay research is directly usable in your assignment." },
        { id:"m5w6", title:"Shreyas Doshi — 'How PMs should think about monetization' (interview)", searchTerm:"Shreyas Doshi monetization business model pricing product manager commercial ownership talk", description:"Shreyas's framing on when and how PMs should engage with pricing and business model decisions — including when to lead vs. support. His distinction between commercial judgment and pricing expertise is the most useful reframe for PMs who've been kept away from pricing decisions." },
        { id:"m5w7", title:"Exponent — PM Mock Interview: Monetization and Pricing Strategy", searchTerm:"Exponent mock PM interview monetization pricing freemium strategy revenue model product", description:"Exponent's monetization mock interviews cover the exact questions that trip up PM candidates who haven't studied pricing systematically: 'how would you monetize X?', 'should we introduce a free tier?', 'improve revenue without raising prices'. Watch before your assignment." }
      ],
      assignment:"Design the business model for this app as if you were going to commercialise it.\n\n1. Define 3 customer segments and their willingness to pay: a career re-entrant self-funding, a company buying it for a team of PMs, and a bootcamp or accelerator licensing it for cohorts. What does each segment value most?\n\n2. Choose a pricing model and defend it — one-time purchase, subscription, per-seat, freemium, cohort licensing. What's the strategic logic? What does it signal about who the product is really for?\n\n3. Apply the framework from \"Don't Just Roll the Dice\": what's the value metric (what scales with value delivered)? What price anchors the conversation?\n\n4. Define the free tier if any. What's the deliberate limitation that makes the paid tier worth it — and why won't the free tier cannibalise paid?\n\n5. Write the actual pricing page copy — the 150 words a user would read before deciding whether to pay. No tables, no bullet points. Just the argument.",
      reflection:"Have you ever directly owned a pricing decision in your career? What happened? If not — why do you think pricing got delegated away from you?"
    },
    {
      id:"m6", number:7, spine: true,
      title:"AI Product Strategy",
      subtitle:"Where your product experience meets the AI wave. The highest-leverage module in this curriculum.",
      whyItMatters:"This is where seniority compounds. Anyone can learn to use an AI tool. Fewer people can define what to build with AI, and why, and for whom. This module gives you the strategic vocabulary and the frameworks to operate at that level with confidence.",
      artifact: "12-Month AI Product Thesis",
      rubric: { weak: "Predicts AI will continue to change everything. Identifies obvious opportunities (AI in healthcare, education) without naming a specific mechanism. Doesn't commit to anything that could be proven wrong in 12 months. Reads like a summary of AI news, not a thesis.", strong: "Makes a specific, falsifiable bet on where AI creates durable value in one market. Names who loses when this plays out. Identifies the specific capability — not just 'AI' — that enables the opportunity. Someone reading this in 12 months could score it: right, wrong, or partially right.", selfCheck: "Is my thesis falsifiable — could it be wrong in 12 months?\nHave I named a specific loser, not just winners?\nAm I betting on a durable structural shift, or on current model capabilities that could disappear?" },
      readings: [
        { id:"m6r1", number:"1", title:'"The New Business of AI" — Andreessen Horowitz', url:"https://a16z.com/the-new-business-of-ai/", searchTerm:"", type:"verified", description:"Essential. Explains why AI product economics are structurally different from SaaS." },
        { id:"m6r2", number:"2", title:'"Who Owns the Generative AI Platform?" — Andreessen Horowitz', url:"https://a16z.com/who-owns-the-generative-ai-platform/", searchTerm:"", type:"verified", description:"Where is value actually accruing in the AI stack?" },
        { id:"m6r3", number:"3", title:'Stratechery — "AI Unbundling"', url:"", searchTerm:"Stratechery AI unbundling Ben Thompson", type:"search", description:"Ben Thompson on how AI is changing the bundling logic of software." },
        { id:"m6r4", number:"4", title:'"Sequoia Capital AI Report"', url:"", searchTerm:"Sequoia Capital AI report 2024", type:"search", description:"They publish annual free reports on the state of AI business. Authoritative, well-researched." },
        { id:"m6r5", number:"5", title:"Singapore's National AI Strategy 2.0", url:"https://www.smartnation.gov.sg/nais/", searchTerm:"", type:"verified", description:"Read the executive summary minimum. You should be able to quote this in an interview." },
        { id:"m6r6", number:"6", title:"GovTech Singapore — Open Government Products", url:"https://www.open.gov.sg", searchTerm:"", type:"verified", description:"Read their case studies on what they've built and why." }
      ],
      watching: [
        { id:"m6w1", title:"Reid Hoffman — 'AI Is a Superpower' (TED)", url:"https://www.ted.com/talks/reid_hoffman_ai_is_a_superpower_but_we_need_to_choose_how_we_use_it", searchTerm:"Reid Hoffman AI superpower TED", description:"20 min. LinkedIn co-founder and Inflection AI investor. One of the most strategically grounded takes on what AI means for how products are built and who wins. Watch before writing your AI thesis." },
        { id:"m6w2", title:"Andrew Ng — 'AI for Everyone' intro lecture (Coursera / YouTube)", url:"", searchTerm:"Andrew Ng AI for Everyone full course lecture 1", description:"Andrew Ng's free Coursera course has the clearest non-technical explanation of AI strategy for business. Lecture 1 is free on YouTube. He's trained more AI practitioners than anyone alive — his framing is authoritative." },
        { id:"m6w3", title:"Sequoia Capital — 'AI's $200B Question' (YouTube)", url:"", searchTerm:"Sequoia Capital AI 200 billion dollar question keynote 2024", description:"Sequoia's annual AI analysis is the most rigorous investor-grade assessment of where AI is going. Their YouTube channel publishes the key sessions. Search 'Sequoia AI 2024 keynote' — updated annually." },
        { id:"m6w4", title:"Lenny Rachitsky — 'How to build an AI product strategy' (podcast)", searchTerm:"Lenny Rachitsky podcast AI product strategy roadmap 2024 PM", description:"Lenny's AI strategy episodes bring in practitioners building AI products at scale. His most downloaded AI episodes from 2023–2024 cover the specific decisions AI PMs face that traditional PMs don't encounter. Search 'Lenny podcast AI product strategy 2024' on YouTube." },
        { id:"m6w5", title:"Shreyas Doshi — 'AI strategy for PMs' (talk)", searchTerm:"Shreyas Doshi AI product strategy roadmap moat differentiation PM talk 2024", description:"Shreyas's framework for thinking about AI as a strategic layer — not a feature — including how to evaluate whether AI creates durable defensibility or just a temporary capability advantage. Most relevant to writing your AI thesis. Search 'Shreyas Doshi AI strategy' for current conference recordings." },
        { id:"m6w6", title:"a16z — 'AI Product Strategy' (Andreessen Horowitz talk)", searchTerm:"a16z Andreessen Horowitz AI product strategy business model opportunity talk 2024", description:"A16z is the most rigorous investor-grade voice on AI product strategy. Their annual AI Summit talks cover the full AI stack opportunity — from model layer to application layer to the data moat problem. Their YouTube channel publishes full sessions." },
        { id:"m6w7", title:"Lex Fridman — Interview with Sam Altman (OpenAI strategy, AI future)", searchTerm:"Lex Fridman Sam Altman OpenAI interview AI strategy future 2024", description:"Sam Altman's long-form conversations on AI strategy and where the industry is heading are the most candid available from an AI CEO. The Lex Fridman format gives him room to be specific about failure modes, not just opportunity. Essential context for writing your 12-month AI thesis." },
        { id:"m6w8", title:"Exponent — PM Mock Interview: AI Product Strategy", searchTerm:"Exponent mock PM interview AI product strategy competitive analysis moat defensibility 2023 2024", description:"Exponent's AI-specific strategy mock interviews: 'how would you build a competitive moat for an AI product?', 'what does differentiation look like when model capabilities are a commodity?'. The strategic questions most AI PM candidates don't prepare for specifically." }
      ],
      assignment:"Define the AI product strategy for the next version of this app.\n\n1. What's the AI-native feature that couldn't exist without AI? Not \"AI summarises your notes\" — that's a feature. What's the strategy? What does AI unlock that changes the fundamental value proposition?\n\n2. Who are the real AI competitors? Not just \"Coursera with AI\" — think about what happens when any LLM can generate a custom curriculum on demand in 30 seconds. What's your moat when the content layer is commoditised?\n\n3. Write a 12-month product roadmap with 3 phases. What AI features ship in each phase, and why in that order? What assumption does each phase test?\n\n4. Define the data flywheel: what user behaviour data makes the product smarter over time? How does each new user make the product better for the next one?\n\nThis is your first real portfolio artifact — treat it accordingly.",
      reflection:"Reading about AI strategy — do you find yourself mentally correcting things, having opinions, noticing gaps? Or does it feel foreign and anxiety-inducing? The answer is useful information about where you actually are."
    },
    {
      id:"mpr", number:8,
      title:"Prioritization & Roadmapping",
      subtitle:"The actual job. Making the call on what gets built next — and being able to defend it.",
      whyItMatters:"Most product failures aren't strategy failures — they're prioritisation failures. Teams build the right things in the wrong order, or the wrong things in the right direction. Prioritisation is where strategy meets execution, and where PMs either earn or lose the room. This is the most frequently tested skill in PM interviews because it is the most frequently exercised skill on the job. You've set the strategy. Now you decide what gets built first.",
      artifact:"Prioritised Roadmap + Decision Memo — a 90-day roadmap with a written rationale for what made the cut, what didn't, and why that order is the right order.",
      rubric: { weak:"A wishlist in date order. Everything made the cut. Nothing was visibly hard to cut. The rationale says 'highest ROI' without defining what ROI means for this product. A stakeholder could reorder items without any strategic consequence.", strong:"At least one thing you wanted to build was cut, with the strategic logic explained. The decision memo shows the counterfactual: what would happen if you built the cut thing instead. The roadmap reveals something about what the team believes — not just what they plan to ship.", selfCheck:"Did anything painful get cut — and did I explain why?\nCan I explain why item 3 beats item 4, not just that it does?\nIf a stakeholder swapped two items, could I defend the reorder with something other than intuition?\nDoes this roadmap test a hypothesis, or just ship a list?" },
      readings:[
        { id:"mprr1", number:"1", title:'Ryan Singer — "Shape Up" (Basecamp, free online)', url:"https://basecamp.com/shapeup", searchTerm:"", type:"verified", description:"The most concrete, opinionated prioritisation methodology in active use. Basecamp's full process — shaping work before scheduling it, appetite vs. estimates, betting not backlogs. Read Part I (Shaping) and Part II (Betting). Disagree with parts of it. The disagreement is the exercise." },
        { id:"mprr2", number:"2", title:'Teresa Torres — "Continuous Discovery Habits" (overview)', url:"https://www.producttalk.org/2021/08/product-discovery/", searchTerm:"Teresa Torres continuous discovery habits opportunity solution tree", type:"verified", description:"Torres's framework for connecting user outcomes to product decisions. The opportunity solution tree is the most rigorous tool for deciding what to build without sliding back into feature-list thinking. Free article introduces the core concepts; her book goes deeper." },
        { id:"mprr3", number:"3", title:'Marty Cagan — "Product Roadmaps" (SVPG)', url:"https://www.svpg.com/product-roadmaps/", searchTerm:"", type:"verified", description:"Cagan's argument that the typical feature roadmap is broken — and what a real product roadmap looks like instead. One of SVPG's most-shared pieces. Read before the assignment." },
        { id:"mprr4", number:"4", title:'Shreyas Doshi — "The Three Prioritization Frameworks"', url:"", searchTerm:"Shreyas Doshi three prioritization frameworks PM product", type:"search", description:"Shreyas's most-cited piece on how to think about prioritisation systematically. Multiple formats exist — Twitter thread, talk, and written. The written version is most complete. Search his name with 'prioritization' — consistently the top result." },
        { id:"mprr5", number:"5", title:'Lenny Rachitsky — "How to prioritize features"', url:"https://www.lennysnewsletter.com/p/how-to-prioritize", searchTerm:"Lenny Rachitsky how to prioritize features newsletter", type:"verified", description:"Lenny's practical synthesis from surveying dozens of PMs at top companies on how they actually make prioritisation calls. The gap between stated frameworks and what people actually do is the most interesting finding." }
      ],
      watching:[
        { id:"mprw1", title:'Ryan Singer — "Shape Up" talk (Basecamp / YouTube)', url:"", searchTerm:"Ryan Singer Shape Up talk Basecamp product development", description:"Several recordings of Singer presenting the Shape Up methodology. His talks are more dynamic than the book — he works through specific scenarios. Search 'Ryan Singer Shape Up' for the most recent version." },
        { id:"mprw2", title:'Teresa Torres — "Continuous Discovery" talk', url:"", searchTerm:"Teresa Torres continuous discovery opportunity solution tree talk YouTube", description:"Her conference talks on the opportunity solution tree are widely available on YouTube. More accessible than the book as a starting point. She appears at ProductTank, MindTheProduct, and similar events." },
        { id:"mprw3", title:'Shreyas Doshi — "How Great PMs Prioritize" (talk)', url:"", searchTerm:"Shreyas Doshi how great PMs prioritize talk product conference 2022 2023", description:"Multiple recordings from product conferences. His prioritisation talks are more practical than his written threads — he works through live examples. Search his name plus 'prioritization' filtered to video." },
        { id:"mprw4", title:"Lenny Rachitsky — 'How to prioritize ruthlessly' (podcast episode)", searchTerm:"Lenny Rachitsky podcast prioritization ruthlessly product roadmap decision 2023 2024", description:"One of Lenny's most shared episodes. He brings in PMs from companies at different stages on how they actually make prioritisation calls in ambiguous situations — not which framework they use, but how they think when the frameworks don't cleanly apply." },
        { id:"mprw5", title:"Marty Cagan — 'The Real Product Roadmap' (Product School talk)", searchTerm:"Marty Cagan product roadmap outcome based empowered teams SVPG Product School YouTube", description:"Cagan's most practical talk on the difference between a feature roadmap (what most companies have) and an outcome-based product roadmap (what empowered teams use). Product School uploads his talks regularly — search 'Marty Cagan roadmap' for the most recent recording." },
        { id:"mprw6", title:"Y Combinator — 'How to Decide What to Build' (YC lecture)", searchTerm:"Y Combinator what to build next product decisions prioritization startup lecture Michael Seibel", description:"Michael Seibel's lecture on how the best teams make build vs. not-build decisions — including how to avoid the 'everything is important' trap that kills most product roadmaps. One of the most practically useful YC lectures for PMs." },
        { id:"mprw7", title:"Product School — 'Prioritization Frameworks in Practice' (PM talk)", searchTerm:"Product School prioritization frameworks practice RICE ICE PM talk 2023 2024", description:"Product School's talks on prioritisation cover the specific frameworks (RICE, ICE, opportunity scoring) in the context of how to actually use them in a team setting — not just how they work in theory. Multiple speakers and formats." },
        { id:"mprw8", title:"Exponent — PM Mock Interview: Prioritization and Roadmap Tradeoffs", searchTerm:"Exponent mock PM interview prioritization roadmap tradeoffs what to build next feature", description:"'You have 3 features and only time for 1 — what do you build?' is the most common PM interview question. Exponent's prioritisation mock interviews simulate exactly this pressure. The frameworks from this module need to surface under time pressure — this is how you practice that." }
      ],
      assignment:"Build the prioritised roadmap for the next 90 days of Canon's development.\n\n1. Start with a brainstorm: list every plausible thing you could build in the next 90 days — features, improvements, infrastructure, experiments. Aim for at least 15 items. Don't evaluate yet.\n\n2. Apply two different prioritisation frameworks from this module's readings and see if they produce different results. Document both outputs.\n\n3. Make the call: top 5 items in priority order, in phases 1, 2, and 3.\n\n4. Write the decision memo (300 words): what's the strategic logic behind the order? What was hardest to cut — and why did you cut it? What assumption does phase 1 test?\n\n5. Write the anti-roadmap: the 3 things you are explicitly NOT building in the next 90 days, and why that's the right call.\n\nIf someone can read your decision memo and understand why this order — and not a different order — reflects a real product conviction, you've done it.",
      reflection:"Think about a prioritisation call you made in a past role that you'd make differently now. What information would have changed the decision? What does that tell you about what you were actually optimising for?"
    },
    {
      id:"m7", number:9,
      title:"Execution & Stakeholder Management",
      subtitle:"The craft of leading without authority. And knowing the conditions where you do it at your best.",
      whyItMatters:"You have done this work before. You know how to read a room, build alignment across competing priorities, and move things forward without a mandate. This module sharpens those instincts, adds structure to what is already intuitive, and helps you understand the environments where you do this work best.",
      artifact: "GTM Plan + Ideal Environment Spec",
      rubric: { weak: "Generic advice about 'building relationships' and 'communicating clearly.' Doesn't reference a real situation where an influence attempt failed. The ideal environment spec could apply to almost any senior PM. Could have been written before this module.", strong: "Uses a real past failure — not a success story — to diagnose a specific influence gap. The playbook includes at least one tactic specific to your operating style, not copied from a framework. The ideal environment spec is specific enough that you could disqualify a job based on it.", selfCheck: "Did I use a real failure as my primary example, or did I reach for a comfortable success?\nIs any tactic here specific to how I actually operate — or is it generic advice I've read before?\nCould I walk into an interview and use my ideal environment spec to ask better questions?" },
      readings: [
        { id:"m7r1", number:"1", title:'"Managing Your Boss" — Gabarro & Kotter, HBR', url:"https://hbr.org/2005/01/managing-your-boss", searchTerm:"", type:"verified", description:"Classic, still the sharpest piece on the upward relationship. Core insight: your boss is a resource to be managed, not an obstacle to route around. Changes how you think about alignment." },
        { id:"m7r2", number:"2", title:"Shreyas Doshi — 'Influence Without Authority' (Twitter/X thread)", url:"https://twitter.com/shreyas/status/1249039638037110785", searchTerm:"Shreyas Doshi influence without authority thread", type:"verified", description:"His most-shared thread on how senior PMs actually get things done without a mandate. If the link changes, search 'Shreyas Doshi influence without authority' — always the first result. Read the whole thread." },
        { id:"m7r3", number:"3", title:"Lara Hogan — 'Resilient Management' (free excerpts)", url:"https://larahogan.me/resources/", searchTerm:"", type:"verified", description:"Hogan's writing on stakeholder dynamics and management communication is the most honest available. Her site has free chapters, essays, and her 'questions for your first one-on-one' framework." },
        { id:"m7r4", number:"4", title:'"The Fearless Organization" — Amy Edmondson (overview)', url:"https://amycedmondson.com/fearless-organization/", searchTerm:"", type:"verified", description:"Edmondson is the Harvard Business School professor who coined 'psychological safety'. Her site has free resources. Core argument: smart people stop sharing what they know in unsafe environments — and this is a product problem, not just an HR one." },
        { id:"m7r5", number:"5", title:'"Working Backwards" — Colin Bryar & Bill Carr (Amazon PM culture)', url:"", searchTerm:"Working Backwards Colin Bryar Bill Carr Amazon press release FAQ method", type:"search", description:"Two former Amazon VPs on how Amazon builds products — specifically the press release/FAQ method, which is the best stakeholder alignment tool in use anywhere. Free summaries widely available; book is ~$15." },
        { id:"m7r6", number:"6", title:'Martin Fowler — "Technical Debt Quadrant"', url:"https://martinfowler.com/bliki/TechnicalDebtQuadrant.html", searchTerm:"", type:"verified", description:"A 5-minute read that reframes how engineers think about tech debt — the difference between reckless/prudent debt and deliberate/inadvertent debt. Understanding this quadrant changes every conversation you'll have with an engineering lead about what to prioritise vs. what to pay down. Every senior PM should know this framework cold." },
        { id:"m7r7", number:"7", title:'Will Larson — "How to work with software engineers" (Irrational Exuberance)', url:"https://lethain.com/how-to-work-with-software-engineers/", searchTerm:"Will Larson how to work with software engineers irrational exuberance lethain", type:"verified", description:"Larson is a staff engineer and engineering leader who writes the most practically useful content on PM-engineering dynamics. This piece on what engineers actually need from PMs to do their best work is the honest version of the conversation most companies don't have." }
      ],
      watching: [
        { id:"m7w1", title:"Amy Edmondson — 'Building a Psychologically Safe Workplace' (TEDx)", url:"https://www.ted.com/talks/amy_edmondson_building_a_psychologically_safe_workplace", searchTerm:"Amy Edmondson building psychologically safe workplace TEDx", description:"11 min. The research behind psychological safety — why it matters more than individual talent in team performance. Directly relevant to the environments you're evaluating in your next role search." },
        { id:"m7w2", title:"Camille Fournier — 'The Manager's Path' (LeadDev talk)", url:"", searchTerm:"Camille Fournier manager path engineering leadership LeadDev talk", description:"Fournier wrote the best book on engineering management. Her conference talks on engineering org design and team dynamics are directly useful for PMs who need to understand how their engineering partners think about ownership, technical debt, and team structure. Search 'Camille Fournier LeadDev' for recordings." },
        { id:"m7w3", title:"Lara Hogan — 'Navigating Team Dynamics' (YouTube)", url:"", searchTerm:"Lara Hogan team dynamics engineering management talk", description:"Her talks on management communication and navigating difficult dynamics are available on YouTube. Search her name — several conference recordings from LeadDev and similar events." },
        { id:"m7w4", title:"Lenny Rachitsky — 'How to work with difficult stakeholders' (podcast)", searchTerm:"Lenny Rachitsky podcast stakeholder management difficult influence without authority alignment 2023", description:"Lenny has dedicated full episodes to the mechanics of stakeholder management — building alignment, managing disagreement, and influencing without authority in real organisations. His episodes with Shreyas Doshi on this topic are among the most downloaded." },
        { id:"m7w5", title:"Shreyas Doshi — 'Influence Without Authority for PMs' (full talk)", searchTerm:"Shreyas Doshi influence without authority product manager stakeholders full talk conference 2022 2023", description:"Shreyas's extended framework on how senior PMs build influence beyond his Twitter threads. His live talks work through specific failure scenarios that are harder to convey in text. Multiple recordings from ProductTank, Mind the Product, and First Round Capital are on YouTube." },
        { id:"m7w6", title:"Marty Cagan — 'Empowered Product Teams' (SVPG talk)", searchTerm:"Marty Cagan empowered product teams engineering collaboration SVPG talk Product School 2022 2023", description:"Cagan's most practical talk on how great PMs work with engineering partners as true collaborators. The distinction between teams who execute roadmaps and teams who solve problems is most clearly articulated in his live talk formats." },
        { id:"m7w7", title:"Y Combinator — 'How to Lead Without Authority' (startup lecture)", searchTerm:"Y Combinator leadership influence without authority product manager startup lecture alignment", description:"YC's lecture on how product people create alignment in ambiguous environments — the skills that distinguish people who move things forward from people who create confusion. Directly applicable to the GTM and execution planning assignment." },
        { id:"m7w8", title:"Exponent — PM Mock Interview: Execution and Stakeholder Management", searchTerm:"Exponent mock PM interview execution stakeholder management conflict resolution influence", description:"Exponent's execution mock interviews: 'tell me about a time you influenced without authority', 'how do you handle a stakeholder who disagrees with your roadmap?'. Behavioral execution questions are the ones most senior PM candidates underestimate because they assume experience alone is enough." }
      ],
      assignment:"Write the go-to-market and execution plan for launching this product in Singapore.\n\n1. Who are the first 100 users and exactly how do you reach them? Be specific — not \"LinkedIn\" but which communities, which people, which message, in which order. Why those 100 and not a different 100?\n\n2. Identify your 3 most important stakeholders for a B2B version (e.g. an L&D lead at GovTech, a Singapore accelerator running PM cohorts, a regional tech company upskilling mid-level PMs). What does each need to believe before they say yes?\n\n3. Write the stakeholder communication plan: what does each stakeholder need to hear, from whom, and when?\n\n4. Write the pre-mortem: it's 6 months post-launch and the product failed. What was the most likely cause? Now write the mitigation — what would you do in the first 30 days to prevent it?\n\nThis is the most important assignment in the curriculum. Execution is where PMs actually fail.",
      reflection:"What would a stakeholder environment look like that made you feel energised rather than depleted? Try to be specific — not \"less political\" but what specifically would be different. That description is your filter for the next role."
    },
    {
      id:"mwc", number:10,
      title:"Written Communication & PM Craft",
      subtitle:"How PMs actually lead. The memo, the spec, the one-pager — done well.",
      whyItMatters:"The best product managers at the best companies are exceptional writers. Not because writing looks good on a resume, but because writing is thinking made visible. A good one-pager is a product decision that's been stress-tested before anyone wrote a line of code. A clear spec reduces engineering rework. A sharp strategy memo creates alignment faster than any meeting. Amazon bans slides in executive reviews for a reason: prose reveals whether the thinking is actually there. This module builds the writing muscle that makes your product thinking legible to the teams and stakeholders who need to act on it.",
      artifact:"A product brief — a polished one-pager for one of your module outputs, written as if handing it to an engineering team you're about to start working with.",
      rubric: { weak:"A list of features with acceptance criteria. The problem is defined as a solution ('we need to build X'). The success metric is vague. A reader can't tell what decision the brief is asking them to make. Could have been written in 20 minutes.", strong:"Leads with the problem and the evidence for it, not the solution. A reader who knows nothing about this product could explain the tradeoff being made. The success metric is specific enough that someone else could determine if the thing worked — without asking. Precise enough to reduce engineering questions, not generate them.", selfCheck:"Does my brief lead with the problem or the solution?\nCould someone who doesn't know this product explain the tradeoff being made?\nIs the success metric specific enough that I'd know in 30 days whether it worked?\nWould this brief generate more engineering questions or fewer?" },
      readings:[
        { id:"mwcr1", number:"1", title:'Paul Graham — "Write Simply"', url:"http://paulgraham.com/simply.html", searchTerm:"", type:"verified", description:"The single best piece of writing advice available. Graham's argument: if you can't say it simply, you don't understand it. Applies to PRDs as much as essays. Read before you write anything for this module." },
        { id:"mwcr2", number:"2", title:'Barbara Minto — "The Pyramid Principle" (summary)', url:"", searchTerm:"Barbara Minto pyramid principle SCQA structure executive communication summary", type:"search", description:"The structured writing framework used by every McKinsey consultant. SCQA: Situation, Complication, Question, Answer. Directly applicable to strategy memos, executive updates, and any document where you need senior people to act on your thinking. Free summaries of the concept are excellent — the book is ~$30 but the method is the thing." },
        { id:"mwcr3", number:"3", title:'Lenny Rachitsky — "How to write a product spec"', url:"https://www.lennysnewsletter.com/p/how-to-write-a-product-spec", searchTerm:"Lenny Rachitsky how to write product spec PRD newsletter", type:"verified", description:"The most practical PM writing guide available. Lenny surveyed PMs from Stripe, Airbnb, Google, and others on how they actually write specs — what's in them, what's not, and what separates the ones that get engineers aligned from the ones that generate 40 Slack messages." },
        { id:"mwcr4", number:"4", title:'Ken Norton — "How to Work with Engineers"', url:"https://www.bringthedonuts.com/essays/how-to-work-with-engineers.html", searchTerm:"", type:"verified", description:"Norton was a PM at Google for a decade. This essay on the PM-engineer communication dynamic is the most honest account of that relationship available. Read this before writing your brief — it changes how you think about what the brief is actually for." },
        { id:"mwcr5", number:"5", title:'Amazon PR/FAQ — "Working Backwards" method (free summary)', url:"", searchTerm:"Amazon press release FAQ working backwards product development Bryar Carr summary", type:"search", description:"The press-release-first methodology is the most influential internal writing practice in tech. Write the press release before you write the spec. Strong free summaries are widely available — the core idea is worth understanding deeply before your next spec." }
      ],
      watching:[
        { id:"mwcw1", title:'Shreyas Doshi — "How Great PMs Communicate" (talk)', url:"", searchTerm:"Shreyas Doshi how great PMs communicate product managers writing clarity talk", description:"His work on PM communication — pre-mortems, decision documentation, clarity in writing — available in both talk and thread format. Search 'Shreyas Doshi communicate' — the content on decision docs and written alignment is most directly applicable." },
