          <div><span class="module-badge ${badgeClass}">${badgeText}</span></div>
          <div class="module-num-inline">Module ${mod.number}</div>
          <div class="module-title">${esc(mod.title)}</div>
          ${mod.subtitle?`<div class="module-subtitle">${esc(mod.subtitle.split('.')[0])}</div>`:''}
          ${mod.artifact?`<div class="artifact-pill"><span class="artifact-icon">📦</span><span class="artifact-text">${esc(mod.artifact)}</span></div>`:''}
        </div>
        <div class="module-card-footer">
          <div class="module-progress-mini">
            <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="module-items-count">${items} items${attCount?` · ${attCount} files`:''}</div>
        </div>
      </div>`;
  }

  if (state.selectedModule) {
    const mod=state.curriculum.modules.find(m=>m.id===state.selectedModule);
    if (mod) {
      html+=`<div class="student-split"><div class="modules-column">${cardsHtml}</div><div class="detail-column">${renderDetail(mod)}</div></div>`;
    } else {
      html+=`<div class="modules-grid">${cardsHtml}</div>`;
    }
  } else {
    html+=`<div class="modules-grid">${cardsHtml}</div>`;
  }
  el.innerHTML=html;
  initRteFields();
}

function renderDetail(mod) {
  const p=getProgress(mod.id);
  const pct=getModPct(mod);
  const att=getAttachments(mod.id);
  const attCount=att.admin.length+att.student.length;

  const tabs=[
    {id:'reading',label:`Reading (${mod.readings.length})`,show:mod.readings.length>0},
    {id:'watching',label:`Watching (${mod.watching.length})`,show:mod.watching.length>0},
    {id:'assignment',label:'Assignment',show:!!mod.assignment},
    {id:'reflection',label:'Reflection',show:!!mod.reflection},
    {id:'attachments',label:`Attachments${attCount?` (${attCount})`:''}`,show:true},
    {id:'notes',label:'Notes',show:true}
  ].filter(t=>t.show);

  const activeTab=tabs.find(t=>t.id===state.activeTab)?state.activeTab:tabs[0]?.id;
  const tabsHtml=tabs.map(t=>`<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');

  let content='';
  if (activeTab==='reading') {
    content=mod.readings.map(r=>{
      const done = p.readings[r.id];
      const adminAttach = r.attachmentPath && r.attachmentName;
      const studentAttach = state.attachments[mod.id]?.readings?.[r.id];
      return `<div class="reading-item" data-rid="${r.id}">
        <input type="checkbox" class="check-input" ${done?'checked':''} onchange="toggleReading('${mod.id}','${r.id}',this.checked)">
        <div class="reading-content">
          <div class="reading-title ${done?'done':''}">${r.number}. ${esc(r.title)}</div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:4px">
            ${r.type==='verified'&&r.url?`<a href="${r.url}" target="_blank" rel="noopener" class="reading-link">✅ Open link ↗</a>`:r.searchTerm?`<span class="search-pill">🔍 ${esc(r.searchTerm)}</span>`:''}
            ${adminAttach?`<button class="reading-attach-view" onclick="viewAttach('${r.attachmentPath}','${esc(r.attachmentName)}')" title="Resource PDF">📄 Open PDF</button>`:''}
            ${studentAttach?`<button class="reading-attach-view reading-my-attach" onclick="viewAttach('${studentAttach.dbId}','${esc(studentAttach.name)}')" title="Your uploaded copy">📄 My copy</button>`:''}
          </div>
          ${r.description?`<div class="reading-desc">${esc(r.description).substring(0,220)}${r.description.length>220?'…':''}</div>`:''}
        </div>
      </div>`;
    }).join('')||'<p style="color:var(--text-muted)">No readings in this module.</p>';

  } else if (activeTab==='watching') {
    content=mod.watching.map(w=>{
      const done=p.watching[w.id];
      const ytUrl=`https://www.youtube.com/results?search_query=${encodeURIComponent(w.searchTerm)}`;
      return `<div class="watch-item">
        <input type="checkbox" class="check-input" ${done?'checked':''} onchange="toggleWatching('${mod.id}','${w.id}',this.checked)">
        <div class="watch-content">
          <div class="watch-term ${done?'done':''}">${esc(w.searchTerm)}</div>
          <a href="${ytUrl}" target="_blank" rel="noopener" class="yt-btn">▶ Search on YouTube</a>
          ${w.description?`<div class="watch-desc">${esc(w.description)}</div>`:''}
        </div>
      </div>`;
    }).join('')||'<p style="color:var(--text-muted)">No watching items in this module.</p>';

  } else if (activeTab==='assignment') {
    const sections = p.assignmentSections || [];
    const secHtml = sections.map(sec => `
      <div class="asgn-section" data-secid="${sec.id}"
           draggable="true"
           ondragstart="secDragStart(event,'${mod.id}','${sec.id}')"
           ondragover="secDragOver(event,'${sec.id}')"
           ondragleave="secDragLeave(event)"
           ondrop="secDrop(event,'${mod.id}','${sec.id}')"
           ondragend="secDragEnd()">
        <div class="asgn-sec-header">
          <span class="asgn-sec-drag" title="Drag to reorder">⠿</span>
          <div class="asgn-sec-title"
               contenteditable="true"
               data-placeholder="Section title…"
               data-modid="${mod.id}"
               data-secid="${sec.id}"
               oninput="saveSecTitle(this)"
               onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(sec.title)}</div>
          <button class="asgn-sec-toggle ${sec.collapsed?'collapsed':''}" title="${sec.collapsed?'Expand':'Collapse'}"
                  onclick="toggleSecCollapse('${mod.id}','${sec.id}',this)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 7,9 11,5"/></svg>
          </button>
          <button class="asgn-sec-delete" title="Delete section" onclick="deleteSection('${mod.id}','${sec.id}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
          </button>
        </div>
        <div class="asgn-sec-body ${sec.collapsed?'collapsed':''}">
          <div class="rte-wrap" style="border:none;border-radius:0">
            <div class="rte-toolbar" onmousedown="event.preventDefault()">
              <button class="rte-btn" onclick="rteCmdSec('bold','${sec.id}')" title="Bold"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><text x="2" y="12" font-size="13" font-weight="900" font-family="serif">B</text></svg></button>
              <button class="rte-btn" onclick="rteCmdSec('italic','${sec.id}')" title="Italic"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><text x="3" y="12" font-size="13" font-style="italic" font-family="serif">I</text></svg></button>
              <button class="rte-btn" onclick="rteCmdSec('underline','${sec.id}')" title="Underline"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><text x="2" y="11" font-size="12" text-decoration="underline" font-family="serif">U</text><line x1="2" y1="13" x2="12" y2="13" stroke="currentColor" stroke-width="1.5"/></svg></button>
              <div class="rte-sep"></div>
              <button class="rte-btn" onclick="rteCmdSec('insertUnorderedList','${sec.id}')" title="Bullet list" style="width:36px;font-size:11px;letter-spacing:-0.5px">• ≡</button>
              <button class="rte-btn" onclick="rteCmdSec('insertOrderedList','${sec.id}')" title="Numbered list" style="width:36px;font-size:11px;letter-spacing:-0.5px">1. ≡</button>
              <div class="rte-sep"></div>
              <span class="rte-swatch" style="background:#1C1917" onclick="rteCmdSec('foreColor','${sec.id}','#1C1917')" title="Black"></span>
              <span class="rte-swatch" style="background:#2563EB" onclick="rteCmdSec('foreColor','${sec.id}','#2563EB')" title="Blue"></span>
              <span class="rte-swatch" style="background:#7C3AED" onclick="rteCmdSec('foreColor','${sec.id}','#7C3AED')" title="Purple"></span>
              <div class="rte-sep"></div>
              <button class="rte-btn rte-btn-link" onclick="openSrcPicker('${mod.id}','${sec.id}',this)" title="Link to a reading">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7.5a3 3 0 0 0 4.5.4l1.5-1.5a3 3 0 0 0-4.2-4.2L5.6 3.4"/><path d="M8 5.5a3 3 0 0 0-4.5-.4L2 6.6a3 3 0 0 0 4.2 4.2l1.1-1.1"/></svg>
                <span style="font-size:11px">Cite</span>
              </button>
            </div>
            <div class="rte-editor"
                 data-modid="${mod.id}"
                 data-secid="${sec.id}"
                 contenteditable="true"
                 data-placeholder="Write here…"
                 oninput="autoSaveSec(this)"></div>
          </div>
        </div>
      </div>`).join('');
    content=`
      ${mod.artifact?`<div class="asgn-artifact-goal"><span class="asgn-artifact-goal-label">You're building</span><span class="asgn-artifact-goal-name">${esc(mod.artifact)}</span></div>`:''}
      <label class="done-check-row">
        <input type="checkbox" class="check-input" ${p.assignmentDone?'checked':''} onchange="toggleAssignment('${mod.id}',this.checked)">
        <span>Mark assignment as done</span>
      </label>
      <div class="prose-block">${formatProse(mod.assignment)}</div>
      <div class="notes-label" style="margin-top:12px">My work</div>
      <div class="asgn-sections" id="asgnSections_${mod.id}">${secHtml}</div>
      <button class="asgn-add-sec" onclick="addSection('${mod.id}')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
        Add section
      </button>`;

  } else if (activeTab==='reflection') {
    content=`
      <label class="done-check-row">
        <input type="checkbox" class="check-input" ${p.reflectionDone?'checked':''} onchange="toggleReflection('${mod.id}',this.checked)">
        <span>Mark reflection as done</span>
      </label>
      <div class="reflection-block">${formatProse(mod.reflection)}</div>
      <div class="notes-label">My reflection</div>
      <textarea class="notes-area" id="reflectionNotes" placeholder="Write your reflection here…" oninput="autoSave('${mod.id}','reflectionNotes')">${esc(p.reflectionNotes)}</textarea>`;

  } else if (activeTab==='attachments') {
    content=renderAttachmentsTab(mod.id, 'student');

  } else if (activeTab==='notes') {
    content=`
      <textarea class="notes-area" id="moduleNotes" style="min-height:260px" placeholder="Any thoughts, links, ideas, or things you want to remember from this module…" oninput="autoSave('${mod.id}','notes')">${esc(p.notes)}</textarea>
      <div class="notes-hint">Saves automatically.</div>`;
  }

  const isComplete=pct===100||p.complete;
  return `
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div class="detail-header-left">
          <div class="detail-module-num">Module ${mod.number}</div>
          <div class="detail-title">${esc(mod.title)}</div>
          ${mod.subtitle?`<div class="detail-subtitle">${esc(mod.subtitle)}</div>`:''}
        </div>
        <button class="close-btn" onclick="selectMod(null)">✕ Close</button>
      </div>
      ${mod.whyItMatters?`<div class="why-banner"><div class="why-label">Why this matters for you</div>${esc(mod.whyItMatters)}</div>`:''}
      <div class="detail-tabs">${tabsHtml}</div>
      <div class="tab-content">${content}</div>
      <div class="detail-footer">
        <button class="complete-btn ${isComplete?'is-done':'not-done'}" onclick="toggleComplete('${mod.id}')">
          ${isComplete?'✓ Module marked complete — click to undo':'Mark module complete'}
        </button>
      </div>
    </div>`;
}

function renderAttachmentsTab(modId, callerRole) {
  // callerRole: 'student' = student mode (can add student files, view admin resources)
  //             'admin'   = admin modal (can add admin resources)
  const att = getAttachments(modId);
  const isAdminCaller = callerRole === 'admin';
  let html = '';

  // ── Module Resources (admin-uploaded) ──
  html += `<div class="attach-section">
    <div class="attach-section-header">
      <div class="attach-section-label">Module Resources <span class="attach-count">${att.admin.length}</span></div>
      ${isAdminCaller ? `<button class="btn btn-primary btn-sm" onclick="triggerAttach('${modId}','admin')">+ Add PDFs</button>` : ''}
    </div>`;

  if (!att.admin.length) {
    html += `<div class="attach-empty">${isAdminCaller ? 'No resources added yet. Add PDFs for students to reference.' : 'No module resources have been attached by the curriculum designer.'}</div>`;
  } else {
    html += `<div class="attach-file-list">`;
    for (const f of att.admin) {
      html += renderFileItem(modId, 'admin', f, isAdminCaller);
    }
    html += `</div>`;
  }
  html += `</div>`;

  // ── My Files (student-uploaded) — only in student mode ──
  if (!isAdminCaller) {
    html += `
      <div class="attach-section">
        <div class="attach-section-header">
          <div class="attach-section-label">My Files <span class="attach-count">${att.student.length}</span></div>
          <button class="btn btn-outline btn-sm" onclick="triggerAttach('${modId}','student')">+ Add PDFs</button>
        </div>
        <div class="attach-drop-zone" id="dropZone_${modId}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleAttachDrop(event,'${modId}','student')"
          onclick="triggerAttach('${modId}','student')">
          <div class="attach-drop-icon">📎</div>
          <div class="attach-drop-label">Drag & drop PDFs here</div>
          <p>or click to browse — your assignments, notes, research</p>
        </div>`;
    if (att.student.length) {
      html += `<div class="attach-file-list">`;
      for (const f of att.student) html += renderFileItem(modId, 'student', f, true);
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    // Admin viewing student files (read-only in admin modal)
    if (att.student.length) {
      html += `<div class="attach-section">
        <div class="attach-section-label" style="margin-bottom:12px">Student Files <span class="attach-count">${att.student.length}</span></div>
        <div class="attach-file-list">`;
      for (const f of att.student) html += renderFileItem(modId, 'student', f, false);
      html += `</div></div>`;
    }
  }
  return html;
}

function renderFileItem(modId, role, f, canDelete) {
  const sizeStr = formatBytes(f.size);
  const dateStr = new Date(f.addedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  const isUploading = f.uploading;
  return `
    <div class="attach-file-item ${isUploading?'attach-uploading':''}">
      <div class="attach-file-icon">📄</div>
      <div class="attach-file-info">
        <div class="attach-file-name">${esc(f.name)}</div>
        <div class="attach-file-meta">${sizeStr} · ${dateStr}${role==='admin'?'<span class="attach-resource-badge">Resource</span>':''}</div>
      </div>
      <div class="attach-file-actions">
        ${!isUploading?`<button class="btn btn-outline btn-sm" onclick="viewAttach(${f.dbId},'${esc(f.name)}')">View</button>`:'<span style="font-size:12px;color:var(--text-muted)">Uploading…</span>'}
        ${canDelete&&!isUploading?`<button class="btn btn-danger btn-sm" onclick="removeAttach('${modId}','${role}',${f.dbId})">Remove</button>`:''}
      </div>
    </div>`;
}

// ── Design mode state ──
let _designModId = null;

function selectDesignMod(modId) {
  _designModId = modId;
  renderAdmin();
  // Scroll panel to top after selection
  setTimeout(() => {
    const pb = document.querySelector('.design-panel-body');
    if (pb) pb.scrollTop = 0;
  }, 50);
}

function saveModField(modId, field, value) {
  const mod = state.curriculum?.modules.find(m => m.id === modId);
  if (!mod) return;
  if (field === 'number') mod.number = parseInt(value) || mod.number;
  else mod[field] = value;
  if (field === 'number') state.curriculum.modules.sort((a,b) => a.number - b.number);
  saveState();
  if (field === 'title' || field === 'number') {
    // Refresh the module list item title without full re-render
    const item = document.querySelector(`.design-mod-item[data-mid="${modId}"] .design-mod-title`);
    const numEl = document.querySelector(`.design-mod-item[data-mid="${modId}"] .design-mod-num`);
    if (item) item.textContent = value || 'Untitled module';
    if (numEl && field === 'number') numEl.textContent = value;
    if (field === 'number') renderAdmin(); // reorder may have changed list
  }
}

function addBlankModule() {
  if (!state.curriculum) state.curriculum = { title: 'My Curriculum', subtitle: '', modules: [] };
  const nextNum = (state.curriculum.modules.length || 0) + 1;
  const mod = {
    id: `m${nextNum}_${Math.random().toString(36).substr(2,6)}`,
    number: nextNum,
    title: '',
    subtitle: '',
    whyItMatters: '',
    artifact: '',
    readings: [],
    watching: [],
    assignment: '',
    reflection: ''
  };
  state.curriculum.modules.push(mod);
  _designModId = mod.id;
  saveState();
  renderAdmin();
  // Focus title input
  setTimeout(() => {
    const inp = document.querySelector('.design-panel-body .design-field-input[data-field="title"]');
    if (inp) { inp.focus(); inp.select(); }
  }, 80);
}

    </div>`).join('') : `<div style="font-size:13px;color:var(--text-muted);padding:6px 0">No videos yet.</div>`;

  return `<div class="design-panel-col">
    <div class="design-panel">
      <div class="design-panel-header">
        <div>
          <div class="design-panel-modnum">Module ${mod.number}</div>

        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">

        <div class="design-field-group">

                    onblur="saveModField('${mod.id}','whyItMatters',this.value)"

        </div>

function saveReadingField(modId, readingId, field, value) {
  const mod = state.curriculum?.modules.find(m => m.id === modId);
  if (!mod) return;
  const r = mod.readings.find(r => r.id === readingId);
  if (!r) return;
  if (field === 'url') {
    const trimmed = value.trim();
    if (trimmed.startsWith('http')) { r.url = trimmed; r.type = 'verified'; r.searchTerm = ''; }
    else { r.searchTerm = trimmed.replace(/^search:/i, ''); r.type = 'search'; r.url = ''; }
  } else {
    r[field] = value.trim();
  }
  saveState();
}

function saveWatchingField(modId, watchingId, field, value) {

function triggerReadingAttach(modId, readingId) {

async function handleReadingAttachFile(input) {
  if (!_readingAttachTarget || !input.files.length) return;
  const { modId, readingId } = _readingAttachTarget;
  const file = input.files[0];
  const mod = state.curriculum?.modules.find(m => m.id === modId);
  if (!mod) return;
  const r = mod.readings.find(r => r.id === readingId);
  if (!r) return;

  showToast('Uploading…');
  try {
    const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const uuid = Math.random().toString(36).slice(2) + '_' + Date.now();

    // Remove old attachment from storage if replacing
    if (r.attachmentPath && _sb) {
      try { await _sb.storage.from(STORAGE_BUCKET).remove([r.attachmentPath]); } catch(e) {}
    }

    let storagePath;
    if (_sb && _currentUser) {
      // Admin files go under canonical/ so all users can read them
      // Student files go under their own userId/readings/
      const folder = _isAdmin() ? `canonical/readings/${readingId}` : `${_currentUser.id}/readings/${readingId}`;
      storagePath = `${folder}/${uuid}-${safe}`;
      const { error } = await _sb.storage.from(STORAGE_BUCKET).upload(storagePath, file, { contentType: 'application/pdf', upsert: false });
      if (error) throw error;
    } else {
      // Offline fallback — store blob as a fake path marker
      const blob = new Blob([await file.arrayBuffer()], { type: 'application/pdf' });
      const dbId = await idbPut(blob, { modId, readingId, name: file.name });
      storagePath = String(dbId); // IDB integer stored as string
    }

    r.attachmentPath = storagePath;
    r.attachmentName = file.name;
    saveState();
    renderAdmin();
    showToast('✓ PDF attached to reading');
  } catch(err) {
    console.error('Reading attach failed', err);
    showToast('Attach failed — ' + (err.message || 'please try again'));
  }
  input.value = '';
}

async function removeReadingAttach(modId, readingId) {
  if (!confirm('Remove this attachment?')) return;
  const mod = state.curriculum?.modules.find(m => m.id === modId);
  if (!mod) return;
  const r = mod.readings.find(r => r.id === readingId);
  if (!r || !r.attachmentPath) return;
  if (_sb) {
    try { await _sb.storage.from(STORAGE_BUCKET).remove([r.attachmentPath]); } catch(e) {}
  }
  delete r.attachmentPath;
  delete r.attachmentName;
  saveState();
  renderAdmin();
  showToast('Attachment removed');
}

function handleAttachDrop(e, modId, role) {

  if (zone) zone.classList.remove('drag-over');

  if (!files.length) { showToast('Please drop PDF files only'); return; }
  uploadFiles(modId, role, files);

async function uploadFiles(modId, role, files) {
  if (!state.attachments[modId]) state.attachments[modId] = { admin: [], student: [] };
  if (!state.attachments[modId][role]) state.attachments[modId][role] = [];

  // Add placeholder items to show uploading state
  const placeholders = files.map(f => ({ dbId: null, name: f.name, size: f.size, addedAt: Date.now(), uploading: true }));
  state.attachments[modId][role].push(...placeholders);
  render();

  let successCount = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const placeholder = placeholders[i];
    try {
      let dbId;
      if (_currentUser && _sb) {
        // ── Supabase Storage ──────────────────────────────────────
        const uid  = _currentUser.id;
        const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const uuid = Math.random().toString(36).slice(2) + '_' + Date.now();
        const path = `${uid}/${modId}/${role}/${uuid}-${safe}`;
        const { error } = await _sb.storage.from(STORAGE_BUCKET).upload(path, file, { contentType: 'application/pdf', upsert: false });
        if (error) throw error;
        dbId = path; // use storage path as the identifier
      } else {
        // ── Fallback: IndexedDB ───────────────────────────────────
        const blob = new Blob([await file.arrayBuffer()], { type: 'application/pdf' });
        dbId = await idbPut(blob, { modId, role, name: file.name });
      }
      const list = state.attachments[modId][role];
      const idx  = list.indexOf(placeholder);
      if (idx >= 0) list[idx] = { dbId, name: file.name, size: file.size, addedAt: Date.now() };
      successCount++;
    } catch(err) {
      const list = state.attachments[modId][role];
      const idx  = list.indexOf(placeholder);
      if (idx >= 0) list.splice(idx, 1);
      console.error('Upload failed', err);
    }
  }
  saveState();
  render();
  if (successCount > 0) showToast(`✓ ${successCount} PDF${successCount>1?'s':''} attached`);
  else showToast('Upload failed — please try again');
}

let _pdfBlobUrl = null;
let _pdfjsLoading = null;
let _pdfDoc = null;       // current PDF.js document
let _pdfZoom = 1.0;       // zoom multiplier on top of fit-to-width
let _pdfHlKey = null;     // localStorage key for highlights
let _pdfZoomTimer = null; // debounce timer

// Lazy-load PDF.js from CDN (only when first PDF is opened)
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  if (_pdfjsLoading) return _pdfjsLoading;
  _pdfjsLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve();
    };
    s.onerror = () => reject(new Error('Could not load PDF renderer. Check your internet connection.'));
    document.head.appendChild(s);
  });
  return _pdfjsLoading;
}

function togglePdfFullscreen() {
  const modal = document.getElementById('pdfModal');
  if (!modal) return;

    modal.requestFullscreen().catch(() => showToast('Fullscreen not supported in this browser'));

function togglePdfHighlight() {
  window._pdfHlMode = !window._pdfHlMode;
  const btn = document.getElementById('pdfHlBtn');
  if (btn) {
    btn.textContent = window._pdfHlMode ? '✓ Highlighting' : '✏ Highlight';
    btn.className = window._pdfHlMode ? 'btn btn-sm btn-hl-on' : 'btn btn-outline btn-sm';
  }

  });

const PDF_ZOOM_LEVELS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];

function adjustPdfZoom(delta) {
  const idx = PDF_ZOOM_LEVELS.findIndex(l => Math.abs(l - _pdfZoom) < 0.01);
  const newIdx = Math.max(0, Math.min(PDF_ZOOM_LEVELS.length - 1, idx + delta));
  if (newIdx === idx) return;
  _pdfZoom = PDF_ZOOM_LEVELS[newIdx];
  const disp = document.getElementById('pdfZoomPct');
  if (disp) disp.textContent = Math.round(_pdfZoom * 100) + '%';
  // Disable buttons at limits
  const btnMinus = document.getElementById('pdfZoomOut');
  const btnPlus  = document.getElementById('pdfZoomIn');
  if (btnMinus) btnMinus.disabled = newIdx === 0;
  if (btnPlus)  btnPlus.disabled  = newIdx === PDF_ZOOM_LEVELS.length - 1;
  // Debounce re-render — wait for user to stop clicking
  clearTimeout(_pdfZoomTimer);
  _pdfZoomTimer = setTimeout(() => _rerenderPdfPages(), 320);
}

async function _rerenderPdfPages() {
  const vp = document.getElementById('pdfViewport');
  if (!vp || !_pdfDoc) return;
  // Keep the info bar (first child), rebuild pages
  const infoBar = vp.querySelector('.pdf-info-bar');
  vp.innerHTML = '';
  if (infoBar) vp.appendChild(infoBar);
  await _renderPdfPages(_pdfDoc, vp);
}

// Core render function — shared by initial load and zoom changes
async function _renderPdfPages(pdf, vp) {
  const dpr = window.devicePixelRatio || 1;
  const savedHl = JSON.parse(localStorage.getItem(_pdfHlKey) || '[]');
  const containerWidth = Math.max(400, vp.clientWidth - 40);

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const baseVp = page.getViewport({ scale: 1 });
    // Base scale fits page to container; _pdfZoom is the user multiplier on top
    const fitScale = Math.min(2.5, containerWidth / baseVp.width);
    const cssScale = fitScale * _pdfZoom;
    const cssVp = page.getViewport({ scale: cssScale });       // logical CSS px
    const hiDprVp = page.getViewport({ scale: cssScale * dpr }); // physical canvas px

    // Wrapper — sized in CSS pixels
    const wrapper = document.createElement('div');
    wrapper.className = 'pdf-page-wrapper';
    wrapper.dataset.page = i;
    wrapper.dataset.w = cssVp.width;
    wrapper.dataset.h = cssVp.height;
    wrapper.style.cssText = `width:${cssVp.width}px;height:${cssVp.height}px;`;

    // Canvas — rendered at physical pixel resolution for sharpness
    const canvas = document.createElement('canvas');
    canvas.width  = hiDprVp.width;
    canvas.height = hiDprVp.height;
    canvas.style.width  = `${cssVp.width}px`;
    canvas.style.height = `${cssVp.height}px`;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: hiDprVp }).promise;
    wrapper.appendChild(canvas);

    // Text layer — spans positioned at CSS scale, enables selection + highlight
    try {
      const textContent = await page.getTextContent();
      const textDiv = document.createElement('div');
      textDiv.className = 'textLayer';
      textDiv.style.cssText = `width:${cssVp.width}px;height:${cssVp.height}px;`;
      const task = window.pdfjsLib.renderTextLayer({
        textContentSource: textContent,
        container: textDiv,
        viewport: cssVp,
        textDivs: []
      });
      if (task?.promise) await task.promise;
      wrapper.appendChild(textDiv);
    } catch(_) { /* text layer is optional */ }

    // Highlight layer — normalized coords → CSS px at current scale
    const hlLayer = document.createElement('div');
    hlLayer.className = 'pdf-hl-layer';
    hlLayer.id = `pdf-hl-layer-${i}`;
    savedHl.filter(h => h.p === i).forEach(h =>
      h.r.forEach(r => {
        const el = document.createElement('div');
        el.className = 'pdf-hl';
        // r.nx/ny/nw/nh are fractions (0-1) of page size → multiply by current CSS px
        el.style.cssText = `left:${r.nx*cssVp.width}px;top:${r.ny*cssVp.height}px;width:${r.nw*cssVp.width}px;height:${r.nh*cssVp.height}px;`;
        hlLayer.appendChild(el);
      })
    );
    wrapper.appendChild(hlLayer);
    vp.appendChild(wrapper);
  }
}

async function viewAttach(dbId, name) {
  window._pdfHlMode = false;
  _pdfZoom = 1.0;
  _pdfDoc = null;
  _pdfHlKey = `pdf_hl_${typeof dbId === 'string' ? dbId.replace(/\//g,'_') : dbId}`;

  try {
    // Determine source: Supabase Storage (string path) vs IndexedDB (integer)
    const isSupabasePath = _currentUser && _sb && typeof dbId === 'string' && dbId.includes('/');

    if (_pdfBlobUrl) { URL.revokeObjectURL(_pdfBlobUrl); _pdfBlobUrl = null; }

    if (isSupabasePath) {
      // Download blob from Supabase Storage
      const { data: blob, error } = await _sb.storage.from(STORAGE_BUCKET).download(dbId);
      if (error || !blob) { showToast('File not found — it may have been deleted'); return; }
      _pdfBlobUrl = URL.createObjectURL(blob);
    } else {
      // Legacy IndexedDB path
      const record = await idbGet(dbId);
      if (!record?.data) { showToast('File not found — it may have been cleared'); return; }
      _pdfBlobUrl = URL.createObjectURL(record.data);
    }
    const dlUrl = _pdfBlobUrl;
    const safeName = esc(name);

    const overlay = document.getElementById('modalOverlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="modal pdf-modal" id="pdfModal">
        <div class="modal-header" style="flex-wrap:wrap;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
            <span style="font-size:20px;flex-shrink:0">📄</span>
            <div class="modal-title">${safeName}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap">
            <button id="pdfHlBtn" class="btn btn-outline btn-sm" onclick="togglePdfHighlight()" title="Select text then release to highlight">✏ Highlight</button>
            <div style="display:flex;align-items:center;gap:4px;background:var(--gray-light);border-radius:8px;padding:2px 4px">
              <button id="pdfZoomOut" class="btn btn-outline btn-sm" onclick="adjustPdfZoom(-1)" style="padding:4px 9px;border:none;background:transparent" title="Zoom out">−</button>
              <span id="pdfZoomPct" style="font-size:12px;font-weight:600;color:var(--text-muted);min-width:38px;text-align:center">100%</span>
              <button id="pdfZoomIn"  class="btn btn-outline btn-sm" onclick="adjustPdfZoom(1)"  style="padding:4px 9px;border:none;background:transparent" title="Zoom in">+</button>
            </div>
            <button class="btn btn-outline btn-sm" id="pdfFsBtn" onclick="togglePdfFullscreen()" title="Fullscreen">⛶ Fullscreen</button>
            <a href="${dlUrl}" download="${safeName}" class="btn btn-outline btn-sm">⬇ Download</a>
            <button class="close-btn" onclick="closePdfModal()">✕</button>
          </div>
        </div>
        <div id="pdfViewport" style="flex:1;overflow-y:auto;background:#525659;padding:20px;display:flex;flex-direction:column;align-items:center;gap:0;">
          <div style="color:white;padding:32px;font-size:14px;text-align:center;opacity:0.8">⏳ Loading PDF…</div>
        </div>
      </div>`;

    document.addEventListener('fullscreenchange', () => {
      const btn = document.getElementById('pdfFsBtn');
      if (btn) btn.textContent = document.fullscreenElement ? '⛶ Exit' : '⛶ Fullscreen';
    });

    try {
      await loadPdfJs();
      const pdf = await window.pdfjsLib.getDocument(dlUrl).promise;
      _pdfDoc = pdf;
      const vp = document.getElementById('pdfViewport');
      if (!vp) return;

      const savedHl = JSON.parse(localStorage.getItem(_pdfHlKey) || '[]');
      const hlCount = savedHl.length;
      vp.innerHTML = `<div class="pdf-info-bar" style="color:white;font-size:12px;opacity:0.5;margin-bottom:8px;align-self:flex-start">${pdf.numPages} page${pdf.numPages>1?'s':''} · Retina rendering${hlCount ? ` · ${hlCount} highlight${hlCount>1?'s':''}` : ''}</div>`;

      await _renderPdfPages(pdf, vp);

      // Capture text selections as highlights (normalized 0-1 coords)
      vp.addEventListener('mouseup', () => {
        if (!window._pdfHlMode) return;
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || !sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        const wrapper = range.startContainer.parentElement?.closest('.pdf-page-wrapper');
        if (!wrapper) return;
        const pageNum = parseInt(wrapper.dataset.page);
        const W = parseFloat(wrapper.dataset.w);
        const H = parseFloat(wrapper.dataset.h);
        const wRect = wrapper.getBoundingClientRect();
        // Store as normalized fractions — zoom-proof
        const rects = [...range.getClientRects()]
          .map(r => ({
            nx: (r.left - wRect.left) / W,
            ny: (r.top  - wRect.top)  / H,
            nw: r.width  / W,
            nh: r.height / H
          }))
          .filter(r => r.nw > 0.001 && r.nh > 0.001);
        if (!rects.length) return;

        const allHl = JSON.parse(localStorage.getItem(_pdfHlKey) || '[]');
        allHl.push({ p: pageNum, r: rects });
        localStorage.setItem(_pdfHlKey, JSON.stringify(allHl));

        // Paint immediately at current scale
        const hlLayer = document.getElementById(`pdf-hl-layer-${pageNum}`);
        if (hlLayer) {
          rects.forEach(r => {
            const el = document.createElement('div');
            el.className = 'pdf-hl';
            el.style.cssText = `left:${r.nx*W}px;top:${r.ny*H}px;width:${r.nw*W}px;height:${r.nh*H}px;`;
            hlLayer.appendChild(el);
          });
        }
        sel.removeAllRanges();
        showToast('✓ Highlight saved');
      });

    } catch(renderErr) {
      const vp = document.getElementById('pdfViewport');
      if (vp) vp.innerHTML = `
        <div style="color:white;text-align:center;padding:48px 24px">
          <div style="font-size:52px;margin-bottom:16px">📄</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px">${safeName}</div>
          <div style="font-size:13px;opacity:0.65;margin-bottom:24px">${renderErr.message}</div>
          <a href="${dlUrl}" download="${safeName}" class="btn btn-primary" style="text-decoration:none">⬇ Download PDF</a>
        </div>`;
    }
  } catch(e) {
    showToast('Could not open file');
  }
}

// Rich text editor helpers
function rteCmd(cmd, val) {
  // Save selection before toolbar click steals focus
  const sel = window.getSelection();
  let savedRange = null;
  if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

  // Restore focus + selection, then apply command
  const ed = document.querySelector('.rte-editor[contenteditable]');
  if (ed) ed.focus();
  if (savedRange) {
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  document.execCommand(cmd, false, val || null);
}

let _srcPickerRange = null;
let _srcPickerModId = null;
let _srcPickerSecId = null;
let _srcPickerJustOpened = false; // guard: stop the opening click from immediately closing the picker

function openSrcPicker(modId, secId, btn) {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) { showToast('Select some text first, then click Cite'); return; }

  // Save selection (clicking the picker will lose it)
  _srcPickerRange = sel.getRangeAt(0).cloneRange();
  _srcPickerModId = modId;
  _srcPickerSecId = secId;

  const mod = state.curriculum.modules.find(m => m.id === modId);
  const readings = mod?.readings || [];

  let picker = document.getElementById('srcPicker');
  if (!picker) {
    picker = document.createElement('div');
    picker.id = 'srcPicker';
    picker.className = 'src-picker';
    document.body.appendChild(picker);
  }

  // Use data-title attribute — no inline onclick, avoids all quote/escaping issues
  picker.innerHTML = `<div class="src-picker-header">Link to a reading</div>` +
    (readings.length
      ? readings.map(r => `<div class="src-picker-item" data-rid="${r.id}" data-title="${esc(r.title)}">${esc(r.title)}</div>`).join('')
      : `<div class="src-picker-empty">No readings in this module.</div>`);

  // Position below the button
  const rect = btn.getBoundingClientRect();
  picker.style.top = (rect.bottom + window.scrollY + 6) + 'px';
  picker.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 330) + 'px';
  picker.classList.add('open');
  _srcPickerJustOpened = true;
  setTimeout(() => { _srcPickerJustOpened = false; }, 0); // clear after current event cycle
}

function _closeSrcPicker() {
  const picker = document.getElementById('srcPicker');
  if (picker) picker.classList.remove('open');
}

function applySrcLink(rid, title) {
  const picker = document.getElementById('srcPicker');
  if (picker) picker.classList.remove('open');

  if (!_srcPickerRange) return;
  const modId = _srcPickerModId;
  const secId = _srcPickerSecId;

  // Restore focus + selection
  const ed = document.querySelector(`.rte-editor[data-secid="${secId}"]`);
  if (!ed) return;
  ed.focus();
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_srcPickerRange);

  const selectedText = _srcPickerRange.toString();
  const displayText = selectedText || `[${title}]`;
  document.execCommand('insertHTML', false,
    `<span class="src-cite" contenteditable="false" data-rid="${rid}" data-modid="${modId}" title="${title}">${displayText}</span>&nbsp;`
  );

  autoSaveSec(ed);
  _srcPickerRange = null;
}

// Drag-and-drop for sections
let _dragSecId = null;
function secDragStart(e, modId, secId) {
  _dragSecId = secId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.currentTarget?.classList.add('dragging'), 0);
}
function secDragOver(e, secId) {
  if (!_dragSecId || secId === _dragSecId) return;
  e.preventDefault();
  document.querySelectorAll('.asgn-section.drag-over').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function secDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function secDragEnd() {
  document.querySelectorAll('.asgn-section').forEach(el => el.classList.remove('dragging', 'drag-over'));
  _dragSecId = null;
}
function secDrop(e, modId, targetSecId) {
  e.preventDefault();
  const fromId = _dragSecId;
  secDragEnd();
  if (!fromId || fromId === targetSecId) return;
  ensureSections(modId);
  const secs = state.progress[modId].assignmentSections;
  const fromIdx = secs.findIndex(s => s.id === fromId);
  const toIdx = secs.findIndex(s => s.id === targetSecId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = secs.splice(fromIdx, 1);
  secs.splice(toIdx, 0, moved);
  saveState();
  render();
}

function refreshPct(modId){
  const mod=state.curriculum?.modules.find(m=>m.id===modId); if(!mod)return;

    const badge=card.querySelector('.module-badge');

    else if(pct>0){badge.className='module-badge badge-progress';badge.textContent='In progress';}
    else{badge.className='module-badge badge-notstarted';badge.textContent='';}
  }
  const ov=getOverall();

  const lbl=document.querySelector('.progress-bar-label span:last-child'); if(lbl)lbl.textContent=ov.pct+'%';
  const nums=document.querySelectorAll('.stat-num'); if(nums.length>=2){nums[0].textContent=ov.complete;nums[1].textContent=ov.inProgress;}
}

async function clearAll(){
  if(!confirm('Clear all curriculum data, progress, and attachments? This cannot be undone.'))return;
  // Clear IndexedDB blobs
  openIDB().then(db=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).clear();
  }).catch(()=>{});
  // Delete all Supabase storage files for this user
  if (_currentUser && _sb) {
    try {
      const uid = _currentUser.id;
      const { data: files } = await _sb.storage.from(STORAGE_BUCKET).list(uid, { limit: 1000 });
      if (files?.length) {
        const paths = files.map(f => `${uid}/${f.name}`);
        await _sb.storage.from(STORAGE_BUCKET).remove(paths);
      }
      // Also delete the user_state row so cloud is cleared too
      await _sb.from('user_state').delete().eq('user_id', _currentUser.id);
    } catch(e) { console.warn('Cloud clear failed', e); }
  }
  state.curriculum=null;state.progress={};state.attachments={};state.selectedModule=null;
  saveState();render();
}

        <label class="form-label">Readings (one per line: Title | URL or search:term | Description)</label>
        <textarea class="form-textarea" id="fReadings" style="min-height:120px;font-size:12px;font-family:monospace" placeholder="Book Title | https://example.com | Short description&#10;Another Book | search:search term here | Description">${readingsVal}</textarea>
        <div class="form-hint">Use | as separator. For verified links use a full URL; for search items prefix with search:</div>
      </div>
      <div class="form-group">
        <label class="form-label">Watching (one per line: Search term — optional description)</label>
        <textarea class="form-textarea" id="fWatching" style="font-size:12px;font-family:monospace" placeholder="Roger Martin strategy talk Playing to Win — (~45 min)">${watchingVal}</textarea>
      </div>
      <div class="form-group"><label class="form-label">Assignment</label><textarea class="form-textarea" id="fAssign" style="min-height:120px" placeholder="Describe the assignment…">${esc(mod?.assignment||'')}</textarea></div>
      <div class="form-group"><label class="form-label">Reflection Prompt</label><textarea class="form-textarea" id="fReflect" placeholder="The reflection question…">${esc(mod?.reflection||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMod(${JSON.stringify(editId)})">${mod?'Save Changes':'Add Module'}</button>
    </div>`);
}

function saveMod(editId){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('Title is required');return;}
  const number=parseInt(document.getElementById('fNum').value)||1;
  const readings=document.getElementById('fReadings').value.split('\n').filter(l=>l.trim()).map((line,i)=>{
    const parts=line.split('|').map(s=>s.trim());
    const[t,urlOrSearch,desc]=parts;
    const isUrl=urlOrSearch?.startsWith('http');
    return{id:`r_${Math.random().toString(36).substr(2,8)}`,number:String(i+1),title:t||'',url:isUrl?urlOrSearch:'',searchTerm:!isUrl?(urlOrSearch?.replace(/^search:/i,'')||''):'',type:isUrl?'verified':'search',description:desc||''};
  });
  const watching=document.getElementById('fWatching').value.split('\n').filter(l=>l.trim()).map(line=>{
    const dash=line.indexOf(' — ');
    return{id:`w_${Math.random().toString(36).substr(2,8)}`,searchTerm:dash>0?line.slice(0,dash).trim():line.trim(),description:dash>0?line.slice(dash+3).trim():''};
  });
  if(!state.curriculum)state.curriculum={title:'My Curriculum',subtitle:'',modules:[]};
  const mod={id:editId||`m${number}_${Math.random().toString(36).substr(2,4)}`,number,title,subtitle:document.getElementById('fSub').value.trim(),whyItMatters:document.getElementById('fWhy').value.trim(),readings,watching,assignment:document.getElementById('fAssign').value.trim(),reflection:document.getElementById('fReflect').value.trim()};
  if(editId){const idx=state.curriculum.modules.findIndex(m=>m.id===editId);if(idx>=0)state.curriculum.modules[idx]=mod;}
  else{state.curriculum.modules.push(mod);}
  state.curriculum.modules.sort((a,b)=>a.number-b.number);
  saveState();closeModal();showToast(editId?'✓ Module updated':'✓ Module added');render();
}

// ====================================================================
// MODAL
// ====================================================================
function showModal(html){
  const ov=document.getElementById('modalOverlay');
  ov.style.display='flex';
  ov.innerHTML=`<div class="modal">${html}</div>`;
}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function handleOverlayClick(e){
  if(e.target===document.getElementById('modalOverlay')){
    // If a PDF blob is open, revoke it on dismiss
    if(_pdfBlobUrl){URL.revokeObjectURL(_pdfBlobUrl);_pdfBlobUrl=null;}
    closeModal();
  }
}

// ====================================================================
// TOAST
// ====================================================================
let _toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.remove('hide');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.add('hide'),2800);
}

// ====================================================================
// UTILS
// ====================================================================
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatProse(text){if(!text)return'';return esc(text).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');}
function formatBytes(bytes){if(!bytes)return'?';const k=1024;const sizes=['B','KB','MB','GB'];const i=Math.floor(Math.log(bytes)/Math.log(k));return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i];}

// ====================================================================
// DARK MODE
// ====================================================================
function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  applyDarkMode();
  saveState();
}
function applyDarkMode() {
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  const btn = document.getElementById('darkToggleBtn');
  if (btn) btn.textContent = state.darkMode ? '☀️' : '🌙';
}

// ====================================================================
// ADMIN DRAG-TO-REORDER
// ====================================================================
let _dragModId = null;

function adminDragStart(e, modId) {
  _dragModId = modId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.currentTarget?.classList.add('dragging'), 0);
}
function adminDragOver(e, modId) {
  if (!_dragModId || modId === _dragModId) return;
  e.preventDefault();
  document.querySelectorAll('.admin-module-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function adminDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function adminDragEnd() {
  document.querySelectorAll('.admin-module-row').forEach(el => el.classList.remove('dragging', 'drag-over'));
  _dragModId = null;
}
function adminDrop(e, targetModId) {
  e.preventDefault();
  const fromId = _dragModId;
  adminDragEnd();
  if (!fromId || fromId === targetModId) return;
  const mods = state.curriculum.modules;
  const fromIdx = mods.findIndex(m => m.id === fromId);
  const toIdx = mods.findIndex(m => m.id === targetModId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = mods.splice(fromIdx, 1);
  mods.splice(toIdx, 0, moved);
  mods.forEach((m, i) => { m.number = i + 1; });
  saveState();
  renderAdmin();
  showToast('✓ Order updated');
}

// ====================================================================
// INIT
// ====================================================================

// 1. Load state from localStorage first (instant, no network)
loadState();

// 2. Seed defaults if nothing in localStorage
if (!state.curriculum) {
  state.curriculum = JSON.parse(JSON.stringify(JANE_CURRICULUM));
  _writeLocalStorage();
}

// 3. Migrations (local copy — cloud will be patched after sync via _applyStateAfterSync)
if (state.curriculum && !state.curriculum.modules.find(m => m.id === 'm10')) {
  const pubMod = JANE_CURRICULUM.modules.find(m => m.id === 'm10');
  if (pubMod) { state.curriculum.modules.push(JSON.parse(JSON.stringify(pubMod))); _writeLocalStorage(); }
}
if (!state.progress) state.progress = {};
if (!state.progress.m10) state.progress.m10 = { readings: {}, watching: {} };
if (!state.progress.m10.assignmentSections || state.progress.m10.assignmentSections.length === 0) {
  state.progress.m10.assignmentSections = PUBLISHING_DEFAULT_SECTIONS.map((s, i) => ({
    id: 'sec_pub_' + i + '_' + Math.random().toString(36).slice(2, 7),
    title: s.title, content: s.content, collapsed: true
  }));
  _writeLocalStorage();
}

applyDarkMode();

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // j / k — navigate modules
  if ((e.key === 'j' || e.key === 'k') && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const active = document.activeElement;
    if (active && (active.isContentEditable || ['INPUT','TEXTAREA','SELECT'].includes(active.tagName))) return;
    const mods = state.curriculum?.modules || [];
    if (!mods.length) return;
    const idx = mods.findIndex(m => m.id === state.selectedModule);
    let next = e.key === 'j' ? idx + 1 : idx - 1;
    if (next < 0) next = mods.length - 1;
    if (next >= mods.length) next = 0;
    selectMod(mods[next].id);
    e.preventDefault();
  }
  // Escape — deselect module
  if (e.key === 'Escape' && state.selectedModule) {
    state.selectedModule = null;
    render();
  }
  // Cmd+Shift+A — reveal/hide admin mode toggle
  if (e.key === 'A' && e.shiftKey && (e.metaKey || e.ctrlKey)) {
    const toggle = document.getElementById('modeToggle');
    if (toggle) toggle.style.display = toggle.style.display === 'none' ? 'flex' : 'none';
    e.preventDefault();
  }
});

// Picker item clicks — delegated so no inline onclick escaping issues
document.addEventListener('click', function(e) {
  const item = e.target.closest('.src-picker-item');
  if (item) {
    const rid   = item.dataset.rid;
    const title = item.dataset.title;
    _closeSrcPicker();
    applySrcLink(rid, title);
    return;
  }
  // Close picker when clicking outside it (but not on the same click that opened it)
  const picker = document.getElementById('srcPicker');
  if (!_srcPickerJustOpened && picker && picker.classList.contains('open') && !picker.contains(e.target)) {
    _closeSrcPicker();
  }
});

// Citation clicks — must use mousedown (click is swallowed by contenteditable engine)
document.addEventListener('mousedown', function(e) {
  const cite = e.target.closest('.src-cite');
  if (cite) {
    e.preventDefault();
    jumpToReading(cite.dataset.modid, cite.dataset.rid);
  }
});

// 4. Boot: check Supabase auth, then reveal app or show sign-in screen
initAuth().catch(err => {
  // If auth init fails entirely (CDN down, network error), show app with local state
  console.warn('Auth init error — running in local mode:', err);
  document.getElementById('authScreen').style.display = 'none';
  render();
});
</script>
