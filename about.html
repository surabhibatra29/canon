<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canon — by Surabhi Batra</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #eef0ff 0%, #f5f0ff 50%, #fff0f8 100%);
  }
  .inner { display: flex; align-items: center; gap: 64px; }
  .logo-mark {
    width: 140px; height: 140px;
    background: linear-gradient(135deg, #4f5af0, #7c3aed);
    border-radius: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 68px; font-weight: 800; color: white;
    letter-spacing: -2px; flex-shrink: 0;
    box-shadow: 0 16px 48px rgba(79,90,240,0.25);
  }
  .text-block { text-align: left; }
  .wordmark {
    font-size: 88px; font-weight: 800; color: #1a1a2e;
    letter-spacing: -4px; line-height: 1; margin-bottom: 12px;
  }
  .tagline {
    font-size: 13px; color: #8080a8;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .byline { font-size: 12px; color: #b0b0cc; margin-top: 6px; }
</style>
</head>
<body>
  <div class="inner">
    <div class="logo-mark">C</div>
    <div class="text-block">
      <div class="wordmark">Canon</div>
      <div class="tagline">AI-era PM curriculum</div>
      <div class="byline">by Surabhi Batra</div>
    </div>
  </div>
</body>
</html>
